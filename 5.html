<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM 动画与表情查看器</title>

    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(20, 20, 40, 0.88);
            --text: #e0e0e0;
            --accent: #5b9bd5;
            --accent-active: #7ab8f5;
            --border: rgba(255, 255, 255, 0.12);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.18);
            --preset-active: #3a6fc5;
            --preset-hover: #4a80d8;
            --shadow: 0 6px 28px rgba(0, 0, 0, 0.6);
            --radius: 12px;
            --transition: 0.2s ease;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d14;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #ui {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 18px 20px;
            border-radius: var(--radius);
            color: var(--text);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            min-width: 280px;
            max-width: 380px;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
        }

        .ui-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ui-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #aaa;
            margin-bottom: 2px;
        }

        input[type="file"] {
            color: #ccc;
            font-size: 12px;
            max-width: 200px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: background var(--transition);
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--btn-hover);
        }

        button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        button:hover {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.3);
        }

        button:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.3);
        }

        .anim-grid,
        .expr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 5px;
        }

        .anim-btn,
        .expr-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 8px 4px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anim-btn:hover:not(:disabled),
        .expr-btn:hover:not(:disabled) {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        .anim-btn.active-anim,
        .expr-btn.active-expr {
            background: var(--preset-active);
            border-color: #6a9ee6;
            color: white;
            box-shadow: 0 0 12px rgba(58, 111, 197, 0.5);
            font-weight: 600;
        }

        .preset-group {
            display: flex;
            gap: 3px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 7px;
            padding: 3px;
        }

        .preset-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: #999;
            padding: 7px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all var(--transition);
        }

        .preset-btn:hover {
            color: #ddd;
            background: rgba(255, 255, 255, 0.06);
        }

        .preset-btn.active {
            background: var(--preset-active);
            color: #fff;
            box-shadow: 0 2px 8px rgba(58, 111, 197, 0.4);
        }

        .preset-btn.active:hover {
            background: var(--preset-hover);
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }

        .status-dot.on {
            background: #4caf50;
            box-shadow: 0 0 6px rgba(76, 175, 80, 0.6);
        }

        .status-dot.off {
            background: #666;
        }

        .info-text {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
            line-height: 1.4;
        }

        .loading-text {
            color: #f0c040;
            font-size: 11px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            #ui {
                top: 8px;
                left: 8px;
                padding: 12px 14px;
                gap: 10px;
                min-width: auto;
                max-width: calc(100vw - 32px);
            }
            .anim-btn,
            .expr-btn {
                padding: 6px 2px;
                font-size: 10px;
            }
            .preset-btn {
                padding: 6px 6px;
                font-size: 10px;
            }
        }
    </style>
</head>

<body>

    <div id="ui">
        <!-- 模型加载 -->
        <div class="ui-section">
            <span class="ui-label">📦 VRM 模型</span>
            <input id="vrmInput" type="file" accept=".vrm">
        </div>

        <!-- 表情管理 -->
        <div class="ui-section">
            <span class="ui-label">😊 表情</span>
            <div id="exprButtonContainer" class="expr-grid">
                <span class="info-text" style="grid-column:1/-1;">请先加载模型</span>
            </div>
        </div>

        <!-- 动画选择 -->
        <div class="ui-section">
            <span class="ui-label">🎬 动画</span>
            <div id="animButtonContainer" class="anim-grid">
                <span class="info-text" style="grid-column:1/-1;">请先加载 VRM 模型</span>
            </div>
            <span class="info-text" id="animStatus" style="display:none;"></span>
        </div>

        <!-- 渲染精细度 -->
        <div class="ui-section">
            <span class="ui-label">🎨 渲染精细度</span>
            <div class="preset-group" id="presetGroup">
                <button class="preset-btn" data-preset="low">低</button>
                <button class="preset-btn" data-preset="medium">标准</button>
                <button class="preset-btn active" data-preset="high">高</button>
                <button class="preset-btn" data-preset="ultra">极致</button>
            </div>
            <span class="info-text" id="presetInfo">
                <span class="status-dot on"></span>像素比 1× &nbsp;|&nbsp;
                <span class="status-dot on"></span>抗锯齿 &nbsp;|&nbsp;
                <span class="status-dot on"></span>阴影
            </span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
                "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
        import { VRMLoaderPlugin } from "@pixiv/three-vrm";
        import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from "@pixiv/three-vrm-animation";

        // ==================== 动画文件定义 ====================
        const ANIMATION_FILES = [
            { file: "appearing.vrma", label: "出现" },
            { file: "greet.vrma", label: "打招呼" },
            { file: "liked.vrma", label: "点赞" },
            { file: "pose.vrma", label: "摆姿势" },
            { file: "shoot.vrma", label: "射击" },
            { file: "showbody.vrma", label: "展示" },
            { file: "spin.vrma", label: "旋转" },
            { file: "squat.vrma", label: "蹲下" },
            { file: "waiting.vrma", label: "等待" },
            { file: "yeah.vrma", label: "耶✌" },
        ];

        // ==================== 表情预设定义 ====================
        const EXPRESSION_PRESETS = [
            { name: "happy", label: "😊 微笑", defaultWeight: 1.0 },
            { name: "angry", label: "😡 生气", defaultWeight: 1.0 },
            { name: "sad", label: "😢 悲伤", defaultWeight: 1.0 },
            { name: "surprised", label: "😲 惊讶", defaultWeight: 1.0 },
            { name: "relaxed", label: "😌 放松", defaultWeight: 1.0 },
            { name: "shy", label: "😳 害羞", defaultWeight: 1.0 },
            { name: "fun", label: "😜 嬉皮", defaultWeight: 1.0 },
            { name: "love", label: "😍 喜爱", defaultWeight: 1.0 },
            { name: "serious", label: "😐 严肃", defaultWeight: 1.0 },
            { name: "neutral", label: "😶 无表情", defaultWeight: 1.0 },
        ];

        // ==================== 画质预设 ====================
        const QUALITY_PRESETS = {
            low: { label: "低", pixelRatio: 0.5, antialias: false, shadows: false, shadowMapSize: 512, shadowMapType: THREE.PCFShadowMap },
            medium: { label: "标准", pixelRatio: 1.0, antialias: false, shadows: false, shadowMapSize: 1024, shadowMapType: THREE.PCFShadowMap },
            high: { label: "高", pixelRatio: 1.0, antialias: true, shadows: true, shadowMapSize: 2048, shadowMapType: THREE.PCFShadowMap },
            ultra: { label: "极致", pixelRatio: 2.0, antialias: true, shadows: true, shadowMapSize: 4096, shadowMapType: THREE.PCFSoftShadowMap },
        };
        let currentPreset = "high";
        const preset = () => QUALITY_PRESETS[currentPreset];

        // ==================== 场景初始化 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.4, 3);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(1, 1.5, 1);
        scene.add(directionalLight);

        function configureLightShadows(light, presetKey) {
            const cfg = QUALITY_PRESETS[presetKey];
            light.castShadow = cfg.shadows;
            if (cfg.shadows) {
                light.shadow.mapSize.width = cfg.shadowMapSize;
                light.shadow.mapSize.height = cfg.shadowMapSize;
                light.shadow.camera.left = -2;
                light.shadow.camera.right = 2;
                light.shadow.camera.top = 3;
                light.shadow.camera.bottom = -0.5;
                light.shadow.camera.near = 0.1;
                light.shadow.camera.far = 15;
                light.shadow.bias = -0.0003;
                light.shadow.normalBias = 0.02;
            }
        }
        configureLightShadows(directionalLight, currentPreset);

        const groundGeometry = new THREE.CircleGeometry(2.5, 48);
        const groundMaterial = new THREE.ShadowMaterial({ opacity: 0.45 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0.001;
        ground.receiveShadow = true;
        scene.add(ground);

        let renderer = new THREE.WebGLRenderer({
            antialias: preset().antialias,
            powerPreference: "high-performance",
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(preset().pixelRatio, window.devicePixelRatio));
        renderer.shadowMap.enabled = preset().shadows;
        renderer.shadowMap.type = preset().shadowMapType;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        let controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 0.8;
        controls.maxDistance = 8;
        controls.maxPolarAngle = Math.PI * 0.75;
        controls.update();

        const clock = new THREE.Clock();
        let currentVRM = null;
        let mixer = null;
        let animationActions = new Map();
        let activeAnimFile = null;
        let isLoadingAnimations = false;
        let currentExpression = null;
        let idleTime = 0;
        let blinkState = { timer: 0, nextBlink: 2.5, isBlinking: false, blinkDuration: 0.1, blinkProgress: 0 };

        // ==================== 表情管理 ====================
        function buildExpressionButtons() {
            const container = document.getElementById("exprButtonContainer");
            container.innerHTML = '';
            EXPRESSION_PRESETS.forEach(expr => {
                const btn = document.createElement("button");
                btn.className = "expr-btn";
                btn.textContent = expr.label;
                btn.title = expr.name;
                btn.addEventListener("click", () => {
                    setExpression(expr.name);
                });
                container.appendChild(btn);
            });
            updateExpressionUI();
        }

        function setExpression(expressionName) {
            if (!currentVRM) return;
            try {
                // 重置所有表情为0
                if (currentVRM.expressionManager) {
                    const expressions = currentVRM.expressionManager.expressions;
                    if (expressions) {
                        expressions.forEach(expr => {
                            currentVRM.expressionManager.setValue(expr.name, 0);
                        });
                    }
                }
                // 设置目标表情权重
                const exprPreset = EXPRESSION_PRESETS.find(e => e.name === expressionName);
                if (exprPreset && currentVRM.expressionManager) {
                    currentVRM.expressionManager.setValue(expressionName, exprPreset.defaultWeight);
                }
                currentExpression = expressionName;
                updateExpressionUI();
                console.log(`😊 表情切换至: ${expressionName}`);
            } catch (e) {
                console.warn("表情设置失败:", e);
            }
        }

        function updateExpressionUI() {
            document.querySelectorAll(".expr-btn").forEach(btn => {
                const exprName = btn.title;
                btn.classList.toggle("active-expr", exprName === currentExpression);
            });
        }

        // ==================== 动画管理 ====================
        function clearAllActions() {
            if (mixer) mixer.stopAllAction();
            animationActions.clear();
            activeAnimFile = null;
        }

        function stopCurrentAction(fadeOutTime = 0.25) {
            if (!mixer) return;
            mixer._actions.forEach(action => {
                if (action.isRunning()) action.fadeOut(fadeOutTime);
            });
            setTimeout(() => {
                if (mixer) {
                    mixer._actions.forEach(action => {
                        if (!action.isRunning()) action.stop();
                    });
                }
            }, fadeOutTime * 1000 + 50);
        }

        function playAnimation(fileName, loopMode = THREE.LoopOnce, crossfade = 0.25) {
            if (!mixer || !animationActions.has(fileName)) return;
            const action = animationActions.get(fileName);
            if (activeAnimFile === fileName && action.isRunning()) return;

            stopCurrentAction(crossfade);
            action.loop = loopMode;
            action.clampWhenFinished = (loopMode === THREE.LoopOnce);
            action.reset();
            action.fadeIn(crossfade).play();
            activeAnimFile = fileName;
            updateActiveButton(fileName);
        }

        function setupMixerListener() {
            if (!mixer) return;
            mixer.addEventListener('finished', (e) => {
                const finishedAction = e.action;
                let finishedFile = null;
                for (let [file, action] of animationActions.entries()) {
                    if (action === finishedAction) {
                        finishedFile = file;
                        break;
                    }
                }
                if (finishedFile) {
                    console.log(`⏹️ 动画结束: ${finishedFile}`);
                    activeAnimFile = null;
                    updateActiveButton(null);
                }
            });
        }

        // ==================== 加载动画文件 ====================
        async function preloadAllAnimations(vrm) {
            if (isLoadingAnimations) return;
            isLoadingAnimations = true;
            const container = document.getElementById("animButtonContainer");
            container.innerHTML = '<span class="loading-text" style="grid-column:1/-1;">⏳ 加载动画文件中...</span>';
            const statusEl = document.getElementById("animStatus");
            statusEl.style.display = 'none';

            clearAllActions();
            mixer = new THREE.AnimationMixer(vrm.scene);
            setupMixerListener();

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

            let loadedCount = 0;
            const total = ANIMATION_FILES.length;

            const loadPromises = ANIMATION_FILES.map(item => {
                return new Promise((resolve) => {
                    loader.load(
                        `./${item.file}`,
                        (gltf) => {
                            const vrmaData = gltf.userData.vrmAnimations[0];
                            const clip = createVRMAnimationClip(vrmaData, vrm);
                            const action = mixer.clipAction(clip);
                            action.stop();
                            animationActions.set(item.file, action);
                            loadedCount++;
                            statusEl.style.display = 'block';
                            statusEl.textContent = `⏳ 加载中 ${loadedCount}/${total}`;
                            resolve();
                        },
                        undefined,
                        (error) => {
                            console.warn(`⚠️ 加载失败: ${item.file}`, error);
                            loadedCount++;
                            statusEl.textContent = `⚠️ 部分加载失败 (${loadedCount}/${total})`;
                            resolve();
                        }
                    );
                });
            });

            await Promise.all(loadPromises);
            buildAnimationButtons();

            // 不自动播放任何动画，进入待机状态
            activeAnimFile = null;
            updateActiveButton(null);

            isLoadingAnimations = false;
            statusEl.textContent = '✅ 动画就绪';
            setTimeout(() => { statusEl.style.display = 'none'; }, 1500);
        }

        function buildAnimationButtons() {
            const container = document.getElementById("animButtonContainer");
            container.innerHTML = '';
            ANIMATION_FILES.forEach(item => {
                const btn = document.createElement("button");
                btn.className = "anim-btn";
                btn.textContent = item.label;
                btn.dataset.file = item.file;
                btn.title = item.file;
                btn.addEventListener("click", () => {
                    if (!animationActions.has(item.file)) return;
                    playAnimation(item.file, THREE.LoopOnce, 0.25);
                });
                container.appendChild(btn);
            });
        }

        function updateActiveButton(fileName) {
            document.querySelectorAll(".anim-btn").forEach(btn => {
                btn.classList.toggle("active-anim", btn.dataset.file === fileName);
            });
        }

        // ==================== VRM 模型加载 ====================
        document.getElementById("vrmInput").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));
            loader.load(url, (gltf) => {
                if (currentVRM) scene.remove(currentVRM.scene);
                currentVRM = gltf.userData.vrm;
                scene.add(currentVRM.scene);
                updateVRMShadowProps();

                // 初始化表情按钮
                buildExpressionButtons();
                // 设置默认表情为放松
                setExpression("relaxed");

                console.log("✅ VRM 加载完成");
                preloadAllAnimations(currentVRM);
            });
        });

        function updateVRMShadowProps() {
            if (!currentVRM) return;
            const enableShadows = preset().shadows;
            currentVRM.scene.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = enableShadows;
                    child.receiveShadow = enableShadows;
                }
            });
        }

        // ==================== 待机动作（眨眼+轻微晃动） ====================
        function updateIdle(delta) {
            if (!currentVRM) return;
            // 眨眼逻辑
            blinkState.timer += delta;
            if (!blinkState.isBlinking) {
                if (blinkState.timer >= blinkState.nextBlink) {
                    blinkState.isBlinking = true;
                    blinkState.blinkProgress = 0;
                    blinkState.timer = 0;
                    blinkState.nextBlink = 2.0 + Math.random() * 3.0; // 2~5秒随机眨眼
                }
            } else {
                blinkState.blinkProgress += delta / blinkState.blinkDuration;
                if (blinkState.blinkProgress >= 1.0) {
                    blinkState.isBlinking = false;
                    blinkState.blinkProgress = 1.0;
                }
            }

            // 应用眨眼权重
            let blinkWeight = 0;
            if (blinkState.isBlinking) {
                // 使用平滑曲线：快速闭眼，缓慢睁开
                const t = blinkState.blinkProgress;
                blinkWeight = t < 0.3 ? t / 0.3 : 1.0 - (t - 0.3) / 0.7;
                blinkWeight = Math.max(0, Math.min(1, blinkWeight));
            }

            if (currentVRM.blendShapeProxy) {
                currentVRM.blendShapeProxy.setValue('blinkLeft', blinkWeight);
                currentVRM.blendShapeProxy.setValue('blinkRight', blinkWeight);
            }

            // 身体轻微晃动（绕Y轴微小旋转）
            idleTime += delta;
            const swayAngle = Math.sin(idleTime * 0.8) * 0.015;
            currentVRM.scene.rotation.y = swayAngle;
        }

        // ==================== 渲染循环 ====================
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            // 更新动画混合器
            if (mixer) {
                mixer.update(delta);
            }

            // VRM 自身更新
            if (currentVRM) {
                currentVRM.update(delta);
            }

            // 待机动作：仅当没有动画播放时执行
            if (activeAnimFile === null && currentVRM) {
                updateIdle(delta);
            } else {
                // 有动画播放时，重置待机参数，避免干扰
                idleTime = 0;
                if (currentVRM) {
                    currentVRM.scene.rotation.y = 0; // 恢复旋转
                    // 重置眨眼
                    if (currentVRM.blendShapeProxy) {
                        currentVRM.blendShapeProxy.setValue('blinkLeft', 0);
                        currentVRM.blendShapeProxy.setValue('blinkRight', 0);
                    }
                }
                blinkState.isBlinking = false;
                blinkState.timer = 0;
                blinkState.nextBlink = 2.5;
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // ==================== 画质切换 ====================
        function rebuildRenderer(antialias) {
            const oldCanvas = renderer.domElement;
            const oldTarget = controls.target.clone();
            const wasShadowEnabled = renderer.shadowMap.enabled;
            const oldShadowType = renderer.shadowMap.type;
            controls.dispose();

            const newRenderer = new THREE.WebGLRenderer({ antialias, powerPreference: "high-performance" });
            newRenderer.setSize(window.innerWidth, window.innerHeight);
            newRenderer.setPixelRatio(Math.min(preset().pixelRatio, window.devicePixelRatio));
            newRenderer.shadowMap.enabled = wasShadowEnabled;
            newRenderer.shadowMap.type = oldShadowType;
            newRenderer.outputColorSpace = THREE.SRGBColorSpace;
            newRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            newRenderer.toneMappingExposure = 1.0;

            if (oldCanvas.parentNode) {
                oldCanvas.parentNode.replaceChild(newRenderer.domElement, oldCanvas);
            } else {
                document.body.appendChild(newRenderer.domElement);
            }
            renderer = newRenderer;

            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.copy(oldTarget);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 0.8;
            controls.maxDistance = 8;
            controls.maxPolarAngle = Math.PI * 0.75;
            controls.update();
        }

        function applyPreset(presetKey) {
            const cfg = QUALITY_PRESETS[presetKey];
            const oldCfg = QUALITY_PRESETS[currentPreset];
            if (cfg.antialias !== oldCfg.antialias) rebuildRenderer(cfg.antialias);
            renderer.setPixelRatio(Math.min(cfg.pixelRatio, window.devicePixelRatio));
            renderer.setSize(window.innerWidth, window.innerHeight);
            const shadowsToggled = cfg.shadows !== oldCfg.shadows;
            renderer.shadowMap.enabled = cfg.shadows;
            renderer.shadowMap.type = cfg.shadowMapType;
            directionalLight.castShadow = cfg.shadows;
            if (cfg.shadows && shadowsToggled) configureLightShadows(directionalLight, presetKey);
            ground.receiveShadow = cfg.shadows;
            updateVRMShadowProps();
            currentPreset = presetKey;
            updatePresetUI();
        }

        function updatePresetUI() {
            const cfg = preset();
            document.querySelectorAll(".preset-btn").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.preset === currentPreset);
            });
            const infoEl = document.getElementById("presetInfo");
            const aaDot = cfg.antialias ? '<span class="status-dot on"></span>' : '<span class="status-dot off"></span>';
            const shDot = cfg.shadows ? '<span class="status-dot on"></span>' : '<span class="status-dot off"></span>';
            infoEl.innerHTML = `<span class="status-dot on"></span>像素比 ${cfg.pixelRatio.toFixed(1)}× &nbsp;|&nbsp;${aaDot}抗锯齿 &nbsp;|&nbsp;${shDot}阴影`;
        }

        document.getElementById("presetGroup").addEventListener("click", (e) => {
            const btn = e.target.closest(".preset-btn");
            if (!btn) return;
            const presetKey = btn.dataset.preset;
            if (presetKey && presetKey !== currentPreset) applyPreset(presetKey);
        });
        updatePresetUI();

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener("keydown", (e) => {
            const presetKeys = ["low", "medium", "high", "ultra"];
            const index = parseInt(e.key);
            if (index >= 1 && index <= 4 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                const targetKey = presetKeys[index - 1];
                if (targetKey !== currentPreset) applyPreset(targetKey);
            }
            if (e.key === "r" || e.key === "R") {
                if (!e.ctrlKey && !e.metaKey && !e.altKey) {
                    controls.target.set(0, 1.0, 0);
                    camera.position.set(0, 1.4, 3);
                    controls.update();
                }
            }
        });

        console.log("🚀 VRM 查看器启动 · 表情控制 + 动画直选 + 智能待机");
    </script>
</body>
</html>
