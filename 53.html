<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM AI 聊天模式 · 本地语音交互 (SenseVoice ONNX)</title>

    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(20, 20, 40, 0.9);
            --text: #e0e0e0;
            --accent: #5b9bd5;
            --accent-active: #7ab8f5;
            --border: rgba(255, 255, 255, 0.12);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.18);
            --preset-active: #3a6fc5;
            --preset-hover: #4a80d8;
            --shadow: 0 6px 28px rgba(0, 0, 0, 0.6);
            --radius: 12px;
            --transition: 0.2s ease;
            --danger: #e0556a;
            --danger-hover: #f07080;
            --success: #4caf84;
            --toast-bg: rgba(30, 30, 55, 0.95);
            --toast-error: #e0556a;
            --toast-warn: #f0a040;
            --toast-info: #5b9bd5;
            --toast-success: #4caf84;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d14;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #toastContainer {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 90vw;
            width: 420px;
        }

        .toast {
            pointer-events: auto;
            background: var(--toast-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            animation: toastSlideIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        .toast.removing {
            animation: toastSlideOut 0.3s cubic-bezier(0.55, 0.06, 0.68, 0.19) forwards;
        }

        .toast.error { border-left: 4px solid var(--toast-error); }
        .toast.warn { border-left: 4px solid var(--toast-warn); }
        .toast.info { border-left: 4px solid var(--toast-info); }
        .toast.success { border-left: 4px solid var(--toast-success); }

        .toast-icon { flex-shrink: 0; font-size: 18px; }
        .toast-msg { flex: 1; line-height: 1.4; word-break: break-word; }

        .toast-close {
            flex-shrink: 0;
            cursor: pointer;
            opacity: 0.6;
            font-size: 16px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #fff;
        }

        .toast-close:hover { opacity: 1; background: rgba(255, 255, 255, 0.1); }

        @keyframes toastSlideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastSlideOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        #ui {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 16px 18px;
            border-radius: var(--radius);
            color: var(--text);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            min-width: 290px;
            max-width: 390px;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        #ui.collapsed {
            min-width: auto;
            max-width: 48px;
            padding: 8px;
            border-radius: 50%;
            overflow: hidden;
            max-height: 48px;
            gap: 0;
        }

        #ui.collapsed>*:not(.ui-minimize-btn) { display: none; }

        .ui-minimize-btn {
            position: absolute;
            top: 6px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
            z-index: 11;
            line-height: 1;
        }

        #ui.collapsed .ui-minimize-btn { position: static; margin: 0 auto; }
        .ui-minimize-btn:hover { background: var(--btn-hover); }

        .ui-section { display: flex; flex-direction: column; gap: 5px; }

        .ui-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #aaa;
            margin-bottom: 1px;
        }

        .ui-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

        inputtype="file"type="file"type="file" {
            color: #ccc;
            font-size: 12px;
            max-width: 200px;
            cursor: pointer;
        }

        inputtype="file"type="file"type="file"::file-selector-button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: background var(--transition);
        }

        inputtype="file"type="file"type="file"::file-selector-button:hover { background: var(--btn-hover); }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            padding: 6px 10px;
            font-size: 12px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color var(--transition);
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        select:focus { border-color: var(--accent); }

        button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        button:hover { background: var(--btn-hover); border-color: rgba(255, 255, 255, 0.3); }
        button:disabled { opacity: 0.4; pointer-events: none; filter: grayscale(0.3); }

        button.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        button.btn-primary:hover { background: var(--accent-active); border-color: var(--accent-active); }
        button.btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; font-weight: 600; }
        button.btn-danger:hover { background: var(--danger-hover); border-color: var(--danger-hover); }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
        }

        .ai-status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .ai-status-dot.idle { background: #666; }
        .ai-status-dot.loading { background: #f0c040; box-shadow: 0 0 8px rgba(240,192,64,0.6); animation: pulse-y 1.2s infinite; }
        .ai-status-dot.ready { background: #4caf50; box-shadow: 0 0 8px rgba(76, 175, 80, 0.6); }
        .ai-status-dot.running { background: #4caf50; box-shadow: 0 0 8px rgba(76, 175, 80, 0.6); animation: pulse 1.2s infinite; }
        .ai-status-dot.stopped { background: #f0a040; }
        .ai-status-dot.error { background: #e0556a; box-shadow: 0 0 8px rgba(224,85,106,0.6); }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 6px rgba(76, 175, 80, 0.5); }
            50% { box-shadow: 0 0 18px rgba(76, 175, 80, 0.9); }
        }
        @keyframes pulse-y {
            0%, 100% { box-shadow: 0 0 6px rgba(240,192,64,0.5); }
            50% { box-shadow: 0 0 18px rgba(240,192,64,0.9); }
        }

        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #aaa;
            padding: 4px 0;
            user-select: none;
        }

        .collapsible-header:hover { color: #ccc; }
        .collapsible-arrow { transition: transform 0.25s ease; font-size: 10px; }
        .collapsible-arrow.open { transform: rotate(90deg); }
        .collapsible-content { overflow: hidden; max-height: 0; transition: max-height 0.35s ease; }
        .collapsible-content.open { max-height: 400px; }

        .anim-grid,
        .expr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 4px;
        }

        .anim-btn,
        .expr-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 7px 3px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anim-btn:hover:not(:disabled),
        .expr-btn:hover:not(:disabled) {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        .anim-btn.active-anim,
        .expr-btn.active-expr {
            background: var(--preset-active);
            border-color: #6a9ee6;
            color: white;
            box-shadow: 0 0 10px rgba(58, 111, 197, 0.45);
            font-weight: 600;
        }

        .preset-group {
            display: flex;
            gap: 3px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 7px;
            padding: 3px;
        }

        .preset-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: #999;
            padding: 6px 7px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all var(--transition);
        }

        .preset-btn:hover { color: #ddd; background: rgba(255, 255, 255, 0.06); }
        .preset-btn.active { background: var(--preset-active); color: #fff; box-shadow: 0 2px 8px rgba(58, 111, 197, 0.4); }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }

        .status-dot.on { background: #4caf50; box-shadow: 0 0 6px rgba(76, 175, 80, 0.5); }
        .status-dot.off { background: #666; }

        .info-text { font-size: 10px; color: #888; margin-top: 1px; line-height: 1.4; }
        .loading-text { color: #f0c040; font-size: 11px; font-weight: 500; }
        .fps-display { font-size: 11px; color: #aaa; margin-left: auto; }

        /* ===== 实时字幕区域 ===== */
        #subtitleBar {
            position: fixed;
            left: 50%;
            bottom: 36px;
            transform: translateX(-50%);
            z-index: 50;
            width: auto;
            max-width: 80vw;
            display: none;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }
        #subtitleBar.show { display: flex; }

        .subtitle-line {
            background: rgba(0, 0, 0, 0.58);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 20px;
            color: #fff;
            font-size: 19px;
            line-height: 1.5;
            text-align: center;
            max-width: 80vw;
            word-break: break-word;
            box-shadow: 0 4px 22px rgba(0, 0, 0, 0.55);
            transition: opacity 0.2s ease;
        }

        .subtitle-label {
            font-size: 11px;
            color: #8fb8e0;
            letter-spacing: 0.1em;
            margin-right: 8px;
            vertical-align: middle;
            text-transform: uppercase;
        }

        .subtitle-user.partial { color: #cfe6ff; }
        .subtitle-user.final { color: #fff; font-weight: 600; }
        .subtitle-ai { background: rgba(45, 32, 64, 0.6); color: #f4ecff; font-size: 17px; }

        @media (max-width: 480px) {
            #ui {
                top: 6px;
                left: 6px;
                padding: 10px 12px;
                gap: 8px;
                min-width: auto;
                max-width: calc(100vw - 24px);
                max-height: calc(100vh - 20px);
                font-size: 11px;
            }
            .anim-btn,
            .expr-btn { padding: 5px 2px; font-size: 10px; }
            .preset-btn { padding: 5px 5px; font-size: 10px; }
            #toastContainer { width: calc(100vw - 20px); top: 8px; }
            .toast { font-size: 11px; padding: 10px 12px; }
            .subtitle-line { font-size: 15px; padding: 8px 14px; }
            #subtitleBar { bottom: 18px; }
        }
    </style>
</head>

<body>

    <div id="toastContainer"></div>

    <div id="subtitleBar">
        <div class="subtitle-line subtitle-user" id="subtitleUser"></div>
        <div class="subtitle-line subtitle-ai" id="subtitleAI" style="display:none;"></div>
    </div>

    <div id="ui">
        <div class="ui-minimize-btn" title="最小化/展开">_</div>

        <div class="ui-section">
            <span class="ui-label">📦 VRM 模型</span>
            <input id="vrmInput" type="file" accept=".vrm">
        </div>

        <div class="ui-section">
            <div class="collapsible-header" id="apiSettingsHeader">
                <span class="collapsible-arrow" id="apiArrow">▶</span> ⚙️ API 设置 (仅 LLM / TTS)
            </div>
            <div class="collapsible-content" id="apiSettingsContent">
                <div style="display:flex;flex-direction:column;gap:6px;padding-top:4px;">
                    <input type="text" id="apiBaseUrl" placeholder="https://run.v3.cm/v1">
                    <input type="password" id="apiKey" placeholder="sk-...">
                    <input type="text" id="llmModel" placeholder="gemini-2.5-flash">
                    <input type="text" id="ttsModel" placeholder="qwen-tts">

                </div>
            </div>
        </div>

        <div class="ui-section">
            <span class="ui-label">🤖 AI 语音模式</span>
            <div class="ai-status" id="modelStatus" style="margin-bottom:2px;">
                <span class="ai-status-dot idle" id="modelStatusDot"></span>
                <span id="modelStatusText">ASR 模型未加载</span>
            </div>
            <div class="ai-status" id="aiStatus">
                <span class="ai-status-dot idle" id="aiStatusDot"></span>
                <span id="aiStatusText">未启动</span>
            </div>
            <div class="ui-row">
                <button class="btn-primary" id="btnStartAI" disabled>▶ 开始AI模式</button>
                <button class="btn-danger" id="btnStopAI" disabled>⏹ 结束AI模式</button>
            </div>
            <span class="info-text" id="aiInfo" style="display:none;"></span>
        </div>

        <div class="ui-section">
            <span class="ui-label">😊 表情</span>
            <div id="exprButtonContainer" class="expr-grid">
                <span class="info-text" style="grid-column:1/-1;">请先加载模型</span>
            </div>
        </div>

        <div class="ui-section">
            <span class="ui-label">🎬 动画</span>
            <div id="animButtonContainer" class="anim-grid">
                <span class="info-text" style="grid-column:1/-1;">请先加载 VRM 模型</span>
            </div>
            <span class="info-text" id="animStatus" style="display:none;"></span>
        </div>

        <div class="ui-section">
            <span class="ui-label">🎨 渲染精细度</span>
            <div class="preset-group" id="presetGroup">
                <button class="preset-btn" data-preset="low">低</button>
                <button class="preset-btn" data-preset="medium">标准</button>
                <button class="preset-btn active" data-preset="high">高</button>
                <button class="preset-btn" data-preset="ultra">极致</button>
            </div>
            <span class="info-text" id="presetInfo"></span>

            <div class="collapsible-header" id="advancedGraphicsHeader" style="margin-top:4px;">
                <span class="collapsible-arrow" id="advancedGraphicsArrow">▶</span> 高级画质设置
            </div>
            <div class="collapsible-content" id="advancedGraphicsContent">
                <div style="display:flex;flex-direction:column;gap:6px;padding-top:4px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <label style="font-size:11px;min-width:60px;">渲染倍率</label>
                        <input type="range" id="renderScale" min="0.5" max="2.0" step="0.1" value="1.0" style="flex:1;">
                        <span id="renderScaleValue" style="font-size:11px;width:35px;">1.0</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <label style="font-size:11px;min-width:60px;">抗锯齿</label>
                        <input type="checkbox" id="advancedAA" checked>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <label style="font-size:11px;min-width:60px;">阴影</label>
                        <input type="checkbox" id="advancedShadows" checked>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <label style="font-size:11px;min-width:60px;">阴影分辨率</label>
                        <select id="advancedShadowRes">
                            <option value="512">512</option>
                            <option value="1024">1024</option>

                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">

                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <label style="font-size:11px;min-width:60px;">像素比</label>
                        <input type="number" id="advancedPixelRatio" min="0.5" max="2.0" step="0.1" value="1.0" style="width:70px;">
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span style="font-size:11px;">当前帧率: </span>
                        <span id="fpsCounter" style="font-size:11px;color:#4caf50;">-- FPS</span>
                    </div>
                    <button id="applyAdvancedSettings" class="btn-primary" style="margin-top:4px;">应用高级设置</button>
                </div>
            </div>
        </div>
    </div>

        // =====================================================================
        // ============== 本地语音识别核心模块 (SenseVoice + Silero VAD) ==========

        // ==================== 工具：合并 Float32 块 ====================
        function mergeFloat32(chunks) {
            let len = 0;
            for (const c of chunks) len += c.length;
            const out = new Float32Array(len);
            let off = 0;
            for (const c of chunks) { out.set(c, off); off += c.length; }
            return out;
        }

        // ==================== 工具：计算一帧 RMS 能量 ====================
        function computeRMS(frame) {
            if (!frame || !frame.length) return 0;
            let sum = 0;
            for (let i = 0; i < frame.length; i++) sum += frame[i] * frame[i];
            return Math.sqrt(sum / frame.length);
        }

        // ==================== AudioResampler（线性插值重采样） ====================
        class AudioResampler {
            constructor(inputRate, outputRate) {
                this.inputRate = inputRate;
                this.outputRate = outputRate;
                this.ratio = inputRate / outputRate;
                this._prev = 0;
                this._inputPos = 0;
            }
            reset() { this._prev = 0; this._inputPos = 0; }
            process(input) {
                const N = input.length;
                if (N === 0) return new Float32Array(0);
                if (Math.abs(this.ratio - 1) < 1e-9) {
                    return input.slice(0);
                }
                const out = [];
                let p = this._inputPos;
                while (p < N - 1) {
                    const i = Math.floor(p);
                    const frac = p - i;
                    const s0 = i < 0 ? this._prev : input[i];
                    const s1 = input[i + 1];
                    out.push(s0 + (s1 - s0) * frac);
                    p += this.ratio;
                }
                this._prev = input[N - 1];
                this._inputPos = p - N;
                return Float32Array.from(out);
            }
        }

        // ==================== AudioWorklet 处理器（内联，保持单文件） ====================
        const WORKLET_CODE = `
            class CaptureProcessor extends AudioWorkletProcessor {
                process(inputs) {
                    const input = inputs[0];
                    if (input && input[0] && input[0].length) {
                        this.port.postMessage(input[0].slice(0));
                    }
                    return true;
                }
            }
            registerProcessor('capture-processor', CaptureProcessor);
        `;

        // =====================================================================
        // ==================== SileroVADController（重写：多版本兼容） ==========
        // =====================================================================
        // 关键修复点：
        //  - 不再硬编码 input/output/state 名称，启动后自动探测并打印
        //  - 自动探测 state 维度（优先读 metadata，否则尝试 [2,1,128] / [2,1,64]）
        //  - 兼容 h/c 双 state 结构
        //  - sr tensor 优先 shape [1]，失败回退 scalar []，成功后缓存
        //  - init 内做 warmup 自检（全 0 + 正弦波），失败抛错，不让模型显示 ready
        //  - process 失败不再静默吞掉（错误在 AIController 中节流打印）
        class SileroVADController {
            constructor() {
                this.session = null;
                this.ready = false;

                // 自动探测得到的 IO 名称
                this.audioInputName = null;
                this.srInputName = null;
                this.stateInputName = null;   // 合并 state 结构
                this.hInputName = null;       // h/c 结构
                this.cInputName = null;
                this.probOutputName = null;
                this.stateOutputName = null;  // 合并 state 结构
                this.hOutputName = null;      // h/c 结构
                this.cOutputName = null;

                // 模型结构：'state' | 'hc'
                this.stateMode = "state";

                // state 形状（自动探测，带回退）
                this.stateShape = [2, 1, 128];
                this.hShape = [2, 1, 64];
                this.cShape = [2, 1, 64];

                // sr tensor 形状（[1] 优先，失败回退 []）
                this.srShape = [1];

                // 运行时 state 张量
                this.state = null;
                this.h = null;
                this.c = null;
            }

            async init(url) {
                this.session = await ort.InferenceSession.create(url, {
                    executionProviders: ["wasm"],
                    graphOptimizationLevel: "all",
                });

                console.log("[VAD] inputs:", this.session.inputNames);
                console.log("[VAD] outputs:", this.session.outputNames);

                this._detectIO();
                this._detectStateShape();
                this.reset();

                // warmup 自检（失败抛错，外层捕获后显示 error，不会进入 ready）
                await this._warmup();

                this.ready = true;
            }

            _detectIO() {
                const ins = this.session.inputNames || [];
                const outs = this.session.outputNames || [];

                const pick = (names, patterns, exclude = []) => {
                    for (const p of patterns) {
                        const hit = names.find(n => p.test(n) && !exclude.some(e => e.test(n)));
                        if (hit) return hit;
                    }
                    return null;
                };

                // 音频输入：input / x / audio / speech（排除 sr/state/h/c）
                this.audioInputName =
                    pick(ins, /^input$/i, /^x$/i, /audio/i, /speech/i, /input/i,
                        /sr/i, /sample/i, /state/i, /^h$/i, /^c$/i, /^hn$/i, /^cn$/i)
                    || ins.find(n => !/sr|sample|state|^h∣c|^c∣c|^hn∣cn|^cn∣cn/i.test(n))
                    || ins[0];

                // 采样率输入：sr / sample_rate
                this.srInputName = pick(ins, /^sr$/i, /sample_?rate/i, /(^|_)sr($|_)/i, /sr/i);

                // state 与 h/c
                this.stateInputName = pick(ins, /^state$/i, /state/i, /^h$/i, /^c$/i, /^hn$/i, /^cn$/i);
                this.hInputName = pick(ins, /^h$/i, /^hn$/i, /hidden/i);
                this.cInputName = pick(ins, /^c$/i, /^cn$/i, /cell/i);

                if (!this.stateInputName && this.hInputName && this.cInputName) {
                    this.stateMode = "hc";
                } else {
                    this.stateMode = "state";
                }

                // 概率输出：output / prob / speech
                this.probOutputName = pick(outs, /^output$/i, /prob/i, /speech/i, /output/i) || outs[0];

                // state 输出：stateN / state / hn / cn
                this.stateOutputName = pick(outs, /^stateN$/i, /state/i, /^hn$/i, /^cn$/i);
                this.hOutputName = pick(outs, /^hn$/i, /^h$/i, /hidden/i);
                this.cOutputName = pick(outs, /^cn$/i, /^c$/i, /cell/i);

                // 若概率输出名误命中 state，换一个非 state 输出
                if (this.probOutputName && this.probOutputName === this.stateOutputName) {
                    const alt = outs.find(n => n !== this.stateOutputName);
                    if (alt) this.probOutputName = alt;
                }

                console.log("[VAD] resolved IO:", {
                    audioInputName: this.audioInputName,
                    srInputName: this.srInputName,
                    stateMode: this.stateMode,
                    stateInputName: this.stateInputName,
                    hInputName: this.hInputName,
                    cInputName: this.cInputName,
                    probOutputName: this.probOutputName,
                    stateOutputName: this.stateOutputName,
                    hOutputName: this.hOutputName,
                    cOutputName: this.cOutputName,
                });
            }

            // 尝试从 metadata 读取张量 shape（兼容不同 ORT 版本 API 命名）
            _readMetaShape(name) {
                if (!name) return null;
                try {
                    const meta = this.session.inputMetadata;
                    if (!meta) return null;
                    let m = null;
                    if (Array.isArray(meta)) m = meta.find(x => x && x.name === name);
                    else if (meta[name]) m = meta[name];
                    if (!m) return null;
                    const dims = m.dimensions || m.shape || m.dims;
                    if (!dims || !dims.length) return null;
                    return dims.map(d => {
                        const v = typeof d === "number" ? d : parseInt(d, 10);
                        return Number.isFinite(v) && v > 0 ? v : null;
                    });
                } catch (e) {
                    return null;
                }
            }

            _fillShape(metaShape, fallback) {
                if (!metaShape) return fallback.slice();
                return metaShape.map((d, i) => (d ?? (fallback[i] ?? 1)));
            }

            _detectStateShape() {
                if (this.stateMode === "hc") {
                    this.hShape = this._fillShape(this._readMetaShape(this.hInputName), [2, 1, 64]);
                    this.cShape = this._fillShape(this._readMetaShape(this.cInputName), [2, 1, 64]);
                    console.log("[VAD] h shape:", this.hShape, "c shape:", this.cShape);
                } else {
                    this.stateShape = this._fillShape(this._readMetaShape(this.stateInputName), [2, 1, 128]);
                    console.log("[VAD] state shape:", this.stateShape);
                }
            }

            _sizeOf(shape) { return shape.reduce((a, b) => a * b, 1); }

            reset() {
                if (this.stateMode === "hc") {
                    this.h = new ort.Tensor("float32", new Float32Array(this._sizeOf(this.hShape)), this.hShape.slice());
                    this.c = new ort.Tensor("float32", new Float32Array(this._sizeOf(this.cShape)), this.cShape.slice());
                } else {
                    this.state = new ort.Tensor("float32", new Float32Array(this._sizeOf(this.stateShape)), this.stateShape.slice());
                }
            }

            _makeSrTensor() {
                return new ort.Tensor("int64", BigInt64Array.from([16000n]), this.srShape.slice());
            }

            _buildFeeds(frame) {
                // 注意：proxy 模式下 run 会 detach 该 buffer，调用方需传入独立副本
                const audio = new ort.Tensor("float32", frame, 1,frame.length1, frame.length1,frame.length);
                const feeds = {};
                feeds[this.audioInputName] = audio;
                if (this.srInputName) feeds[this.srInputName] = this._makeSrTensor();
                if (this.stateMode === "hc") {
                    if (this.hInputName) feeds[this.hInputName] = this.h;
                    if (this.cInputName) feeds[this.cInputName] = this.c;
                } else {
                    if (this.stateInputName) feeds[this.stateInputName] = this.state;
                }
                return feeds;
            }

            _updateStateFromResults(results) {
                if (this.stateMode === "hc") {
                    if (this.hOutputName && results[this.hOutputName]) this.h = results[this.hOutputName];
                    if (this.cOutputName && results[this.cOutputName]) this.c = results[this.cOutputName];
                } else {
                    let st = null;
                    if (this.stateOutputName && results[this.stateOutputName]) {
                        st = results[this.stateOutputName];
                    } else {
                        const key = this.session.outputNames.find(n => n !== this.probOutputName);
                        if (key && results[key]) st = results[key];
                    }
                    if (st) this.state = st;
                }
            }

            _extractProb(results) {
                let probTensor = results[this.probOutputName];
                if (!probTensor) probTensor = results[this.session.outputNames[0]];
                const d = probTensor.data;
                return dd.length−1d.length - 1d.length−1;
            }

            async _runOnce(frame) {
                const feeds = this._buildFeeds(frame);
                return await this.session.run(feeds);
            }

            async _warmup() {
                const silence = new Float32Array(512);
                const sine = new Float32Array(512);
                for (let i = 0; i < 512; i++) sine[i] = 0.3 * Math.sin(2 * Math.PI * 440 * i / 16000);

                const trySr = async (shape) => {
                    this.srShape = shape;
                    this.reset();
                    const r = await this._runOnce(silence.slice());
                    const p = this._extractProb(r);
                    this._updateStateFromResults(r);
                    return p;
                };

                // 优先 sr shape [1]，失败回退 scalar []
                let silenceProb;
                try {
                    silenceProb = await trySr([1]);
                    console.log("[VAD] sr tensor shape = [1] OK");
                } catch (e1) {
                    console.warn("[VAD] sr shape [1] 失败，回退 scalar []：", e1?.message || e1);
                    try {
                        silenceProb = await trySr([]);
                        console.log("[VAD] sr tensor shape = [] (scalar) OK");
                    } catch (e2) {
                        console.error("[VAD] warmup 失败（sr 两种形状均失败）", {
                            error: e2,
                            inputNames: this.session.inputNames,
                            outputNames: this.session.outputNames,
                            audioInputName: this.audioInputName,
                            srInputName: this.srInputName,
                            stateMode: this.stateMode,
                            stateShape: this.stateShape,
                            hShape: this.hShape,
                            cShape: this.cShape,
                        });
                        throw new Error("VAD warmup 失败: " + (e2?.message || e2));
                    }
                }
                console.log("[VAD] warmup silence prob:", silenceProb);

                // 正弦波自检
                let sineProb;
                try {
                    const r2 = await this._runOnce(sine.slice());
                    sineProb = this._extractProb(r2);
                    this._updateStateFromResults(r2);
                } catch (e) {
                    console.error("[VAD] warmup 正弦波失败", e);
                    throw new Error("VAD warmup(sine) 失败: " + (e?.message || e));
                }
                console.log("[VAD] warmup sine prob:", sineProb);

                // 进入正式工作前重置 state
                this.reset();
            }

            async process(frame) {
                // 调用方保证传入独立 buffer（proxy detach 安全）
                const results = await this._runOnce(frame);
                const prob = this._extractProb(results);
                this._updateStateFromResults(results);
                return prob;
            }
        }

        // ==================== SenseVoice 特征前端：FFT / Mel / FBANK ====================
        const FBANK_CFG = {
            sampleRate: 16000,
            numMel: 80,
            frameLength: 400,
            frameShift: 160,
            fftSize: 512,
            lowFreq: 20,
            highFreq: 8000,
            preemph: 0.97,
        };
        const LFR_M = 7;
        const LFR_N = 6;

        function hzToMel(f) { return 1127.0 * Math.log(1.0 + f / 700.0); }

        function fftInPlace(re, im) {
            const n = re.length;
            for (let i = 1, j = 0; i < n; i++) {
                let bit = n >> 1;
                for (; j & bit; bit >>= 1) j ^= bit;
                j ^= bit;
                if (i < j) {
                    const tr = re[i]; re[i] = re[j]; re[j] = tr;
                    const ti = im[i]; im[i] = im[j]; im[j] = ti;
                }
            }
            for (let len = 2; len <= n; len <<= 1) {
                const ang = -2 * Math.PI / len;
                const wr = Math.cos(ang), wi = Math.sin(ang);
                for (let i = 0; i < n; i += len) {
                    let cwr = 1, cwi = 0;
                    const half = len >> 1;
                    for (let k = 0; k < half; k++) {
                        const a = i + k, b = i + k + half;
                        const tr = re[b] * cwr - im[b] * cwi;
                        const ti = re[b] * cwi + im[b] * cwr;
                        re[b] = re[a] - tr; im[b] = im[a] - ti;
                        re[a] += tr; im[a] += ti;
                        const ncwr = cwr * wr - cwi * wi;
                        cwi = cwr * wi + cwi * wr;
                        cwr = ncwr;
                    }
                }
            }
        }

        class FbankExtractor {
            constructor(cfg) {
                this.cfg = cfg;
                this.window = this._buildPoveyWindow(cfg.frameLength);
                this.melFilters = this._buildMelFilters();
            }
            _buildPoveyWindow(N) {
                const w = new Float32Array(N);
                for (let i = 0; i < N; i++) {
                    const v = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / (N - 1));
                    w[i] = Math.pow(v, 0.85);
                }
                return w;
            }
            _buildMelFilters() {
                const { sampleRate, fftSize, numMel, lowFreq, highFreq } = this.cfg;
                const numBins = (fftSize >> 1) + 1;
                const melLow = hzToMel(lowFreq), melHigh = hzToMel(highFreq);
                const points = [];
                for (let i = 0; i < numMel + 2; i++) {
                    points.push(melLow + (melHigh - melLow) * i / (numMel + 1));
                }
                const binMel = new Float32Array(numBins);
                for (let i = 0; i < numBins; i++) {
                    binMel[i] = hzToMel(i * sampleRate / fftSize);
                }
                const filters = [];
                for (let m = 0; m < numMel; m++) {
                    const left = points[m], center = points[m + 1], right = points[m + 2];
                    const full = new Float32Array(numBins);
                    let start = -1, end = -1;
                    for (let i = 0; i < numBins; i++) {
                        const mf = binMel[i];
                        let weight = 0;
                        if (mf > left && mf <= center) weight = (mf - left) / (center - left);
                        else if (mf > center && mf < right) weight = (right - mf) / (right - center);
                        if (weight > 0) {
                            if (start < 0) start = i;
                            end = i;
                            full[i] = weight;
                        }
                    }
                    if (start < 0) { start = 0; end = 0; }
                    const weights = full.slice(start, end + 1);
                    filters.push({ start, weights });
                }
                return filters;
            }
            compute(samples) {
                const { frameLength, frameShift, fftSize, numMel, preemph } = this.cfg;
                if (samples.length < frameLength) return [];
                const numFrames = 1 + Math.floor((samples.length - frameLength) / frameShift);
                const feats = [];
                const re = new Float32Array(fftSize);
                const im = new Float32Array(fftSize);
                const frame = new Float32Array(frameLength);
                const numBins = (fftSize >> 1) + 1;
                const power = new Float32Array(numBins);

                for (let f = 0; f < numFrames; f++) {
                    const start = f * frameShift;
                    for (let i = 0; i < frameLength; i++) frame[i] = samples[start + i];
                    let mean = 0;
                    for (let i = 0; i < frameLength; i++) mean += frame[i];
                    mean /= frameLength;
                    for (let i = 0; i < frameLength; i++) frame[i] -= mean;
                    for (let i = frameLength - 1; i > 0; i--) frame[i] -= preemph * frame[i - 1];
                    frame[0] -= preemph * frame[0];

                    for (let i = 0; i < fftSize; i++) {
                        re[i] = i < frameLength ? frame[i] * this.window[i] : 0;
                        im[i] = 0;
                    }

                    fftInPlace(re, im);

                    for (let k = 0; k < numBins; k++) power[k] = re[k] * re[k] + im[k] * im[k];

                    const melFrame = new Float32Array(numMel);
                    for (let m = 0; m < numMel; m++) {
                        const filt = this.melFilters[m];
                        const w = filt.weights;
                        let sum = 0;
                        for (let k = 0; k < w.length; k++) sum += power[filt.start + k] * w[k];
                        melFrame[m] = Math.log(Math.max(sum, 1e-10));
                    }
                    feats.push(melFrame);
                }
                return feats;
            }
        }

        // ==================== LFR (Low Frame Rate) 拼接, m=7 / n=6 ====================
        function applyLFR(feats, m, n) {
            const T = feats.length;
            if (T === 0) return [];
            const dim = feats[0].length;
            const half = Math.floor((m - 1) / 2);
            const padded = [];
            for (let i = 0; i < half; i++) padded.push(feats[0]);
            for (let i = 0; i < T; i++) padded.push(feats[i]);
            const Tp = padded.length;
            const Tlfr = Math.ceil(T / n);
            const out = [];
            for (let i = 0; i < Tlfr; i++) {
                const frame = new Float32Array(m * dim);
                for (let j = 0; j < m; j++) {
                    const idx = i * n + j;
                    const src = idx < Tp ? padded[idx] : padded[Tp - 1];
                    frame.set(src, j * dim);
                }
                out.push(frame);
            }
            return out;
        }

        // ==================== SenseVoiceASRController ====================
        class SenseVoiceASRController {
            constructor() {
                this.session = null;
                this.fbank = null;
                this.idToToken = null;
                this.negMean = null;
                this.invStd = null;
                this.blankId = 0;
                this.ready = false;
                this._intType = "int32";
                this.inFeat = null;
                this.inLen = null;
                this.inLang = null;
                this.inTn = null;
                this.outName = null;
            }

            async init(modelUrl, tokensUrl, cmvnUrl) {
                this.fbank = new FbankExtractor(FBANK_CFG);

                const tokResp = await fetch(tokensUrl);
                if (!tokResp.ok) throw new Error(`tokens.txt 加载失败 (${tokResp.status})`);
                this._parseTokens(await tokResp.text());

                const mvnResp = await fetch(cmvnUrl);
                if (!mvnResp.ok) throw new Error(`am.mvn 加载失败 (${mvnResp.status})`);
                this._parseCmvn(await mvnResp.text());

                const expectDim = FBANK_CFG.numMel * LFR_M;
                if (this.negMean && this.negMean.length !== expectDim) {
                    console.warn(`[ASR] CMVN 维度=this.negMean.length，期望={this.negMean.length}，期望=this.negMean.length，期望={expectDim}，请确认 am.mvn 与模型匹配`);
                }

                this.session = await ort.InferenceSession.create(modelUrl, {
                    executionProviders: ["wasm"],
                    graphOptimizationLevel: "all",
                });
                this._detectIO();
                this.ready = true;
                console.log("[ASR] 输入:", this.session.inputNames, "输出:", this.session.outputNames);
            }

            _parseTokens(text) {
                const lines = text.split(/\r?\n/);
                const pairs = [];
                let maxId = 0;
                for (const line of lines) {
                    if (!line) continue;
                    const idx = line.lastIndexOf(" ");
                    if (idx < 0) continue;
                    const sym = line.slice(0, idx);
                    const id = parseInt(line.slice(idx + 1), 10);
                    if (Number.isNaN(id)) continue;
                    pairs.push([id, sym]);
                    if (id > maxId) maxId = id;
                }
                this.idToToken = new Array(maxId + 1).fill("");
                for (const [id, sym] of pairs) this.idToToken[id] = sym;
            }

            _parseCmvn(text) {
                const toks = text.split(/\s+/).filter(Boolean);
                let pending = null;
                let collecting = null;
                let cur = [];
                let mean = null, std = null;
                for (const t of toks) {
                    if (t === "<AddShift>") { pending = "mean"; continue; }
                    if (t === "<Rescale>") { pending = "std"; continue; }
                    if (t === "<Splice>") { pending = "splice"; continue; }
                    if (t === "<Nnet>" || t === "</Nnet>" || t === "<LearnRateCoef>") continue;
                    if (t === "[") { collecting = pending; cur = []; continue; }
                    if (t === "]") {
                        if (collecting === "mean") mean = Float32Array.from(cur);
                        else if (collecting === "std") std = Float32Array.from(cur);
                        collecting = null; pending = null; cur = [];
                        continue;
                    }
                    if (collecting === "mean" || collecting === "std") {
                        const v = parseFloat(t);
                        if (!Number.isNaN(v)) cur.push(v);
                    }
                }
                this.negMean = mean;
                this.invStd = std;
                if (!mean || !std) console.warn("[ASR] am.mvn 解析未得到完整 CMVN（AddShift/Rescale）");
            }

            _detectIO() {
                const ins = this.session.inputNames;
                this.inLen = ins.find(n => /len/i.test(n)) || null;
                this.inLang = ins.find(n => /lang/i.test(n)) || null;
                this.inTn = ins.find(n => /(norm|itn)/i.test(n)) || null;
                this.inFeat = ins.find(n => /(speech|feat|input|^x$)/i.test(n) && !/(len|lang|norm|itn)/i.test(n))
                    || ins.find(n => n !== this.inLen && n !== this.inLang && n !== this.inTn)
                    || ins[0];
                const outs = this.session.outputNames;
                this.outName = outs.find(n => /(logit|ctc)/i.test(n)) || outs[0];
            }

            applyCMVN(frames) {
                const nm = this.negMean, isd = this.invStd;
                if (!nm || !isd) return;
                for (const f of frames) {
                    const n = Math.min(f.length, nm.length);
                    for (let i = 0; i < n; i++) f[i] = (f[i] + nm[i]) * isd[i];
                }
            }

            async recognize(samples16k) {
                if (!this.ready) return "";
                if (!samples16k || samples16k.length < this.fbank.cfg.frameLength) return "";
                const feats = this.fbank.compute(samples16k);
                if (!feats.length) return "";
                const lfr = applyLFR(feats, LFR_M, LFR_N);
                this.applyCMVN(lfr);
                const T = lfr.length;
                const dim = lfr[0].length;
                const flat = new Float32Array(T * dim);
                for (let i = 0; i < T; i++) flat.set(lfr[i], i * dim);
                const logits = await this._run(flat, T, dim);
                if (!logits) return "";
                return this._ctcDecode(logits);
            }

            async _run(flat, T, dim) {
                const featTensor = new ort.Tensor("float32", flat, [1, T, dim]);
                const tryRun = async (intType) => {
                    const mk = (val) => intType === "int64"
                        ? new ort.Tensor("int64", BigInt64Array.from([BigInt(val)]), [1])
                        : new ort.Tensor("int32", Int32Array.from([val]), [1]);
                    const feeds = {};
                    feeds[this.inFeat] = featTensor;
                    if (this.inLen) feeds[this.inLen] = mk(T);
                    if (this.inLang) feeds[this.inLang] = mk(SENSEVOICE_LANGUAGE);
                    if (this.inTn) feeds[this.inTn] = mk(SENSEVOICE_TEXTNORM);
                    const out = await this.session.run(feeds);
                    return out[this.outName] || out[this.session.outputNames[0]];
                };
                try {
                    return await tryRun(this._intType);
                } catch (e) {
                    const alt = this._intType === "int32" ? "int64" : "int32";
                    try {
                        const r = await tryRun(alt);
                        this._intType = alt;
                        return r;
                    } catch (e2) {
                        console.error("[ASR] 推理失败:", e2);
                        return null;
                    }
                }
            }

            _ctcDecode(logits) {
                const dims = logits.dims;
                const data = logits.data;
                const T = dimsdims.length−2dims.length - 2dims.length−2;
                const V = dimsdims.length−1dims.length - 1dims.length−1;
                let prev = -1;
                const ids = [];
                for (let t = 0; t < T; t++) {
                    const base = t * V;
                    let best = 0, bv = data[base];
                    for (let v = 1; v < V; v++) {
                        const val = data[base + v];
                        if (val > bv) { bv = val; best = v; }
                    }
                    if (best !== this.blankId && best !== prev) ids.push(best);
                    prev = best;
                }
                let pieces = ids.map(id => this.idToToken[id] ?? "");
                pieces = pieces.filter(p =>
                    p &&
                    !(p.startsWith("<|") && p.endsWith("|>")) &&
                    !(p.startsWith("<") && p.endsWith(">"))
                );
                let text = pieces.join("");
                text = text.replace(/▁/g, " ").replace(/\s+/g, " ").trim();
                return text;
            }
        }

        // ==================== AudioWorkletRecorder ====================
        class AudioWorkletRecorder {
            constructor() {
                this.ctx = null;
                this.stream = null;
                this.node = null;
                this.source = null;
                this.muteGain = null;
                this.resampler = null;
                this._buf = new Float32Array(0);
                this.onFrame = null;
                this.running = false;
            }

            async start(onFrame) {
                this.onFrame = onFrame;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === "suspended") await this.ctx.resume();

                this.stream = await navigator.mediaDevices.getUserMedia({
                    audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true },
                });

                const blob = new Blob(WORKLETCODEWORKLET_CODEWORKLETC​ODE, { type: "application/javascript" });
                const url = URL.createObjectURL(blob);
                await this.ctx.audioWorklet.addModule(url);
                URL.revokeObjectURL(url);

                this.source = this.ctx.createMediaStreamSource(this.stream);
                this.node = new AudioWorkletNode(this.ctx, "capture-processor");
                this.muteGain = this.ctx.createGain();
                this.muteGain.gain.value = 0;

                this.source.connect(this.node);
                this.node.connect(this.muteGain);
                this.muteGain.connect(this.ctx.destination);

                this.resampler = new AudioResampler(this.ctx.sampleRate, 16000);
                this._buf = new Float32Array(0);
                this.node.port.onmessage = (e) => this._onChunk(e.data);
                this.running = true;
                console.log(`[Recorder] 设备采样率 ${this.ctx.sampleRate}Hz → 16000Hz`);
                return this.ctx.sampleRate;
            }

            _onChunk(chunk) {
                if (!this.running) return;
                const res = this.resampler.process(chunk);
                if (!res.length) return;
                let merged;
                if (this._buf.length === 0) {
                    merged = res;
                } else {
                    merged = new Float32Array(this._buf.length + res.length);
                    merged.set(this._buf);
                    merged.set(res, this._buf.length);
                }
                let off = 0;
                while (merged.length - off >= 512) {
                    const f = merged.slice(off, off + 512);
                    off += 512;
                    if (this.onFrame) this.onFrame(f);
                }
                this._buf = off < merged.length ? merged.slice(off) : new Float32Array(0);
            }

            async stop() {
                this.running = false;
                try { if (this.node) this.node.port.onmessage = null; } catch (e) {}
                try { if (this.source) this.source.disconnect(); } catch (e) {}
                try { if (this.node) this.node.disconnect(); } catch (e) {}
                try { if (this.muteGain) this.muteGain.disconnect(); } catch (e) {}
                try { if (this.stream) this.stream.getTracks().forEach(t => t.stop()); } catch (e) {}
                try { if (this.ctx && this.ctx.state !== "closed") await this.ctx.close(); } catch (e) {}
                this.ctx = null; this.stream = null; this.node = null;
                this.source = null; this.muteGain = null; this._buf = new Float32Array(0);
            }
        }

        // ==================== ASRStateManager ====================
        const ASRState = { IDLE: "idle", LISTENING: "listening", SPEAKING: "speaking", PROCESSING: "processing" };
        class ASRStateManager {
            constructor(onChange) { this.state = ASRState.IDLE; this.onChange = onChange || null; }
