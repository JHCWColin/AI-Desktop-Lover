        // ==================== LLMController ====================
        class LLMController {
            async *streamChat(messages, apiBaseUrl, apiKey, model) {
                console.log("[LLM] 开始流式请求...");
                const body = { model, messages, stream: true, max_tokens: 300, temperature: 0.8 };
                const response = await fetch(`${apiBaseUrl}/chat/completions`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                if (!response.ok) throw new Error(`LLM API 错误 (${response.status})`);
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop() || "";
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || !trimmed.startsWith("data: ")) continue;
                        const jsonStr = trimmed.slice(6);
                        if (jsonStr === "[DONE]") { console.log("[LLM] 流式完成"); return; }
                        try {
                            const parsed = JSON.parse(jsonStr);
                            const delta = parsed.choices?.[0]?.delta?.content;
                            if (delta) yield delta;
                        } catch (e) {}
                    }
                }
                if (buffer.trim()) {
                    const trimmed = buffer.trim();
                    if (trimmed.startsWith("data: ") && trimmed.slice(6) !== "[DONE]") {
                        try {
                            const delta = JSON.parse(trimmed.slice(6)).choices?.[0]?.delta?.content;
                            if (delta) yield delta;
                        } catch (e) {}
                    }
                }
            }
        }

        // ==================== TTSController ====================
        class TTSController {
            async generateSpeech(text, apiBaseUrl, apiKey, model, voice) {
                const cleanText = text.replace(/.∗?.*?.∗?/g, "").trim();
                console.log(`[TTS] 生成语音: "${cleanText.substring(0, 30)}..."`);
                const body = { model, input: cleanText, voice, response_format: "mp3", speed: 1.0 };
                const response = await fetch(`${apiBaseUrl}/audio/speech`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                if (!response.ok) throw new Error(`TTS API 错误 (${response.status})`);
                const clone = response.clone();
                const responseText = await clone.text();
                try {
                    const json = JSON.parse(responseText);
                    if (json.output?.audio?.url) return json.output.audio.url;
                } catch (e) {}
                return await response.blob();
            }
        }

        // ==================== 播放队列 ====================
        class PlaybackQueue {
            constructor() {
                this.queue = [];
                this.isPlaying = false;
                this._stopped = false;
                this.onAllComplete = null;
                this.onItemStart = null;
                this.onStop = null;
                this._currentAudio = null;
                this._nextTimer = null;
            }
            enqueue(item) {
                this.queue.push(item);
                if (!this.isPlaying && !this._stopped) this._playNext();
            }
            async _playNext() {
                if (this._stopped || this.queue.length === 0) {
                    this.isPlaying = false;
                    if (this._stopped && this.queue.length > 0) this.queue = [];
                    if (this.queue.length === 0 && this.onAllComplete && !this._stopped) this.onAllComplete();
                    return;
                }
                this.isPlaying = true;
                const item = this.queue.shift();

                expressionController.setExpression(item.expression);
                if (this.onItemStart) this.onItemStart(item);

                let audioSource;
                try {
                    audioSource = await item.ttsPromise;
                } catch (e) {
                    console.warn("TTS生成失败，跳过一句");
                    this._playNext();
                    return;
                }
                if (this._stopped) { this.isPlaying = false; return; }

                let audio;
                if (typeof audioSource === "string") {
                    audio = new Audio(audioSource);
                } else {
                    const audioUrl = URL.createObjectURL(audioSource);
                    audio = new Audio(audioUrl);
                    audio.addEventListener("ended", () => URL.revokeObjectURL(audioUrl), { once: true });
                }
                this._currentAudio = audio;

                if (item.animFile && animationController.hasAction(item.animFile)) {
                    animationController.playAction(item.animFile, 0.3);
                } else {
                    animationController.returnToIdle(0.3);
                }

                audio.play().catch(e => console.warn("音频播放失败:", e));

                const handleAudioEnded = () => {
                    if (this._stopped) return;
                    if (this.queue.length > 0) {
                        this._nextTimer = setTimeout(() => {
                            this._nextTimer = null;
                            this._currentAudio = null;
                            this._playNext();
                        }, 200);
                    } else {
                        this._currentAudio = null;
                        this.isPlaying = false;
                        if (this.onAllComplete && !this._stopped) this.onAllComplete();
                    }
                };
                audio.onended = handleAudioEnded;
                audio.onerror = handleAudioEnded;
            }
            stop() {
                this._stopped = true;
                if (this._currentAudio) { try { this._currentAudio.pause(); this._currentAudio = null; } catch (e) {} }
                if (this._nextTimer) { clearTimeout(this._nextTimer); this._nextTimer = null; }
                this.queue = [];
                this.isPlaying = false;
                animationController.returnToIdle(0.3);
                expressionController.resetToDefault();
                if (this.onStop) this.onStop();
            }
            reset() {
                this._stopped = false;
                this.queue = [];
                this.isPlaying = false;
                this._currentAudio = null;
                if (this._nextTimer) { clearTimeout(this._nextTimer); this._nextTimer = null; }
            }
            getQueueLength() { return this.queue.length + (this.isPlaying ? 1 : 0); }
        }

        // ==================== 行解析（动作/表情标签） ====================
        function parseLine(line) {
            const trimmed = line.trim();
            if (!trimmed) return null;
            let actionTag = null;
            let exprTag = null;
            let remaining = trimmed;
            const tagRegex = /^([^]+)\]\s*/;
            while (true) {
                const match = remaining.match(tagRegex);
                if (!match) break;
                const tag = match[1].toLowerCase();
                if (VALID_ACTION_TAGS.has(tag)) { if (!actionTag) actionTag = tag; }
                else if (VALID_EXPR_TAGS.has(tag)) { if (!exprTag) exprTag = tag; }
                else break;
                remaining = remaining.slice(match[0].length);
            }
            const text = remaining.trim();
            if (!text && !actionTag && !exprTag) return null;
            return {
                action: actionTag || null,
                expression: exprTag ? EXPR_TAG_MAP[exprTag] : DEFAULT_EXPR,
                animFile: (actionTag && actionTag !== "waiting") ? (ACTION_TAG_MAP[actionTag] || null) : null,
                text: text || "",
            };
        }

        // =====================================================================
        // ============== AIController（本地 ASR 流水线 + 打断 + LLM/TTS） =======
        // =====================================================================
        // 关键修复点：
        //  - VAD 调用不静默吞错（节流打印 + UI 提示），VAD 挂了仍用 RMS 能量兜底
        //  - 实时 VAD 调试日志（约 500ms 一次：prob/rms/state/queue）
        //  - 能量兜底启动：prob 或 rms 任意为真即视为有声
        //  - 更稳妥的默认门限
        //  - ASR 进入点 / 结果日志
        //  - partial ASR 不阻塞最终 ASR（最多等 300ms）
        //  - VAD 输入传 frame.slice() 副本，原始 frame 进缓冲（防 proxy detach 损坏数据）
        class AIController {
            constructor() {
                this.recorder = new AudioWorkletRecorder();
                this.vad = new SileroVADController();
                this.asr = new SenseVoiceASRController();
                this.llm = new LLMController();
                this.tts = new TTSController();
                this.playbackQueue = new PlaybackQueue();
                this.transcript = new TranscriptBuffer(
                    document.getElementById("subtitleBar"),
                    document.getElementById("subtitleUser")
                );
                this.aiSubEl = document.getElementById("subtitleAI");
                this.stateMgr = new ASRStateManager();

                this.modelReady = false;
                this.uiState = "idle";
                this.conversationHistory = [];

                // ===== VAD 门限（已按需求调低，更稳妥）=====
                this.startThreshold = 0.35;
                this.startThresholdDuringTTS = 0.65;
                this.endThreshold = 0.25;
                this.startFrames = 2;
                this.startFramesDuringTTS = 6;
                this.endpointFrames = 28;
                this.preRollFrames = 12;
                this.partialIntervalFrames = 9;
                this.maxSpeechFrames = Math.floor(30000 / 32);
                this.longSilenceFrames = Math.floor(12000 / 32);

                // ===== RMS 能量兜底阈值 =====
                this.vadStartByEnergyThreshold = 0.012;
                this.vadEndByEnergyThreshold = 0.008;

                // ===== 调试 =====
                this.debugVad = true;
                this._lastVadDebug = 0;
                this._lastVadErrLog = 0;
                this._lastPartialErrLog = 0;

                this._frameQueue = [];
                this._draining = false;
                this._reset();

                this.playbackQueue.onAllComplete = () => this._onPlaybackComplete();
                this.playbackQueue.onItemStart = (item) => this._showAISubtitle(item.text);
                this.playbackQueue.onStop = () => this._hideAISubtitle();
            }

            _reset() {
                this._speech = [];
                this._preRoll = [];
                this._startCount = 0;
                this._silenceCount = 0;
                this._speakFrames = 0;
                this._idleFrames = 0;
                this._framesSincePartial = 0;
                this._asrBusy = false;
                this._abortFlag = false;
                this._processing = false;
            }

            async initModels() {
                this._setModelStatus("loading", "ASR 加载中…");
                try {
                    if (!ort) throw new Error("ONNX Runtime Web 未加载");
                    ort.env.wasm.wasmPaths = ORT_WASM_PATH;
                    ort.env.wasm.proxy = true;
                    const threads = self.crossOriginIsolated ? Math.min(4, navigator.hardwareConcurrency || 4) : 1;
                    ort.env.wasm.numThreads = threads;
                    try { ort.env.wasm.simd = true; } catch (e) {}

                    const t0 = performance.now();
                    await this.asr.init(ASR_MODEL_URL, ASR_TOKENS_URL, ASR_CMVN_URL);
                    // VAD init 内部已包含 IO 探测 + warmup 自检（失败会 throw）
                    await this.vad.init(VAD_MODEL_URL);

                    // ASR 预热（VAD 的预热已在其 init 内完成）
                    try {
                        await this.asr.recognize(new Float32Array(Math.floor(16000 * 0.3)));
                    } catch (e) { console.warn("[ASR] 预热警告:", e); }

                    const dt = Math.round(performance.now() - t0);
                    this.modelReady = true;
                    this._setModelStatus("ready", `ASR 已就绪 · dtms⋅{dt}ms ·dtms⋅{threads}线程`);
                    this._updateUI();
                    toast.success(`本地语音识别就绪 (SenseVoice, ${dt}ms)`);
                } catch (e) {
                    console.error(e);
                    this.modelReady = false;
                    this._setModelStatus("error", "ASR/VAD 加载失败：" + (e.message || e));
                    toast.error("模型加载/自检失败：请查看控制台 [VAD]/[ASR] 日志，并确认 model/tokens/am.mvn/silero 已放在同目录并经本地服务器访问", 7000);
                    this._updateUI();
                }
            }

            async start() {
                if (this.uiState === "running") return;
                if (!this.modelReady) { toast.warn("ASR 模型尚未就绪，请稍候"); return; }
                if (!currentVRM) { toast.warn("请先加载 VRM 模型"); return; }
                if (!apiKeyInput.value.trim()) { toast.warn("请先在 API 设置中填写 API Key"); return; }

                this._reset();
                this.conversationHistory = [];
                this.vad.reset();
                this.playbackQueue.reset();
                this._frameQueue = [];

                try {
                    await this.recorder.start((frame) => this._enqueueFrame(frame));
                    this.uiState = "running";
                    this.stateMgr.set(ASRState.LISTENING);
                    this._updateUI();
                    this.transcript.showListening();
                    this._hideAISubtitle();
                    animationController.returnToIdle(0.3);
                    toast.success("AI 模式已启动，开始聆听…");
                } catch (e) {
                    this.uiState = "idle";
                    this._updateUI();
                    toast.error("麦克风启动失败：" + (e.message || e));
                }
            }

            async stop() {
                if (this.uiState === "idle") return;
                this.uiState = "stopping";
                this._updateUI();
                this._abortFlag = true;
                this.playbackQueue.stop();
                await this.recorder.stop();
                this._frameQueue = [];
                this._reset();
                this.stateMgr.set(ASRState.IDLE);
                this.transcript.hide();
                this._hideAISubtitle();
                animationController.returnToIdle(0.3);
                expressionController.resetToDefault();
                this.uiState = "idle";
                this._updateUI();
                toast.info("AI 模式已停止");
            }

            _enqueueFrame(frame) {
                if (this.uiState !== "running") return;
                this._frameQueue.push(frame);
                if (!this._draining) this._drain();
            }
            async _drain() {
                this._draining = true;
                while (this._frameQueue.length && this.uiState === "running") {
                    const frame = this._frameQueue.shift();
                    try { await this._handleFrame(frame); } catch (e) { console.warn("[frame]", e); }
                }
                this._draining = false;
            }

            async _handleFrame(frame) {
                // 先算 RMS（用于调试和能量兜底）—— 在 VAD detach 之前算，且用原始 frame
                const rms = computeRMS(frame);

                // ===== VAD 推理：不静默吞错 =====
                // 传入 frame.slice() 副本：proxy 模式 run 会 detach buffer，
                // 原始 frame 必须保留给 preRoll / speech 缓冲，否则最终 ASR 会拿到空数据。
                let prob = 0;
                let vadOk = true;
                try {
                    prob = await this.vad.process(frame.slice());
                } catch (e) {
                    vadOk = false;
                    const now = performance.now();
                    if (now - this._lastVadErrLog > 1000) {
                        this._lastVadErrLog = now;
                        console.error("[VAD] 推理失败");
                        console.error("  error:", e);
                        console.error("  session.inputNames:", this.vad.session?.inputNames);
                        console.error("  session.outputNames:", this.vad.session?.outputNames);
                        console.error("  frame.length:", frame.length);
                        console.error("  stateMode:", this.vad.stateMode,
                            "stateShape:", this.vad.stateShape,
                            "hShape:", this.vad.hShape, "cShape:", this.vad.cShape);
                        toast.error("[VAD] 推理失败（已转能量兜底）：" + (e?.message || e), 4000);
                    }
                    // 不 return：继续用 RMS 能量兜底
                }

                const isSpeaking = this.stateMgr.is(ASRState.SPEAKING);
                const aiTalking = this.playbackQueue.isPlaying || this._processing;

                // ===== 实时调试日志（约 500ms 一次）=====
                if (this.debugVad) {
                    const now = performance.now();
                    if (now - this._lastVadDebug > 500) {
                        this._lastVadDebug = now;
                        console.log(
                            `[VAD] prob=prob.toFixed(3)rms={prob.toFixed(3)} rms=prob.toFixed(3)rms={rms.toFixed(3)} ` +
                            `state=this.stateMgr.statequeue={this.stateMgr.state} queue=this.stateMgr.statequeue={this._frameQueue.length}` +
                            (vadOk ? "" : " (vad-error→energy-fallback)")
                        );
                    }
                }

                if (!isSpeaking) {
                    this._preRoll.push(frame);
                    if (this._preRoll.length > this.preRollFrames) this._preRoll.shift();

                    const thr = aiTalking ? this.startThresholdDuringTTS : this.startThreshold;
                    const need = aiTalking ? this.startFramesDuringTTS : this.startFrames;
                    // AI 说话时能量阈值适当抬高，减少被自身 TTS 误触发
                    const energyStartThr = aiTalking
                        ? this.vadStartByEnergyThreshold * 1.6
                        : this.vadStartByEnergyThreshold;

                    // prob 或 rms 任意表示有声，即视为语音开始（不完全依赖 prob>=0.5）
                    const isVoiceStart = (prob >= thr) || (rms >= energyStartThr);

                    if (isVoiceStart) {
                        this._startCount++;
                    } else {
                        this._startCount = 0;
                        this._idleFrames++;
                    }

                    if (this._startCount >= need) {
                        this._beginSpeech();
                    } else if (!aiTalking && this._idleFrames >= this.longSilenceFrames) {
                        this._idleFrames = 0;
                        this._triggerProactive();
                    }
                } else {
                    this._speech.push(frame);
                    this._speakFrames++;

                    // prob 或 rms 任意表示有声，即视为仍在说话
                    const isVoiceKeep = (prob >= this.endThreshold) || (rms >= this.vadEndByEnergyThreshold);
                    if (isVoiceKeep) this._silenceCount = 0;
                    else this._silenceCount++;

                    this._framesSincePartial++;
                    if (this._framesSincePartial >= this.partialIntervalFrames && !this._asrBusy) {
                        this._framesSincePartial = 0;
                        this._runPartial();
                    }

                    if (this._silenceCount >= this.endpointFrames || this._speakFrames >= this.maxSpeechFrames) {
                        this._endSpeech();
                    }
                }
            }

            _beginSpeech() {
                this._bargeIn();
                this.stateMgr.set(ASRState.SPEAKING);
                this._speech = this._preRoll.slice();
                this._preRoll = [];
                this._startCount = 0;
                this._silenceCount = 0;
                this._speakFrames = this._speech.length;
                this._framesSincePartial = 0;
                this._idleFrames = 0;
                this.transcript.setPartial("");
                console.log("🎤 检测到说话");
                toast.info("🎤 检测到说话", 700);
            }

            _bargeIn() {
                const wasActive = this.playbackQueue.isPlaying ||
                    this.playbackQueue.getQueueLength() > 0 || this._processing;
                this._abortFlag = true;
                this.playbackQueue.stop();
                this._hideAISubtitle();
                this._processing = false;
                if (wasActive) animationController.returnToIdle(0.2);
            }

            async _runPartial() {
                if (this._asrBusy) return;
                this._asrBusy = true;
                const snapshot = mergeFloat32(this._speech);
                try {
                    const text = await this.asr.recognize(snapshot);
                    if (this.stateMgr.is(ASRState.SPEAKING)) this.transcript.setPartial(text);
                } catch (e) {
                    const now = performance.now();
                    if (now - this._lastPartialErrLog > 2000) {
                        this._lastPartialErrLog = now;
                        console.warn("[ASR] partial 识别失败:", e);
                    }
                } finally {
                    this._asrBusy = false;
                }
            }

            async _endSpeech() {
                const frames = this._speech;
                this.stateMgr.set(ASRState.PROCESSING);
                this._processing = true;
                this._silenceCount = 0;
                this._speakFrames = 0;
                this._framesSincePartial = 0;
                this._speech = [];
                this._preRoll = [];
                const audio = mergeFloat32(frames);

                // partial 正在跑：最多等待 300ms，然后强制接管，避免 _asrBusy 卡死最终识别
                const waitStart = performance.now();
                while (this._asrBusy && (performance.now() - waitStart) < 300) {
                    await new Promise(r => setTimeout(r, 10));
                }
                this._asrBusy = true;

                console.log("[ASR] final audio seconds:", (audio.length / 16000).toFixed(2), "samples:", audio.length);

                let userText = "";
                try {
                    userText = await this.asr.recognize(audio);
                } catch (e) {
                    console.warn("[ASR] 最终识别失败:", e);
                } finally {
                    this._asrBusy = false;
                }

                console.log("[ASR] final text:", userText);

                this.stateMgr.set(ASRState.LISTENING);

                if (!userText || !userText.trim()) {
                    this._processing = false;
                    this.transcript.setPartial("");
                    return;
                }
                this.transcript.commit(userText.trim());
                await this._respond(userText.trim());
            }

            _addToHistory(role, content) {
                this.conversationHistory.push({ role, content });
                if (this.conversationHistory.length > 6) this.conversationHistory = this.conversationHistory.slice(-6);
            }

            _apiCfg() {
                return {
                    apiKey: apiKeyInput.value.trim(),
                    apiBaseUrl: apiBaseUrlInput.value.trim() || "https://run.v3.cm/v1",
                    llmModel: llmModelInput.value.trim() || "gemini-2.5-flash",
                    ttsModel: ttsModelInput.value.trim() || "qwen-tts",
                    ttsVoice: ttsVoiceInput.value.trim() || "Cherry",
                };
            }

            async _consumeStream(messages, cfg) {
                this._llmBuffer = "";
                let fullAiText = "";
                const gen = this.llm.streamChat(messages, cfg.apiBaseUrl, cfg.apiKey, cfg.llmModel);

                const flush = (line) => {
                    const parsed = parseLine(line);
                    if (!parsed || !parsed.text) return;
                    fullAiText += (fullAiText ? " " : "") + parsed.text;
                    const ttsPromise = this.tts
                        .generateSpeech(parsed.text, cfg.apiBaseUrl, cfg.apiKey, cfg.ttsModel, cfg.ttsVoice)
                        .catch(e => { throw e; });
                    this.playbackQueue.enqueue({
                        animFile: parsed.animFile, expression: parsed.expression, text: parsed.text, ttsPromise,
                    });
                };

                for await (const delta of gen) {
                    if (this._abortFlag) break;
                    this._llmBuffer += delta;
                    const lines = this._llmBuffer.split("\n");
                    this._llmBuffer = lines.pop() || "";
                    for (const line of lines) {
                        if (this._abortFlag) break;
                        flush(line);
                    }
                }
                if (!this._abortFlag && this._llmBuffer.trim()) flush(this._llmBuffer);
                return fullAiText;
            }

            async _respond(userText) {
                this._processing = true;
                this._abortFlag = false;
                this.playbackQueue.reset();
                const cfg = this._apiCfg();
                try {
                    const systemPrompt = `你是用户温柔的猫娘女友。一次回复最多四句话。每句话单独占一行。
动作标签：${...VALIDACTIONTAGS...VALID_ACTION_TAGS...VALIDA​CTIONT​AGS.map(t => `${t}`).join(" ")}
表情标签：${...VALIDEXPRTAGS...VALID_EXPR_TAGS...VALIDE​XPRT​AGS.map(t => `${t}`).join(" ")}
规则：每句首必须包含一个动作标签和一个表情标签，未指定默认[relax]`;
                    const messages = role:"system",content:systemPrompt,...this.conversationHistory.slice(−6),role:"user",content:userText,{ role: "system", content: systemPrompt },
                        ...this.conversationHistory.slice(-6),
                        { role: "user", content: userText },role:"system",content:systemPrompt,...this.conversationHistory.slice(−6),role:"user",content:userText,;
                    const fullAiText = await this._consumeStream(messages, cfg);
                    if (fullAiText.trim()) {
                        this._addToHistory("user", userText);
                        this._addToHistory("assistant", fullAiText.trim());
                    }
                    if (this.playbackQueue.getQueueLength() === 0 && !this.playbackQueue.isPlaying) {
                        this._onPlaybackComplete();
                    }
                } catch (e) {
                    if (!this._abortFlag) {
                        toast.error("处理出错：" + (e.message || "未知错误"));
                        this._onPlaybackComplete();
                    }
                }
            }

            async _triggerProactive() {
                if (this._processing || this.playbackQueue.isPlaying) return;
                this._processing = true;
                this._abortFlag = false;
                this.playbackQueue.reset();
                const cfg = this._apiCfg();
                try {
                    const systemPrompt = `你是用户温柔的猫娘女友。用户已沉默，请主动关心或撒娇。一次回复最多两句话。每句话单独占一行。包含动作标签和表情标签。`;
                    const messages = role:"system",content:systemPrompt,...this.conversationHistory.slice(−6),role:"user",content:"用户当前处于沉默状态。",{ role: "system", content: systemPrompt },
                        ...this.conversationHistory.slice(-6),
                        { role: "user", content: "用户当前处于沉默状态。" },role:"system",content:systemPrompt,...this.conversationHistory.slice(−6),role:"user",content:"用户当前处于沉默状态。",;
                    const fullAiText = await this._consumeStream(messages, cfg);
                    if (fullAiText.trim()) {
                        this._addToHistory("user", "用户当前处于沉默状态。");
                        this._addToHistory("assistant", fullAiText.trim());
                    }
                    if (this.playbackQueue.getQueueLength() === 0 && !this.playbackQueue.isPlaying) {
                        this._onPlaybackComplete();
                    }
                } catch (e) {
                    if (!this._abortFlag) this._onPlaybackComplete();
                }
            }

            _onPlaybackComplete() {
                if (this.uiState !== "running") return;
                this._processing = false;
                this._idleFrames = 0;
                this._hideAISubtitle();
                this.transcript.setPartial("");
                animationController.returnToIdle(0.4);
                expressionController.resetToDefault();
            }

            _showAISubtitle(text) {
                const t = (text || "").replace(/.∗?.*?.∗?/g, "").trim();
                if (!t) return;
                this.aiSubEl.style.display = "block";
                this.aiSubEl.innerHTML = '<span class="subtitle-label">桌宠</span><span class="subtitle-text"></span>';
                this.aiSubEl.querySelector(".subtitle-text").textContent = t;
                this.transcript.barEl.classList.add("show");
            }
            _hideAISubtitle() {
                this.aiSubEl.style.display = "none";
                this.aiSubEl.textContent = "";
            }

            _setModelStatus(kind, text) {
                const dot = document.getElementById("modelStatusDot");
                const t = document.getElementById("modelStatusText");
                dot.classList.remove("idle", "loading", "ready", "error");
                dot.classList.add(kind === "loading" ? "loading" : kind === "ready" ? "ready" : kind === "error" ? "error" : "idle");
                t.textContent = text;
            }

            _updateUI() {
                const dot = document.getElementById("aiStatusDot");
                const text = document.getElementById("aiStatusText");
                const btnStart = document.getElementById("btnStartAI");
                const btnStop = document.getElementById("btnStopAI");
                const info = document.getElementById("aiInfo");

                dot.classList.remove("idle", "running", "stopped");
                if (this.uiState === "idle") {
                    dot.classList.add("idle");
                    text.textContent = this.modelReady ? "未启动（模型就绪）" : "未启动";
                    btnStart.disabled = !this.modelReady;
                    btnStop.disabled = true;
                    info.style.display = "none";
                } else if (this.uiState === "running") {
                    dot.classList.add("running");
                    text.textContent = "AI模式运行中";
                    btnStart.disabled = true;
                    btnStop.disabled = false;
                    info.style.display = "block";
                    info.textContent = "🎤 正在聆听… 可随时打断";
                } else if (this.uiState === "stopping") {
                    dot.classList.add("stopped");
                    text.textContent = "正在停止…";
                    btnStart.disabled = true;
                    btnStop.disabled = true;
                    info.style.display = "block";
                    info.textContent = "⏳ 正在清理资源…";
                }
            }
        }

        const aiController = new AIController();
        aiController._updateUI();
        aiController.initModels();

        document.getElementById("btnStartAI").addEventListener("click", () => aiController.start());
        document.getElementById("btnStopAI").addEventListener("click", () => aiController.stop());

        window.addEventListener("beforeunload", () => {
            if (aiController.uiState === "running") aiController.stop();
        });

        console.log("🚀 本地语音流水线就绪：AudioWorklet → 重采样16k → Silero VAD(自适应IO/warmup/能量兜底) → SenseVoice ONNX → 实时字幕 → LLM → TTS（支持打断）");

    </script>
</body>

</html>
