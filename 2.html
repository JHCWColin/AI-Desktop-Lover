<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM + VRMA Viewer</title>

    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(20, 20, 40, 0.85);
            --text: #e0e0e0;
            --accent: #5b9bd5;
            --accent-active: #7ab8f5;
            --border: rgba(255, 255, 255, 0.12);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.16);
            --preset-active: #3a6fc5;
            --preset-hover: #4a80d8;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            --radius: 10px;
            --transition: 0.2s ease;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #ui {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 18px 20px;
            border-radius: var(--radius);
            color: var(--text);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            min-width: 240px;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .ui-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ui-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #aaa;
            margin-bottom: 2px;
        }

        .ui-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        input[type="file"] {
            color: #ccc;
            font-size: 12px;
            max-width: 200px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: background var(--transition);
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--btn-hover);
        }

        button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
        }

        button:hover {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.3);
        }

        #playBtn {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 10px 20px;
            font-size: 14px;
        }

        #playBtn:hover {
            background: var(--accent-active);
            border-color: var(--accent-active);
        }

        /* ---- 预设按钮组 ---- */
        .preset-group {
            display: flex;
            gap: 3px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 7px;
            padding: 3px;
        }

        .preset-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: #999;
            padding: 7px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all var(--transition);
        }

        .preset-btn:hover {
            color: #ddd;
            background: rgba(255, 255, 255, 0.06);
        }

        .preset-btn.active {
            background: var(--preset-active);
            color: #fff;
            box-shadow: 0 2px 8px rgba(58, 111, 197, 0.4);
        }

        .preset-btn.active:hover {
            background: var(--preset-hover);
        }

        /* ---- 状态指示器 ---- */
        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }

        .status-dot.on {
            background: #4caf50;
            box-shadow: 0 0 6px rgba(76, 175, 80, 0.6);
        }

        .status-dot.off {
            background: #666;
        }

        .info-text {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }

        /* ---- 响应式 ---- */
        @media (max-width: 480px) {
            #ui {
                top: 8px;
                left: 8px;
                padding: 12px 14px;
                gap: 10px;
                min-width: auto;
                max-width: calc(100vw - 32px);
            }
            .preset-btn {
                padding: 6px 7px;
                font-size: 10px;
            }
            button {
                padding: 7px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div id="ui">

        <!-- 模型加载 -->
        <div class="ui-section">
            <span class="ui-label">📦 VRM 模型</span>
            <input id="vrmInput" type="file" accept=".vrm">
        </div>

        <!-- 动画加载 -->
        <div class="ui-section">
            <span class="ui-label">🎬 VRMA 动画</span>
            <input id="vrmaInput" type="file" accept=".vrma">
        </div>

        <!-- 播放按钮 -->
        <button id="playBtn">▶ 播放动画</button>

        <!-- 渲染精细度预设 -->
        <div class="ui-section">
            <span class="ui-label">🎨 渲染精细度</span>
            <div class="preset-group" id="presetGroup">
                <button class="preset-btn" data-preset="low">低</button>
                <button class="preset-btn" data-preset="medium">标准</button>
                <button class="preset-btn active" data-preset="high">高</button>
                <button class="preset-btn" data-preset="ultra">极致</button>
            </div>
            <span class="info-text" id="presetInfo">
                <span class="status-dot on"></span>像素比 1× &nbsp;|&nbsp;
                <span class="status-dot on"></span>抗锯齿 &nbsp;|&nbsp;
                <span class="status-dot on"></span>阴影
            </span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
                "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
        import { VRMLoaderPlugin } from "@pixiv/three-vrm";
        import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from "@pixiv/three-vrm-animation";

        // ==================== 渲染质量预设定义 ====================
        const QUALITY_PRESETS = {
            low: {
                label: "低",
                pixelRatio: 0.5,
                antialias: false,
                shadows: false,
                shadowMapSize: 512,
                shadowMapType: THREE.PCFShadowMap,
            },
            medium: {
                label: "标准",
                pixelRatio: 1.0,
                antialias: false,
                shadows: false,
                shadowMapSize: 1024,
                shadowMapType: THREE.PCFShadowMap,
            },
            high: {
                label: "高",
                pixelRatio: 1.0,
                antialias: true,
                shadows: true,
                shadowMapSize: 2048,
                shadowMapType: THREE.PCFShadowMap,
            },
            ultra: {
                label: "极致",
                pixelRatio: 2.0,
                antialias: true,
                shadows: true,
                shadowMapSize: 4096,
                shadowMapType: THREE.PCFSoftShadowMap,
            },
        };

        // 当前激活的预设
        let currentPreset = "high";
        const preset = () => QUALITY_PRESETS[currentPreset];

        // ==================== 场景初始化 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(
            35,
            window.innerWidth / window.innerHeight,
            0.1,
            100,
        );
        camera.position.set(0, 1.4, 3);

        // ==================== 灯光系统 ====================
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(1, 1.5, 1);
        scene.add(directionalLight);

        // 初始化阴影配置（根据默认预设 "high"）
        function configureLightShadows(light, presetKey) {
            const cfg = QUALITY_PRESETS[presetKey];
            light.castShadow = cfg.shadows;
            if (cfg.shadows) {
                light.shadow.mapSize.width = cfg.shadowMapSize;
                light.shadow.mapSize.height = cfg.shadowMapSize;
                light.shadow.camera.left = -2;
                light.shadow.camera.right = 2;
                light.shadow.camera.top = 3;
                light.shadow.camera.bottom = -0.5;
                light.shadow.camera.near = 0.1;
                light.shadow.camera.far = 15;
                light.shadow.bias = -0.0003;
                light.shadow.normalBias = 0.02;
            }
        }
        configureLightShadows(directionalLight, currentPreset);

        // ==================== 阴影接收地面 ====================
        const groundGeometry = new THREE.CircleGeometry(2.5, 48);
        const groundMaterial = new THREE.ShadowMaterial({ opacity: 0.45 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0.001;
        ground.receiveShadow = true;
        scene.add(ground);

        // ==================== 渲染器 ====================
        let renderer = new THREE.WebGLRenderer({
            antialias: preset().antialias,
            powerPreference: "high-performance",
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(preset().pixelRatio, window.devicePixelRatio));
        renderer.shadowMap.enabled = preset().shadows;
        renderer.shadowMap.type = preset().shadowMapType;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // ==================== OrbitControls ====================
        let controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 0.8;
        controls.maxDistance = 8;
        controls.maxPolarAngle = Math.PI * 0.75;
        controls.update();

        // ==================== 运行时状态 ====================
        const clock = new THREE.Clock();
        let currentVRM = null;
        let mixer = null;
        let currentVRMA = null;

        // ==================== 渲染循环 ====================
        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1); // 防止大帧跳跃

            if (mixer) {
                mixer.update(delta);
            }

            if (currentVRM) {
                currentVRM.update(delta);
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // ==================== 辅助函数：重建渲染器 ====================
        function rebuildRenderer(antialias) {
            // 保存旧状态
            const oldCanvas = renderer.domElement;
            const oldTarget = controls.target.clone();
            const wasShadowEnabled = renderer.shadowMap.enabled;
            const oldShadowType = renderer.shadowMap.type;

            // 销毁旧 controls
            controls.dispose();

            // 创建新渲染器
            const newRenderer = new THREE.WebGLRenderer({
                antialias: antialias,
                powerPreference: "high-performance",
            });
            newRenderer.setSize(window.innerWidth, window.innerHeight);
            newRenderer.setPixelRatio(Math.min(preset().pixelRatio, window.devicePixelRatio));
            newRenderer.shadowMap.enabled = wasShadowEnabled;
            newRenderer.shadowMap.type = oldShadowType;
            newRenderer.outputColorSpace = THREE.SRGBColorSpace;
            newRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            newRenderer.toneMappingExposure = 1.0;

            // 替换 DOM 中的 canvas
            if (oldCanvas.parentNode) {
                oldCanvas.parentNode.replaceChild(newRenderer.domElement, oldCanvas);
            } else {
                document.body.appendChild(newRenderer.domElement);
            }

            // 更新全局引用
            renderer = newRenderer;

            // 重建 controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.copy(oldTarget);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 0.8;
            controls.maxDistance = 8;
            controls.maxPolarAngle = Math.PI * 0.75;
            controls.update();
        }

        // ==================== 辅助函数：更新 VRM 模型阴影属性 ====================
        function updateVRMShadowProps() {
            if (!currentVRM) return;
            const enableShadows = preset().shadows;
            currentVRM.scene.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = enableShadows;
                    child.receiveShadow = enableShadows;
                }
            });
        }

        // ==================== 辅助函数：应用预设 ====================
        function applyPreset(presetKey) {
            const cfg = QUALITY_PRESETS[presetKey];
            const oldCfg = QUALITY_PRESETS[currentPreset];

            // 抗锯齿改变 → 需要重建渲染器
            if (cfg.antialias !== oldCfg.antialias) {
                rebuildRenderer(cfg.antialias);
            }

            // 像素比更新
            renderer.setPixelRatio(Math.min(cfg.pixelRatio, window.devicePixelRatio));
            renderer.setSize(window.innerWidth, window.innerHeight);

            // 阴影开关
            const shadowsToggled = cfg.shadows !== oldCfg.shadows;
            renderer.shadowMap.enabled = cfg.shadows;
            renderer.shadowMap.type = cfg.shadowMapType;
            directionalLight.castShadow = cfg.shadows;

            if (cfg.shadows && shadowsToggled) {
                // 重新配置阴影参数
                configureLightShadows(directionalLight, presetKey);
            }

            // 更新地面可见性相关（ShadowMaterial 自动处理，但 receiveShadow 需同步）
            ground.receiveShadow = cfg.shadows;

            // 更新 VRM 模型阴影
            updateVRMShadowProps();

            // 更新当前预设
            currentPreset = presetKey;

            // 更新 UI
            updatePresetUI();
        }

        // ==================== UI 更新函数 ====================
        function updatePresetUI() {
            const cfg = preset();

            // 按钮激活状态
            document.querySelectorAll(".preset-btn").forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.preset === currentPreset);
            });

            // 信息文本
            const infoEl = document.getElementById("presetInfo");
            const aaDot = cfg.antialias
                ? '<span class="status-dot on"></span>'
                : '<span class="status-dot off"></span>';
            const shDot = cfg.shadows
                ? '<span class="status-dot on"></span>'
                : '<span class="status-dot off"></span>';

            infoEl.innerHTML =
                `<span class="status-dot on"></span>像素比 ${cfg.pixelRatio.toFixed(1)}× &nbsp;|&nbsp;` +
                `${aaDot}抗锯齿 &nbsp;|&nbsp;` +
                `${shDot}阴影`;
        }

        // ==================== 预设按钮事件 ====================
        document.getElementById("presetGroup").addEventListener("click", (e) => {
            const btn = e.target.closest(".preset-btn");
            if (!btn) return;
            const presetKey = btn.dataset.preset;
            if (presetKey && presetKey !== currentPreset) {
                applyPreset(presetKey);
            }
        });

        // 初始化预设 UI
        updatePresetUI();

        // ==================== VRM 文件加载 ====================
        document.getElementById("vrmInput").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            loader.load(url, (gltf) => {
                // 移除旧模型
                if (currentVRM) {
                    scene.remove(currentVRM.scene);
                    if (mixer) {
                        mixer.stopAllAction();
                        mixer = null;
                    }
                    currentVRMA = null;
                }

                currentVRM = gltf.userData.vrm;
                scene.add(currentVRM.scene);

                // 应用当前阴影设置到新模型
                updateVRMShadowProps();

                console.log("✅ VRM 模型加载完成");
                console.log("   - 预设:", QUALITY_PRESETS[currentPreset].label);
                console.log("   - 像素比:", renderer.getPixelRatio());
                console.log("   - 抗锯齿:", preset().antialias ? "开启" : "关闭");
                console.log("   - 阴影:", preset().shadows ? "开启" : "关闭");
            });
        });

        // ==================== VRMA 动画文件加载 ====================
        document.getElementById("vrmaInput").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

            loader.load(url, (gltf) => {
                currentVRMA = gltf.userData.vrmAnimations[0];
                console.log("✅ VRMA 动画加载完成");
            });
        });

        // ==================== 播放按钮 ====================
        document.getElementById("playBtn").onclick = () => {
            if (!currentVRM) {
                console.warn("⚠️ 请先加载 VRM 模型");
                return;
            }
            if (!currentVRMA) {
                console.warn("⚠️ 请先加载 VRMA 动画");
                return;
            }

            // 停止旧动画
            if (mixer) {
                mixer.stopAllAction();
            }

            mixer = new THREE.AnimationMixer(currentVRM.scene);
            const clip = createVRMAnimationClip(currentVRMA, currentVRM);
            mixer.clipAction(clip).reset().play();

            console.log("▶ 动画开始播放");
        };

        // ==================== 窗口大小响应 ====================
        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==================== 键盘快捷键 ====================
        window.addEventListener("keydown", (e) => {
            // 数字键 1-4 快速切换预设
            const presetKeys = ["low", "medium", "high", "ultra"];
            const index = parseInt(e.key);
            if (index >= 1 && index <= 4 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                const targetKey = presetKeys[index - 1];
                if (targetKey !== currentPreset) {
                    applyPreset(targetKey);
                    console.log(`🎨 切换到预设: ${QUALITY_PRESETS[targetKey].label}`);
                }
            }
            // R 键重置视角
            if (e.key === "r" || e.key === "R") {
                if (!e.ctrlKey && !e.metaKey && !e.altKey) {
                    controls.target.set(0, 1.0, 0);
                    camera.position.set(0, 1.4, 3);
                    controls.update();
                    console.log("🔄 视角已重置");
                }
            }
        });

        console.log("🚀 VRM Viewer 初始化完成");
        console.log("   预设:", QUALITY_PRESETS[currentPreset].label);
        console.log("   快捷键: 数字键 1-4 切换预设 | R 重置视角");
        console.log("   预设详情:");
        for (const [key, cfg] of Object.entries(QUALITY_PRESETS)) {
            const marker = key === currentPreset ? " ← 当前" : "";
            console.log(
                `     [${cfg.label}] 像素比=${cfg.pixelRatio}× | ` +
                `抗锯齿=${cfg.antialias ? "开" : "关"} | ` +
                `阴影=${cfg.shadows ? "开" : "关"} | ` +
                `阴影贴图=${cfg.shadowMapSize}${marker}`,
            );
        }
    </script>

</body>
</html>
