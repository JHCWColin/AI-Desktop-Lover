<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM AI 聊天模式 · 语音交互</title>

    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(20, 20, 40, 0.9);
            --text: #e0e0e0;
            --accent: #5b9bd5;
            --accent-active: #7ab8f5;
            --border: rgba(255, 255, 255, 0.12);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.18);
            --preset-active: #3a6fc5;
            --preset-hover: #4a80d8;
            --shadow: 0 6px 28px rgba(0, 0, 0, 0.6);
            --radius: 12px;
            --transition: 0.2s ease;
            --danger: #e0556a;
            --danger-hover: #f07080;
            --success: #4caf84;
            --toast-bg: rgba(30, 30, 55, 0.95);
            --toast-error: #e0556a;
            --toast-warn: #f0a040;
            --toast-info: #5b9bd5;
            --toast-success: #4caf84;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d14;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #toastContainer {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 90vw;
            width: 420px;
        }

        .toast {
            pointer-events: auto;
            background: var(--toast-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            animation: toastSlideIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        .toast.removing {
            animation: toastSlideOut 0.3s cubic-bezier(0.55, 0.06, 0.68, 0.19) forwards;
        }

        .toast.error {
            border-left: 4px solid var(--toast-error);
        }

        .toast.warn {
            border-left: 4px solid var(--toast-warn);
        }

        .toast.info {
            border-left: 4px solid var(--toast-info);
        }

        .toast.success {
            border-left: 4px solid var(--toast-success);
        }

        .toast-icon {
            flex-shrink: 0;
            font-size: 18px;
        }

        .toast-msg {
            flex: 1;
            line-height: 1.4;
            word-break: break-word;
        }

        .toast-close {
            flex-shrink: 0;
            cursor: pointer;
            opacity: 0.6;
            font-size: 16px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #fff;
        }

        .toast-close:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes toastSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toastSlideOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        #ui {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 16px 18px;
            border-radius: var(--radius);
            color: var(--text);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            min-width: 290px;
            max-width: 390px;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
        }

        .ui-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ui-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #aaa;
            margin-bottom: 1px;
        }

        .ui-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="file"] {
            color: #ccc;
            font-size: 12px;
            max-width: 200px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: background var(--transition);
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--btn-hover);
        }

        input[type="text"],
        input[type="password"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            padding: 6px 10px;
            font-size: 12px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color var(--transition);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
        }

        button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        button:hover {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.3);
        }

        button:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.3);
        }

        button.btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        button.btn-primary:hover {
            background: var(--accent-active);
            border-color: var(--accent-active);
        }

        button.btn-danger {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
            font-weight: 600;
        }

        button.btn-danger:hover {
            background: var(--danger-hover);
            border-color: var(--danger-hover);
        }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
        }

        .ai-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .ai-status-dot.idle {
            background: #666;
        }

        .ai-status-dot.running {
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.6);
            animation: pulse 1.2s infinite;
        }

        .ai-status-dot.stopped {
            background: #f0a040;
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(76, 175, 80, 0.5);
            }
            50% {
                box-shadow: 0 0 18px rgba(76, 175, 80, 0.9);
            }
        }

        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #aaa;
            padding: 4px 0;
            user-select: none;
        }

        .collapsible-header:hover {
            color: #ccc;
        }

        .collapsible-arrow {
            transition: transform 0.25s ease;
            font-size: 10px;
        }

        .collapsible-arrow.open {
            transform: rotate(90deg);
        }

        .collapsible-content {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s ease;
        }

        .collapsible-content.open {
            max-height: 300px;
        }

        .anim-grid,
        .expr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 4px;
        }

        .anim-btn,
        .expr-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 7px 3px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anim-btn:hover:not(:disabled),
        .expr-btn:hover:not(:disabled) {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        .anim-btn.active-anim,
        .expr-btn.active-expr {
            background: var(--preset-active);
            border-color: #6a9ee6;
            color: white;
            box-shadow: 0 0 10px rgba(58, 111, 197, 0.45);
            font-weight: 600;
        }

        .preset-group {
            display: flex;
            gap: 3px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 7px;
            padding: 3px;
        }

        .preset-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: #999;
            padding: 6px 7px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all var(--transition);
        }

        .preset-btn:hover {
            color: #ddd;
            background: rgba(255, 255, 255, 0.06);
        }

        .preset-btn.active {
            background: var(--preset-active);
            color: #fff;
            box-shadow: 0 2px 8px rgba(58, 111, 197, 0.4);
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }

        .status-dot.on {
            background: #4caf50;
            box-shadow: 0 0 6px rgba(76, 175, 80, 0.5);
        }

        .status-dot.off {
            background: #666;
        }

        .info-text {
            font-size: 10px;
            color: #888;
            margin-top: 1px;
            line-height: 1.4;
        }

        .loading-text {
            color: #f0c040;
            font-size: 11px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            #ui {
                top: 6px;
                left: 6px;
                padding: 10px 12px;
                gap: 8px;
                min-width: auto;
                max-width: calc(100vw - 24px);
                max-height: calc(100vh - 20px);
                font-size: 11px;
            }
            .anim-btn,
            .expr-btn {
                padding: 5px 2px;
                font-size: 10px;
            }
            .preset-btn {
                padding: 5px 5px;
                font-size: 10px;
            }
            #toastContainer {
                width: calc(100vw - 20px);
                top: 8px;
            }
            .toast {
                font-size: 11px;
                padding: 10px 12px;
            }
        }
    </style>
</head>

<body>

    <div id="toastContainer"></div>

    <div id="ui">
        <div class="ui-section">
            <span class="ui-label">📦 VRM 模型</span>
            <input id="vrmInput" type="file" accept=".vrm">
        </div>

        <div class="ui-section">
            <div class="collapsible-header" id="apiSettingsHeader">
                <span class="collapsible-arrow" id="apiArrow">▶</span> ⚙️ API 设置 (已预填中转站)
            </div>
            <div class="collapsible-content" id="apiSettingsContent">
                <div style="display:flex;flex-direction:column;gap:6px;padding-top:4px;">
                    <input type="text" id="apiBaseUrl" placeholder="https://run.v3.cm/v1">
                    <input type="password" id="apiKey" placeholder="sk-...">
                    <input type="text" id="llmModel" placeholder="gemini-2.5-flash">
                    <input type="text" id="ttsModel" placeholder="qwen-tts">
                    <input type="text" id="ttsVoice" placeholder="Cherry">
                    <span class="info-text">已配置默认中转站，可直接使用</span>
                </div>
            </div>
        </div>

        <div class="ui-section">
            <span class="ui-label">🤖 AI 语音模式</span>
            <div class="ai-status" id="aiStatus">
                <span class="ai-status-dot idle" id="aiStatusDot"></span>
                <span id="aiStatusText">未启动</span>
            </div>
            <div class="ui-row">
                <button class="btn-primary" id="btnStartAI">▶ 开始AI模式</button>
                <button class="btn-danger" id="btnStopAI" disabled>⏹ 结束AI模式</button>
            </div>
            <span class="info-text" id="aiInfo" style="display:none;"></span>
        </div>

        <div class="ui-section">
            <span class="ui-label">😊 表情</span>
            <div id="exprButtonContainer" class="expr-grid">
                <span class="info-text" style="grid-column:1/-1;">请先加载模型</span>
            </div>
        </div>

        <div class="ui-section">
            <span class="ui-label">🎬 动画</span>
            <div id="animButtonContainer" class="anim-grid">
                <span class="info-text" style="grid-column:1/-1;">请先加载 VRM 模型</span>
            </div>
            <span class="info-text" id="animStatus" style="display:none;"></span>
        </div>

        <div class="ui-section">
            <span class="ui-label">🎨 渲染精细度</span>
            <div class="preset-group" id="presetGroup">
                <button class="preset-btn" data-preset="low">低</button>
                <button class="preset-btn" data-preset="medium">标准</button>
                <button class="preset-btn active" data-preset="high">高</button>
                <button class="preset-btn" data-preset="ultra">极致</button>
            </div>
            <span class="info-text" id="presetInfo">
                <span class="status-dot on"></span>像素比 1× &nbsp;|&nbsp;
                <span class="status-dot on"></span>抗锯齿 &nbsp;|&nbsp;
                <span class="status-dot on"></span>阴影
            </span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
                "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
        import { VRMLoaderPlugin, VRMHumanBoneName } from "@pixiv/three-vrm";
        import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from "@pixiv/three-vrm-animation";

        // ==================== 常量 ====================
        const ANIMATION_FILES = [
            { file: "appearing.vrma", label: "出现" },
            { file: "greet.vrma", label: "打招呼" },
            { file: "liked.vrma", label: "点赞" },
            { file: "pose.vrma", label: "摆姿势" },
            { file: "shoot.vrma", label: "射击" },
            { file: "showbody.vrma", label: "展示" },
            { file: "spin.vrma", label: "旋转" },
            { file: "squat.vrma", label: "蹲下" },
            { file: "waiting.vrma", label: "等待" },
            { file: "yeah.vrma", label: "耶✌" },
        ];

        const EXPRESSION_PRESETS = [
            { name: "happy", label: "😊 微笑" },
            { name: "angry", label: "😡 生气" },
            { name: "sad", label: "😢 悲伤" },
            { name: "surprised", label: "😲 惊讶" },
            { name: "relaxed", label: "😌 放松" },
            { name: "shy", label: "😳 害羞" },
            { name: "fun", label: "😜 嬉皮" },
            { name: "love", label: "😍 喜爱" },
            { name: "serious", label: "😐 严肃" },
            { name: "neutral", label: "😶 无表情" },
        ];

        const ACTION_TAG_MAP = {
            yeah: "yeah.vrma",
            waiting: "waiting.vrma",
            squat: "squat.vrma",
            spin: "spin.vrma",
            showbody: "showbody.vrma",
            shoot: "shoot.vrma",
            pose: "pose.vrma",
            liked: "liked.vrma",
            greet: "greet.vrma",
        };
        const VALID_ACTION_TAGS = new Set(Object.keys(ACTION_TAG_MAP));

        const EXPR_TAG_MAP = {
            smile: "happy",
            happy: "happy",
            angry: "angry",
            sad: "sad",
            surprise: "surprised",
            relax: "relaxed",
            shy: "shy",
            love: "love",
            none: "neutral",
        };
        const VALID_EXPR_TAGS = new Set(Object.keys(EXPR_TAG_MAP));
        const DEFAULT_EXPR = "relaxed";

        const QUALITY_PRESETS = {
            low: { label: "低", pixelRatio: 0.5, antialias: false, shadows: false, shadowMapSize: 512, shadowMapType: THREE.PCFShadowMap },
            medium: { label: "标准", pixelRatio: 1.0, antialias: false, shadows: false, shadowMapSize: 1024, shadowMapType: THREE.PCFShadowMap },
            high: { label: "高", pixelRatio: 1.0, antialias: true, shadows: true, shadowMapSize: 2048, shadowMapType: THREE.PCFShadowMap },
            ultra: { label: "极致", pixelRatio: 2.0, antialias: true, shadows: true, shadowMapSize: 4096, shadowMapType: THREE.PCFSoftShadowMap },
        };
        let currentPreset = "high";
        const preset = () => QUALITY_PRESETS[currentPreset];

        // ==================== ToastController ====================
        class ToastController {
            constructor() { this.container = document.getElementById("toastContainer"); }
            _createToast(type, message, duration = 3500) {
                const icons = { error: "❌", warn: "⚠️", info: "ℹ️", success: "✅" };
                const toast = document.createElement("div");
                toast.className = `toast ${type}`;
                toast.innerHTML = `<span class="toast-icon">${icons[type] || "ℹ️"}</span><span class="toast-msg">${message}</span><button class="toast-close">×</button>`;
                const closeBtn = toast.querySelector(".toast-close");
                const remove = () => { if (toast.parentNode && !toast.classList.contains("removing")) { toast.classList.add("removing"); setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300); } };
                closeBtn.addEventListener("click", remove);
                const timer = setTimeout(remove, duration);
                toast._timer = timer;
                toast._remove = remove;
                this.container.appendChild(toast);
                const all = this.container.querySelectorAll(".toast");
                if (all.length > 5) { const oldest = all[0]; if (oldest._remove) oldest._remove(); }
                return toast;
            }
            error(msg, dur) { return this._createToast("error", msg, dur); }
            warn(msg, dur) { return this._createToast("warn", msg, dur); }
            info(msg, dur) { return this._createToast("info", msg, dur); }
            success(msg, dur) { return this._createToast("success", msg, dur); }
        }
        const toast = new ToastController();

        // ==================== 场景 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.4, 3);
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(1, 1.5, 1);
        scene.add(directionalLight);
        function configureLightShadows(light, presetKey) {
            const cfg = QUALITY_PRESETS[presetKey];
            light.castShadow = cfg.shadows;
            if (cfg.shadows) {
                light.shadow.mapSize.width = cfg.shadowMapSize;
                light.shadow.mapSize.height = cfg.shadowMapSize;
                light.shadow.camera.left = -2;
                light.shadow.camera.right = 2;
                light.shadow.camera.top = 3;
                light.shadow.camera.bottom = -0.5;
                light.shadow.camera.near = 0.1;
                light.shadow.camera.far = 15;
                light.shadow.bias = -0.0003;
                light.shadow.normalBias = 0.02;
            }
        }
        configureLightShadows(directionalLight, currentPreset);
        const ground = new THREE.Mesh(new THREE.CircleGeometry(2.5, 48), new THREE.ShadowMaterial({ opacity: 0.45 }));
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0.001;
        ground.receiveShadow = true;
        scene.add(ground);
        let renderer = new THREE.WebGLRenderer({ antialias: preset().antialias, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(preset().pixelRatio, window.devicePixelRatio));
        renderer.shadowMap.enabled = preset().shadows;
        renderer.shadowMap.type = preset().shadowMapType;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);
        let controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 0.8;
        controls.maxDistance = 8;
        controls.maxPolarAngle = Math.PI * 0.75;
        controls.update();
        const clock = new THREE.Clock();
        let currentVRM = null;
        let mixer = null;
        let animationActions = new Map();
        let activeAnimFile = null;
        let isLoadingAnimations = false;
        let currentExpression = null;
        let idleTime = 0;
        let blinkState = { timer: 0, nextBlink: 2.5, isBlinking: false, blinkDuration: 0.1, blinkProgress: 0 };

        // ==================== ExpressionController ====================
        class ExpressionController {
            setExpression(expressionName) {
                if (!currentVRM || !currentVRM.expressionManager) return;
                const manager = currentVRM.expressionManager;
                Object.keys(manager._expressionMap || {}).forEach(name => manager.setValue(name, 0));
                manager.setValue(expressionName, 1);
                currentExpression = expressionName;

        // ==================== AnimationController (含内置idle动画) ====================
        class AnimationController {
            constructor() {
                this._finishCallbacks = new Map();
                this._idleClip = null;
                this._idleAction = null;
            }

            clearAllActions() {
                if (mixer) mixer.stopAllAction();
                animationActions.clear();
                activeAnimFile = null;
                this._finishCallbacks.clear();
                this._idleAction = null;
            }

            stopCurrentAction(fadeOutTime = 0.25) {
                if (!mixer) return;
                mixer._actions.forEach(action => {
                    if (action.isRunning() && action !== this._idleAction) action.fadeOut(fadeOutTime);
                });
                setTimeout(() => {
                    if (mixer) {
                        mixer._actions.forEach(action => {
                            if (!action.isRunning() && action !== this._idleAction) action.stop();
                        });
                    }
                }, fadeOutTime * 1000 + 50);
                this._finishCallbacks.clear();
            }

            playAnimation(fileName, loopMode = THREE.LoopOnce, crossfade = 0.25, onFinished = null) {
                if (fileName === "idle") {
                    if (this._idleAction) {
                        this._idleAction.reset();
                        this._idleAction.play();
                        activeAnimFile = "idle";
                        this._updateActiveButton(null);
                        return this._idleAction;
                    }
                    return null;
                }
                if (!mixer || !animationActions.has(fileName)) {
                    if (onFinished) setTimeout(onFinished, 0);
                    return null;
                }
                const action = animationActions.get(fileName);
                if (!action) { if (onFinished) setTimeout(onFinished, 0); return null; }
                // 停止之前所有非idle动画
                this.stopCurrentAction(crossfade);
                action.loop = loopMode;
                action.clampWhenFinished = (loopMode === THREE.LoopOnce);
                action.reset();
                action.fadeIn(crossfade).play();
                activeAnimFile = fileName;
                this._updateActiveButton(fileName);
                if (onFinished) {
                    this._finishCallbacks.set(action, onFinished);
                }
                return action;
            }

            createIdleAnimation(vrm) {
                if (!vrm || !vrm.humanoid) return;
                const humanoid = vrm.humanoid;
                const tracks = [];
                const boneNames = [
                    VRMHumanBoneName.LeftUpperArm,
                    VRMHumanBoneName.LeftLowerArm,
                    VRMHumanBoneName.RightUpperArm,
                    VRMHumanBoneName.RightLowerArm,
                ];
                boneNames.forEach(name => {
                    const bone = humanoid.getNormalizedBoneNode(name);
                    if (bone) {
                        const rotation = bone.rotation.clone();
                        tracks.push(new THREE.QuaternionKeyframeTrack(
                            `${bone.name}.quaternion`, [0], [rotation.x, rotation.y, rotation.z, rotation.w]
                        ));
                    }
                });
                if (tracks.length === 0) return;
                const clip = new THREE.AnimationClip("idle", 1.0, tracks);
                this._idleClip = clip;
                if (mixer) {
                    this._idleAction = mixer.clipAction(clip);
                    this._idleAction.loop = THREE.LoopRepeat;
                    this._idleAction.play();
                }
            }

            resetToIdle() {
                if (this._idleAction) {
                    this.stopCurrentAction(0.1);
                    if (!this._idleAction.isRunning()) {
                        this._idleAction.play();
                    }
                    activeAnimFile = "idle";
                    this._updateActiveButton(null);
                } else {
                    this.stopCurrentAction(0.3);
                    activeAnimFile = null;
                    this._updateActiveButton(null);
                }
                this._finishCallbacks.clear();
            }

            _updateActiveButton(fileName) {
                document.querySelectorAll(".anim-btn").forEach(btn => {
                    btn.classList.toggle("active-anim", btn.dataset.file === fileName);
                });
            }

            handleMixerFinished(event) {
                const finishedAction = event.action;
                if (finishedAction === this._idleAction) return;
                if (this._finishCallbacks.has(finishedAction)) {
                    const cb = this._finishCallbacks.get(finishedAction);
                    this._finishCallbacks.delete(finishedAction);
                    try { cb(); } catch (e) { console.warn("回调出错:", e); }
                }
                let finishedFile = null;
                for (let [file, action] of animationActions.entries()) {
                    if (action === finishedAction) { finishedFile = file; break; }
                }
                if (finishedFile && activeAnimFile === finishedFile) {
                    activeAnimFile = null;
                    this._updateActiveButton(null);
                }
            }
        }
        const animationController = new AnimationController();

        function setupMixerListener() {
            if (!mixer) return;
            mixer.addEventListener("finished", (e) => animationController.handleMixerFinished(e));
        }

        // ==================== 待机逻辑 ====================
        function updateIdle(delta) {
            if (!currentVRM) return;
            blinkState.timer += delta;
            if (!blinkState.isBlinking) {
                if (blinkState.timer >= blinkState.nextBlink) {
                    blinkState.isBlinking = true;
                    blinkState.blinkProgress = 0;
                    blinkState.timer = 0;
                    blinkState.nextBlink = 2.0 + Math.random() * 3.0;
                }
            } else {
                blinkState.blinkProgress += delta / blinkState.blinkDuration;
                if (blinkState.blinkProgress >= 1.0) {
                    blinkState.isBlinking = false;
                    blinkState.blinkProgress = 1.0;
                }
            }
            let blinkWeight = 0;
            if (blinkState.isBlinking) {
                const t = blinkState.blinkProgress;
                blinkWeight = t < 0.3 ? t / 0.3 : 1.0 - (t - 0.3) / 0.7;
                blinkWeight = Math.max(0, Math.min(1, blinkWeight));
            }
            if (currentVRM.expressionManager) {
                try { currentVRM.expressionManager.setValue("blink", blinkWeight); } catch (e) {}
            } else if (currentVRM.blendShapeProxy) {
                currentVRM.blendShapeProxy.setValue("blinkLeft", blinkWeight);
                currentVRM.blendShapeProxy.setValue("blinkRight", blinkWeight);
            }
            idleTime += delta;
            const swayAngle = Math.sin(idleTime * 0.8) * 0.05;
            currentVRM.scene.rotation.y = swayAngle;
        }

        function stopBlinkDuringAnim() {
            if (!currentVRM) return;
            if (currentVRM.expressionManager) {
                try { currentVRM.expressionManager.setValue("blink", 0); } catch (e) {}
            } else if (currentVRM.blendShapeProxy) {
                currentVRM.blendShapeProxy.setValue("blinkLeft", 0);
                currentVRM.blendShapeProxy.setValue("blinkRight", 0);
            }
            blinkState.isBlinking = false;
            blinkState.timer = 0;
        }

            if (activeAnimFile === "idle" || activeAnimFile === null) {

        // ==================== VADController ====================
        class VADController {
            constructor() {
                this.audioContext = null;
                this.mediaStream = null;
                this.scriptNode = null;
                this.isListening = false;
                this._paused = false;
                this.onSpeechStart = null;
                this.onSpeechEnd = null;
                this.onSilenceTimeout = null;
                this.silenceThreshold = 0.008;
                this.silenceDuration = 1.5;
                this.longSilenceDuration = 10;
                this.minSpeechDuration = 0.4;
                this._audioBuffer = [];
                this._isSpeaking = false;
                this._silenceTimer = 0;
                this._speechTimer = 0;
                this._longSilenceTimer = 0;
                this._sampleRate = 44100;
                this._isRecording = false;
            }

            async start() {
                if (this.isListening) return;
                try {
                    this.audioContext = new(window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
                    this._sampleRate = this.audioContext.sampleRate;
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: { sampleRate: { ideal: 44100 }, echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                    });
                    const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                    this.scriptNode = this.audioContext.createScriptProcessor(4096, 1, 1);
                    source.connect(this.scriptNode);
                    this.scriptNode.connect(this.audioContext.destination);
                    this._audioBuffer = [];
                    this._isSpeaking = false;
                    this._silenceTimer = 0;
                    this._speechTimer = 0;
                    this._longSilenceTimer = 0;
                    this._isRecording = false;
                    this._paused = false;
                    this.isListening = true;

                    this.scriptNode.onaudioprocess = (event) => {
                        if (!this.isListening || this._paused) return;
                        const inputData = event.inputBuffer.getChannelData(0);
                        const rms = Math.sqrt(inputData.reduce((s, v) => s + v * v, 0) / inputData.length);
                        if (rms > this.silenceThreshold) {
                            this._longSilenceTimer = 0;
                            if (!this._isSpeaking) {
                                this._silenceTimer = 0;
                                this._speechTimer += 4096 / this._sampleRate;
                                if (this._speechTimer >= this.minSpeechDuration) {
                                    this._isSpeaking = true;
                                    this._audioBuffer = [];
                                    this._isRecording = true;
                                    if (this.onSpeechStart) this.onSpeechStart();
                                }
                            }
                            if (this._isRecording) this._audioBuffer.push(new Float32Array(inputData));
                            this._silenceTimer = 0;
                        } else if (this._isSpeaking && this._isRecording) {
                            this._audioBuffer.push(new Float32Array(inputData));
                            this._silenceTimer += 4096 / this._sampleRate;
                            if (this._silenceTimer >= this.silenceDuration) this._finalizeRecording();
                        } else if (!this._isSpeaking) {
                            this._longSilenceTimer += 4096 / this._sampleRate;
                            if (this._longSilenceTimer >= this.longSilenceDuration) {
                                this._longSilenceTimer = 0;
                                if (this.onSilenceTimeout) this.onSilenceTimeout();
                            }
                        }
                    };
                    return true;
                } catch (err) {
                    toast.error("麦克风访问失败: " + err.message);
                    throw err;
                }
            }

            _finalizeRecording() {
                if (!this._isRecording) return;
                this._isRecording = false;
                this._isSpeaking = false;
                this._speechTimer = 0;
                this._silenceTimer = 0;
                const audioData = this._concatBuffers();
                this._audioBuffer = [];
                if (this.onSpeechEnd) {
                    const wavBlob = this._encodeWAV(audioData, this._sampleRate);
                    this.onSpeechEnd(wavBlob);
                }
            }

            _concatBuffers() {
                if (this._audioBuffer.length === 0) return new Float32Array(0);
                let totalLen = 0;
                this._audioBuffer.forEach(buf => totalLen += buf.length);
                const result = new Float32Array(totalLen);
                let offset = 0;
                this._audioBuffer.forEach(buf => { result.set(buf, offset);
                    offset += buf.length; });
                return result;
            }

            _encodeWAV(samples, sampleRate) {
                const numChannels = 1;
                const bitsPerSample = 16;
                const dataSize = samples.length * (bitsPerSample / 8);
                const buffer = new ArrayBuffer(44 + dataSize);
                const view = new DataView(buffer);
                const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
                writeStr(0, "RIFF");
                view.setUint32(4, 36 + dataSize, true);
                writeStr(8, "WAVE");
                writeStr(12, "fmt ");
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * numChannels * (bitsPerSample / 8), true);
                view.setUint16(32, numChannels * (bitsPerSample / 8), true);
                view.setUint16(34, bitsPerSample, true);
                writeStr(36, "data");
                view.setUint32(40, dataSize, true);
                let offset = 44;
                for (let i = 0; i < samples.length; i++) {
                    const s = Math.max(-1, Math.min(1, samples[i]));
                    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                    offset += 2;
                }
                return new Blob([buffer], { type: "audio/wav" });
            }

            pause() {
                this._paused = true;
                this._audioBuffer = [];
                this._isRecording = false;
                this._isSpeaking = false;
                this._silenceTimer = 0;
                this._speechTimer = 0;
                this._longSilenceTimer = 0;
            }

            resume() {
                this._paused = false;
                this._longSilenceTimer = 0;
                this._silenceTimer = 0;
                this._speechTimer = 0;
            }

            async stop() {
                this.isListening = false;
                this._paused = false;
                if (this.scriptNode) { this.scriptNode.disconnect();
                    this.scriptNode = null; }
                if (this.mediaStream) { this.mediaStream.getTracks().forEach(t => t.stop());
                    this.mediaStream = null; }
                if (this.audioContext && this.audioContext.state !== "closed") await this.audioContext.close().catch(() => {});
                this.audioContext = null;
            }
        }

        // ==================== LLMController ====================
        class LLMController {
            async *streamChat(messages, apiBaseUrl, apiKey, model) {
                const resp = await fetch(`${apiBaseUrl}/chat/completions`, {
                    method: "POST",
                    headers: { Authorization: `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model, messages, stream: true, max_tokens: 300, temperature: 0.8 })
                });
                if (!resp.ok) throw new Error(`LLM API 错误 (${resp.status})`);
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop() || "";
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || !trimmed.startsWith("data: ")) continue;
                        const jsonStr = trimmed.slice(6);
                        if (jsonStr === "[DONE]") return;
                        try {
                            const parsed = JSON.parse(jsonStr);
                            const delta = parsed.choices?.[0]?.delta?.content;
                            if (delta) yield delta;
                        } catch (e) {}
                    }
                }
            }
        }

        // ==================== TTSController ====================
        class TTSController {
            async generateSpeech(text, apiBaseUrl, apiKey, model, voice) {
                const resp = await fetch(`${apiBaseUrl}/audio/speech`, {
                    method: "POST",
                    headers: { Authorization: `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model, input: text, voice, response_format: "mp3", speed: 1.0 })
                });
                if (!resp.ok) throw new Error(`TTS API 错误 (${resp.status})`);
                const clone = resp.clone();
                const responseText = await clone.text();
                try {
                    const json = JSON.parse(responseText);
                    if (json.output?.audio?.url) return json.output.audio.url;
                } catch (e) {}
                return await resp.blob();
            }
        }

        // ==================== PlaybackQueue (0.7s间隔，音频结束即掐断动画) ====================
        class PlaybackQueue {
            constructor() {
                this.queue = [];
                this.isPlaying = false;
                this._stopped = false;
                this.onAllComplete = null;
                this._currentAudio = null;
                this._delayTimer = null;
            }

            enqueue(item) {
                this.queue.push(item);
                if (!this.isPlaying && !this._stopped) this._playNext();
            }

            async _playNext() {
                if (this._stopped || this.queue.length === 0) {
                    this.isPlaying = false;
                    if (this._stopped && this.queue.length > 0) this.queue = [];
                    if (this.queue.length === 0 && this.onAllComplete && !this._stopped) this.onAllComplete();
                    return;
                }
                this.isPlaying = true;
                const item = this.queue.shift();

                let audioSource;
                try {
                    audioSource = await item.ttsPromise;
                } catch (e) {
                    console.warn("TTS生成失败，跳过:", e);
                    this._playNext();
                    return;
                }
                if (this._stopped) { this.isPlaying = false; return; }

                let audio;
                if (typeof audioSource === 'string') {
                    audio = new Audio(audioSource);
                } else {
                    const url = URL.createObjectURL(audioSource);
                    audio = new Audio(url);
                    audio.addEventListener('ended', () => URL.revokeObjectURL(url), { once: true });
                    audio.addEventListener('error', () => URL.revokeObjectURL(url), { once: true });
                }
                this._currentAudio = audio;
                let audioEnded = false;
                let animEnded = false;

                const nextWithDelay = () => {
                    if (this._delayTimer) clearTimeout(this._delayTimer);
                    this._delayTimer = setTimeout(() => this._playNext(), 700);
                };

                const onAudioEnd = () => {
                    audioEnded = true;
                    // 强制结束当前动画
                    animationController.stopCurrentAction(0.1);
                    animEnded = true;
                    // 立即设置下一句的表情（如果有的话）
                    const nextItem = this.queue[0];
                    if (nextItem) expressionController.setExpression(nextItem.expression);
                    nextWithDelay();
                };

                audio.onended = onAudioEnd;
                audio.onerror = onAudioEnd;

                // 启动动画
                expressionController.setExpression(item.expression);
                if (item.animFile && animationActions.has(item.animFile)) {
                    animationController.playAnimation(item.animFile, THREE.LoopOnce, 0.2, () => {
                        animEnded = true;
                        if (audioEnded) nextWithDelay(); // 等待音频结束后延迟
                    });
                } else {
                    animEnded = true;
                }

                audio.play().catch(onAudioEnd);
            }

            stop() {
                this._stopped = true;
                if (this._delayTimer) clearTimeout(this._delayTimer);
                if (this._currentAudio) {
                    try { this._currentAudio.pause(); } catch (e) {}
                    this._currentAudio = null;
                }
                this.queue = [];
                this.isPlaying = false;
                animationController.resetToIdle();
                expressionController.resetToDefault();
            }

            reset() {
                this._stopped = false;
                if (this._delayTimer) clearTimeout(this._delayTimer);
                this.queue = [];
                this.isPlaying = false;
                this._currentAudio = null;
            }

            getQueueLength() { return this.queue.length + (this.isPlaying ? 1 : 0); }
        }

        // ==================== 行解析器 ====================
        function parseLine(line) {
            const trimmed = line.trim();
            if (!trimmed) return null;
            let actionTag = null, exprTag = null, remaining = trimmed;
            const tagRegex = /^\[([^\]]+)\]/;
            for (let i = 0; i < 2; i++) {
                const match = remaining.match(tagRegex);
                if (!match) break;
                const tag = match[1].toLowerCase();
                if (!actionTag && VALID_ACTION_TAGS.has(tag)) { actionTag = tag;
                    remaining = remaining.slice(match[0].length); } else if (!exprTag && VALID_EXPR_TAGS.has(tag)) { exprTag = tag;
                    remaining = remaining.slice(match[0].length); } else break;
            }
            const text = remaining.trim();
            if (!text && !actionTag && !exprTag) return null;
            return {
                action: actionTag,
                expression: exprTag ? EXPR_TAG_MAP[exprTag] : DEFAULT_EXPR,
                animFile: actionTag ? ACTION_TAG_MAP[actionTag] : null,
                text: text || ""
            };
        }

        // ==================== AIController ====================
        class AIController {
            constructor() {
                this.state = "idle";
                this.vadController = new VADController();
                this.whisperController = new WhisperController();
                this.llmController = new LLMController();
                this.ttsController = new TTSController();
                this.playbackQueue = new PlaybackQueue();
                this.conversationHistory = [];
                this._abortFlag = false;
                this._llmBuffer = "";
                this._vadPausedForPlayback = false;
                this._isProcessing = false;
                this._bindEvents();
            }

            _bindEvents() {
                this.vadController.onSpeechStart = () => console.log("🎤 用户开始说话");
                this.vadController.onSpeechEnd = async (blob) => {
                    if (this._isProcessing) return;
                    console.log("🔇 用户停止说话，识别...");
                    this._isProcessing = true;
                    await this._handleSpeechEnd(blob);
                };
                this.vadController.onSilenceTimeout = async () => {
                    if (this._isProcessing || this._vadPausedForPlayback) return;
                    console.log("⏰ 10秒沉默，主动对话");
                    this._isProcessing = true;
                    await this._handleSilenceTimeout();
                };
                this.playbackQueue.onAllComplete = () => {
                    console.log("✅ 播放完成，恢复监听");
                    this._onPlaybackComplete();
                };
            }

            async start() {
                if (this.state === "running") return;
                if (!currentVRM) { toast.warn("请先加载 VRM 模型"); return; }
                if (!apiKeyInput.value.trim()) { toast.warn("请填写 API Key"); return; }
                this._abortFlag = false;
                this._isProcessing = false;
                this.playbackQueue.reset();
                this.conversationHistory = [];
                this._vadPausedForPlayback = false;
                try {
                    await this.vadController.start();
                    this.state = "running";
                    this._updateUI();
                    toast.success("AI 模式已启动");
                } catch (e) { this.state = "idle";
                    this._updateUI(); throw e; }
            }

            async stop() {
                if (this.state === "idle") return;
                this.state = "stopping";
                this._updateUI();
                this._abortFlag = true;
                this.playbackQueue.stop();
                await this.vadController.stop();
                this._vadPausedForPlayback = false;
                this._isProcessing = false;
                animationController.resetToIdle();
                expressionController.resetToDefault();
                this.state = "idle";
                this._updateUI();
                toast.info("AI 模式已停止");
            }

            _addToHistory(role, content) {
                this.conversationHistory.push({ role, content });
                if (this.conversationHistory.length > 6) this.conversationHistory = this.conversationHistory.slice(-6);
            }

            async _handleSpeechEnd(wavBlob) {
                const apiKey = apiKeyInput.value.trim();
                const apiBaseUrl = apiBaseUrlInput.value.trim() || "https://run.v3.cm/v1";
                const llmModel = llmModelInput.value.trim() || "gemini-2.5-flash";
                const ttsModel = ttsModelInput.value.trim() || "qwen-tts";
                const ttsVoice = ttsVoiceInput.value.trim() || "Cherry";
                try {
                    const userText = await this.whisperController.transcribe(wavBlob, apiBaseUrl, apiKey);
                    if (!userText?.trim()) { this._isProcessing = false; return; }
                    console.log("📝 用户说:", userText);
                    toast.info(`识别: "${userText}"`, 2500);
                    const systemPrompt = `你是用户温柔的猫娘女友。...（保持不变）`;
                    const messages = [{ role: "system", content: systemPrompt }, ...this.conversationHistory.slice(-6), { role: "user", content: userText }];
                    this._llmBuffer = "";
                    let fullAiText = "";
                    const streamGen = this.llmController.streamChat(messages, apiBaseUrl, apiKey, llmModel);
                    for await (const delta of streamGen) {
                        if (this._abortFlag) break;
                        this._llmBuffer += delta;
                        const lines = this._llmBuffer.split("\n");
                        this._llmBuffer = lines.pop() || "";
                        for (const line of lines) {
                            if (this._abortFlag) break;
                            const parsed = parseLine(line);
                            if (parsed?.text) {
                                fullAiText += (fullAiText ? " " : "") + parsed.text;
                                if (this.playbackQueue.getQueueLength() === 0 && !this._vadPausedForPlayback) {
                                    this.vadController.pause();
                                    this._vadPausedForPlayback = true;
                                }
                                const ttsPromise = this.ttsController.generateSpeech(parsed.text, apiBaseUrl, apiKey, ttsModel, ttsVoice).catch(e => { throw e; });
                                this.playbackQueue.enqueue({ animFile: parsed.animFile, expression: parsed.expression, text: parsed.text, ttsPromise });
                            }
                        }
                    }
                    if (!this._abortFlag && this._llmBuffer.trim()) {
                        const parsed = parseLine(this._llmBuffer);
                        if (parsed?.text) {
                            fullAiText += (fullAiText ? " " : "") + parsed.text;
                            const ttsPromise = this.ttsController.generateSpeech(parsed.text, apiBaseUrl, apiKey, ttsModel, ttsVoice);
                            this.playbackQueue.enqueue({ animFile: parsed.animFile, expression: parsed.expression, text: parsed.text, ttsPromise });
                        }
                    }
                    if (fullAiText.trim()) {
                        this._addToHistory("user", userText);
                        this._addToHistory("assistant", fullAiText.trim());
                    }
                } catch (e) { if (!this._abortFlag) { toast.error("处理出错: " + e.message);
                        this._onPlaybackComplete(); } }
            }

            async _handleSilenceTimeout() {
                const apiKey = apiKeyInput.value.trim();
                const apiBaseUrl = apiBaseUrlInput.value.trim() || "https://run.v3.cm/v1";
                const llmModel = llmModelInput.value.trim() || "gemini-2.5-flash";
                const ttsModel = ttsModelInput.value.trim() || "qwen-tts";
                const ttsVoice = ttsVoiceInput.value.trim() || "Cherry";
                try {
                    const systemPrompt = `你是用户温柔的猫娘女友。...`;
                    const messages = [{ role: "system", content: systemPrompt }, ...this.conversationHistory.slice(-6), { role: "user", content: "用户当前处于沉默状态。" }];
                    this._llmBuffer = "";
                    let fullAiText = "";
                    const streamGen = this.llmController.streamChat(messages, apiBaseUrl, apiKey, llmModel);
                    for await (const delta of streamGen) {
                        if (this._abortFlag) break;
                        this._llmBuffer += delta;
                        const lines = this._llmBuffer.split("\n");
                        this._llmBuffer = lines.pop() || "";
                        for (const line of lines) {
                            const parsed = parseLine(line);
                            if (parsed?.text) {
                                fullAiText += (fullAiText ? " " : "") + parsed.text;
                                if (this.playbackQueue.getQueueLength() === 0 && !this._vadPausedForPlayback) {
                                    this.vadController.pause();
                                    this._vadPausedForPlayback = true;
                                }
                                const ttsPromise = this.ttsController.generateSpeech(parsed.text, apiBaseUrl, apiKey, ttsModel, ttsVoice);
                                this.playbackQueue.enqueue({ animFile: parsed.animFile, expression: parsed.expression, text: parsed.text, ttsPromise });
                            }
                        }
                    }
                    if (!this._abortFlag && this._llmBuffer.trim()) {
                        const parsed = parseLine(this._llmBuffer);
                        if (parsed?.text) {
                            fullAiText += (fullAiText ? " " : "") + parsed.text;
                            const ttsPromise = this.ttsController.generateSpeech(parsed.text, apiBaseUrl, apiKey, ttsModel, ttsVoice);
                            this.playbackQueue.enqueue({ animFile: parsed.animFile, expression: parsed.expression, text: parsed.text, ttsPromise });
                        }
                    }
                    if (fullAiText.trim()) {
                        this._addToHistory("user", "用户当前处于沉默状态。");
                        this._addToHistory("assistant", fullAiText.trim());
                    }
                } catch (e) { if (!this._abortFlag) this._onPlaybackComplete(); }
            }

            _onPlaybackComplete() {
                if (this._abortFlag || this.state !== "running") return;
                this.vadController.resume();
                this._vadPausedForPlayback = false;
                this._isProcessing = false;
                animationController.resetToIdle();
                expressionController.resetToDefault();
            }

            _updateUI() {
                const dot = document.getElementById("aiStatusDot");
                const text = document.getElementById("aiStatusText");
                const btnStart = document.getElementById("btnStartAI");
                const btnStop = document.getElementById("btnStopAI");
                dot.classList.remove("idle", "running", "stopped");
                if (this.state === "idle") { dot.classList.add("idle");
                    text.textContent = "未启动";
                    btnStart.disabled = false;
                    btnStop.disabled = true; } else if (this.state === "running") { dot.classList.add("running");
                    text.textContent = "AI模式运行中";
                    btnStart.disabled = true;
                    btnStop.disabled = false; } else { dot.classList.add("stopped");
                    text.textContent = "正在停止...";
                    btnStart.disabled = true;
                    btnStop.disabled = true; }
            }
        }

        const aiController = new AIController();
        document.getElementById("btnStartAI").addEventListener("click", () => aiController.start());
        document.getElementById("btnStopAI").addEventListener("click", () => aiController.stop());
        window.addEventListener("beforeunload", () => { if (aiController.state === "running") aiController.stop(); });

        console.log("🚀 启动完毕 · 0.7秒间隔 + 防T-pose待机动画");
    </script>
