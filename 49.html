<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM AI 聊天模式 · 本地流式语音交互</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(20, 20, 40, 0.9);
            --text: #e0e0e0;
            --accent: #5b9bd5;
            --accent-active: #7ab8f5;
            --border: rgba(255, 255, 255, 0.12);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.18);
            --preset-active: #3a6fc5;
            --preset-hover: #4a80d8;
            --shadow: 0 6px 28px rgba(0, 0, 0, 0.6);
            --radius: 12px;
            --transition: 0.2s ease;
            --danger: #e0556a;
            --danger-hover: #f07080;
            --success: #4caf84;
            --toast-bg: rgba(30, 30, 55, 0.95);
            --toast-error: #e0556a;
            --toast-warn: #f0a040;
            --toast-info: #5b9bd5;
            --toast-success: #4caf84;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d14;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #toastContainer {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 90vw;
            width: 420px;
        }

        .toast {
            pointer-events: auto;
            background: var(--toast-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            animation: toastSlideIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        .toast.removing {
            animation: toastSlideOut 0.3s cubic-bezier(0.55, 0.06, 0.68, 0.19) forwards;
        }

        .toast.error {
            border-left: 4px solid var(--toast-error);
        }

        .toast.warn {
            border-left: 4px solid var(--toast-warn);
        }

        .toast.info {
            border-left: 4px solid var(--toast-info);
        }

        .toast.success {
            border-left: 4px solid var(--toast-success);
        }

        .toast-icon {
            flex-shrink: 0;
            font-size: 18px;
        }

        .toast-msg {
            flex: 1;
            line-height: 1.4;
            word-break: break-word;
        }

        .toast-close {
            flex-shrink: 0;
            cursor: pointer;
            opacity: 0.6;
            font-size: 16px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #fff;
        }

        .toast-close:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes toastSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toastSlideOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        #ui {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 16px 18px;
            border-radius: var(--radius);
            color: var(--text);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            min-width: 290px;
            max-width: 390px;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        #ui.collapsed {
            min-width: auto;
            max-width: 48px;
            padding: 8px;
            border-radius: 50%;
            overflow: hidden;
            max-height: 48px;
            gap: 0;
        }

        #ui.collapsed>*:not(.ui-minimize-btn) {
            display: none;
        }

        .ui-minimize-btn {
            position: absolute;
            top: 6px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
            z-index: 11;
            line-height: 1;
        }

        #ui.collapsed .ui-minimize-btn {
            position: static;
            margin: 0 auto;
        }

        .ui-minimize-btn:hover {
            background: var(--btn-hover);
        }

        .ui-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ui-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #aaa;
            margin-bottom: 1px;
        }

        .ui-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="file"] {
            color: #ccc;
            font-size: 12px;
            max-width: 200px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: background var(--transition);
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--btn-hover);
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            padding: 6px 10px;
            font-size: 12px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color var(--transition);
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: var(--accent);
        }

        button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        button:hover {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.3);
        }

        button:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.3);
        }

        button.btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        button.btn-primary:hover {
            background: var(--accent-active);
            border-color: var(--accent-active);
        }

        button.btn-danger {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
            font-weight: 600;
        }

        button.btn-danger:hover {
            background: var(--danger-hover);
            border-color: var(--danger-hover);
        }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
        }

        .ai-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .ai-status-dot.idle {
            background: #666;
        }

        .ai-status-dot.running {
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.6);
            animation: pulse 1.2s infinite;
        }

        .ai-status-dot.stopped {
            background: #f0a040;
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(76, 175, 80, 0.5);
            }
            50% {
                box-shadow: 0 0 18px rgba(76, 175, 80, 0.9);
            }
        }

        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #aaa;
            padding: 4px 0;
            user-select: none;
        }

        .collapsible-header:hover {
            color: #ccc;
        }

        .collapsible-arrow {
            transition: transform 0.25s ease;
            font-size: 10px;
        }

        .collapsible-arrow.open {
            transform: rotate(90deg);
        }

        .collapsible-content {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s ease;
        }

        .collapsible-content.open {
            max-height: 400px;
        }

        .anim-grid,
        .expr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 4px;
        }

        .anim-btn,
        .expr-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 7px 3px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anim-btn:hover:not(:disabled),
        .expr-btn:hover:not(:disabled) {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        .anim-btn.active-anim,
        .expr-btn.active-expr {
            background: var(--preset-active);
            border-color: #6a9ee6;
            color: white;
            box-shadow: 0 0 10px rgba(58, 111, 197, 0.45);
            font-weight: 600;
        }

        .preset-group {
            display: flex;
            gap: 3px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 7px;
            padding: 3px;
        }

        .preset-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: #999;
            padding: 6px 7px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all var(--transition);
        }

        .preset-btn:hover {
            color: #ddd;
            background: rgba(255, 255, 255, 0.06);
        }

        .preset-btn.active {
            background: var(--preset-active);
            color: #fff;
            box-shadow: 0 2px 8px rgba(58, 111, 197, 0.4);
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }

        .status-dot.on {
            background: #4caf50;
            box-shadow: 0 0 6px rgba(76, 175, 80, 0.5);
        }

        .status-dot.off {
            background: #666;
        }

        .info-text {
            font-size: 10px;
            color: #888;
            margin-top: 1px;
            line-height: 1.4;
        }

        .loading-text {
            color: #f0c040;
            font-size: 11px;
            font-weight: 500;
        }

        .fps-display {
            font-size: 11px;
            color: #aaa;
            margin-left: auto;
        }

        .asr-subtitle {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 10px 24px;
            border-radius: 28px;
            font-size: 18px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 20;
            text-align: center;
            min-width: 180px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .asr-loading {
            margin-top: 4px;
            font-size: 10px;
            color: #f0c040;
        }

        @media (max-width: 480px) {
            #ui {
                top: 6px;
                left: 6px;
                padding: 10px 12px;
                gap: 8px;
                min-width: auto;
                max-width: calc(100vw - 24px);
                max-height: calc(100vh - 20px);
                font-size: 11px;
            }
            .anim-btn,
            .expr-btn {
                padding: 5px 2px;
                font-size: 10px;
            }
            .preset-btn {
                padding: 5px 5px;
                font-size: 10px;
            }
            #toastContainer {
                width: calc(100vw - 20px);
                top: 8px;
            }
            .toast {
                font-size: 11px;
                padding: 10px 12px;
            }
            .asr-subtitle {
                font-size: 14px;
                padding: 8px 18px;
                bottom: 12px;
            }
        }
    </style>
</head>
<body>

<div id="toastContainer"></div>

<div id="ui">

    <div class="ui-section">
        <span class="ui-label">📦 VRM 模型</span>
        <input id="vrmInput" type="file" accept=".vrm">

    <div class="ui-section">
        <div class="collapsible-header" id="apiSettingsHeader">

        </div>
        <div class="collapsible-content" id="apiSettingsContent">
            <div style="display:flex;flex-direction:column;gap:6px;padding-top:4px;">
                <input type="text" id="apiBaseUrl" placeholder="https://run.v3.cm/v1">
                <input type="password" id="apiKey" placeholder="sk-...">
                <input type="text" id="llmModel" placeholder="gemini-2.5-flash">

            </div>
        </div>
    </div>

    <div class="ui-section">
        <span class="ui-label">🤖 AI 语音模式</span>
        <div class="ai-status" id="aiStatus">
            <span class="ai-status-dot idle" id="aiStatusDot"></span>
            <span id="aiStatusText">未启动</span>
        </div>
        <div class="ui-row">

        <span class="info-text" id="aiInfo" style="display:none;"></span>
        <span class="asr-loading" id="moonshineStatus">⏳ 语音识别模型加载中...</span>

    <div class="ui-section">

    <div class="ui-section">
        <span class="ui-label">🎬 动画</span>
        <div id="animButtonContainer" class="anim-grid">
            <span class="info-text" style="grid-column:1/-1;">请先加载 VRM 模型</span>
        </div>
        <span class="info-text" id="animStatus" style="display:none;"></span>
    </div>

    <div class="ui-section">
        <span class="ui-label">🎨 渲染精细度</span>
        <div class="preset-group" id="presetGroup">
            <button class="preset-btn" data-preset="low">低</button>
            <button class="preset-btn" data-preset="medium">标准</button>
            <button class="preset-btn active" data-preset="high">高</button>
            <button class="preset-btn" data-preset="ultra">极致</button>
        </div>
        <span class="info-text" id="presetInfo"></span>

        <div class="collapsible-header" id="advancedGraphicsHeader" style="margin-top:4px;">
            <span class="collapsible-arrow" id="advancedGraphicsArrow">▶</span> 高级画质设置
        </div>
        <div class="collapsible-content" id="advancedGraphicsContent">
            <div style="display:flex;flex-direction:column;gap:6px;padding-top:4px;">
                <div style="display:flex;align-items:center;gap:8px;">
                    <label style="font-size:11px;min-width:60px;">渲染倍率</label>
                    <input type="range" id="renderScale" min="0.5" max="2.0" step="0.1" value="1.0" style="flex:1;">
                    <span id="renderScaleValue" style="font-size:11px;width:35px;">1.0</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <label style="font-size:11px;min-width:60px;">抗锯齿</label>
                    <input type="checkbox" id="advancedAA" checked>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <label style="font-size:11px;min-width:60px;">阴影</label>
                    <input type="checkbox" id="advancedShadows" checked>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <label style="font-size:11px;min-width:60px;">阴影分辨率</label>
                    <select id="advancedShadowRes">
                        <option value="512">512</option>
                        <option value="1024">1024</option>
                        <option value="2048" selected>2048</option>
                        <option value="4096">4096</option>
                    </select>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <label style="font-size:11px;min-width:60px;">阴影类型</label>
                    <select id="advancedShadowType">
                        <option value="PCF">PCF (硬)</option>
                        <option value="PCFSoft" selected>PCF Soft (软)</option>
                    </select>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <label style="font-size:11px;min-width:60px;">像素比</label>
                    <input type="number" id="advancedPixelRatio" min="0.5" max="2.0" step="0.1" value="1.0" style="width:70px;">
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span style="font-size:11px;">当前帧率: </span>
                    <span id="fpsCounter" style="font-size:11px;color:#4caf50;">-- FPS</span>
                </div>
                <button id="applyAdvancedSettings" class="btn-primary" style="margin-top:4px;">应用高级设置</button>
            </div>
        </div>
    </div>
</div>

<div id="asrSubtitle" class="asr-subtitle" style="display:none;"></div>

            const icons = { error: "❌", warn: "⚠️", info: "ℹ️", success: "✅" };
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;

            const closeBtn = toast.querySelector(".toast-close");
            const remove = () => {
                if (toast.parentNode && !toast.classList.contains("removing")) {
                    toast.classList.add("removing");
                    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300);
                }
            };
            closeBtn.addEventListener("click", remove);
            toast._timer = setTimeout(remove, duration);
            toast._remove = remove;
            this.container.appendChild(toast);
            const allToasts = this.container.querySelectorAll(".toast");
            if (allToasts.length > 5) {
                const oldest = allToasts[0];
                if (oldest._remove) oldest._remove();
            }
            return toast;
        }
        error(msg, duration) { return this._createToast("error", msg, duration); }
        warn(msg, duration) { return this._createToast("warn", msg, duration); }

    // ==================== 单一动画控制器 ====================
    const AnimState = { IDLE: "IDLE", PLAYING: "PLAYING", TRANSITIONING: "TRANSITIONING" };

    class AnimationController {
        constructor() {
            this.mixer = null;
            this.actions = new Map();
            this.currentAction = null;
            this.currentFile = null;
            this.state = AnimState.IDLE;
            this._isIdle = true;
            this._transTimer = 0;
            this._transTarget = AnimState.IDLE;
            this._onFinishedBound = this._onFinished.bind(this);
        }

        setup(vrm) {
            if (this.mixer) {
                this.mixer.removeEventListener("finished", this._onFinishedBound);
                this.mixer.stopAllAction();
            }
            this.actions.clear();
            this.currentAction = null;
            this.currentFile = null;
            this.state = AnimState.IDLE;
            this._isIdle = true;
            this._transTimer = 0;
            this.mixer = new THREE.AnimationMixer(vrm.scene);
            this.mixer.addEventListener("finished", this._onFinishedBound);
            this._updateActiveButton(null);
        }

        registerClip(fileName, clip) {
            if (!this.mixer) return;
            this.actions.set(fileName, this.mixer.clipAction(clip));
        }

        hasAction(fileName) { return this.actions.has(fileName); }

        playAction(fileName, fade = 0.3) {
            this._play(fileName, { loop: false, fade, isIdle: false });
        }
        returnToIdle(fade = 0.4) {
            if (!this.actions.has(IDLE_FILE)) return;
            this._play(IDLE_FILE, { loop: true, fade, isIdle: true });
        }
        playIntro(fade = 0) {
            if (this.actions.has(INTRO_FILE)) {
                this._play(INTRO_FILE, { loop: false, fade, isIdle: false });
            } else {
                this.returnToIdle(0);
            }
        }

        _play(fileName, { loop = false, fade = 0.3, isIdle = false } = {}) {
            if (!this.mixer || !this.actions.has(fileName)) return;
            const newAction = this.actions.get(fileName);

            if (newAction === this.currentAction) {
                if (loop) return;
                newAction.stopFading();
                newAction.reset();
                newAction.setLoop(THREE.LoopOnce, 1);
                newAction.clampWhenFinished = true;
                newAction.enabled = true;
                newAction.setEffectiveTimeScale(1);
                newAction.setEffectiveWeight(1);
                newAction.play();
                this.state = AnimState.PLAYING;
                this._isIdle = false;
                return;
            }

            for (const action of this.actions.values()) {
                if (action === this.currentAction) {
                    action.stopFading();
                    action.enabled = true;
                    action.setEffectiveWeight(1);
                } else if (action !== newAction) {
                    action.stopFading();
                    action.setEffectiveWeight(0);
                }
            }

            const oldAction = this.currentAction;

            newAction.stopFading();
            newAction.reset();
            newAction.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
            newAction.clampWhenFinished = !loop;
            newAction.enabled = true;
            newAction.setEffectiveTimeScale(1);
            newAction.setEffectiveWeight(1);

            if (oldAction && fade > 0) {
                oldAction.fadeOut(fade);
                newAction.fadeIn(fade);
                newAction.play();
                this.state = AnimState.TRANSITIONING;
                this._transTimer = fade;
                this._transTarget = isIdle ? AnimState.IDLE : AnimState.PLAYING;
            } else {
                newAction.play();
                this.state = isIdle ? AnimState.IDLE : AnimState.PLAYING;
            }

            this.currentAction = newAction;
            this.currentFile = fileName;
            this._isIdle = isIdle;
            this._updateActiveButton(isIdle ? null : fileName);
        }

        update(delta) {
            if (!this.mixer) return;
            this.mixer.update(delta);
            if (this.state === AnimState.TRANSITIONING) {
                this._transTimer -= delta;
                if (this._transTimer <= 0) {
                    this.currentAction.stopFading();
                    this.currentAction.setEffectiveWeight(1);
                    this.state = this._transTarget;
                }
            }
        }

        _onFinished(event) {
            if (event.action === this.currentAction && !this._isIdle) {
                this.returnToIdle(0.4);
            }
        }

        _updateActiveButton(fileName) {
            document.querySelectorAll(".anim-btn").forEach(btn => {
                btn.classList.toggle("active-anim", btn.dataset.file === fileName);
            });
        }
    }
    const animationController = new AnimationController();

    function updateBlink(delta) {
        if (!currentVRM || !currentVRM.expressionManager) return;
        blinkState.timer += delta;
        if (!blinkState.isBlinking) {
            if (blinkState.timer >= blinkState.nextBlink) {
                blinkState.isBlinking = true;
                blinkState.blinkProgress = 0;
                blinkState.timer = 0;
                blinkState.nextBlink = 2.0 + Math.random() * 3.0;
            }
        } else {
            blinkState.blinkProgress += delta / blinkState.blinkDuration;
            if (blinkState.blinkProgress >= 1.0) {
                blinkState.isBlinking = false;
                blinkState.blinkProgress = 1.0;
            }
        }
        let blinkWeight = 0;
        if (blinkState.isBlinking) {
            const t = blinkState.blinkProgress;
            blinkWeight = t < 0.3 ? t / 0.3 : 1.0 - (t - 0.3) / 0.7;
            blinkWeight = Math.max(0, Math.min(1, blinkWeight));
        }
        currentVRM.expressionManager.setValue("blink", blinkWeight);
    }

        apiContent.classList.toggle("open", apiExpanded);
    });

    // ==================== AudioResampler (worklet inline) ====================
    const resampleWorkletCode = `
        class ResampleProcessor extends AudioWorkletProcessor {
            constructor() {
                super();
                this.chunkSize = 2560; // 约 160ms @16kHz
                this.buffer = new Float32Array(0);
                this.outputSampleRate = 16000;
            }

            process(inputs, outputs, parameters) {
                const input = inputs[0];
                if (!input || !input.length) return true;
                const channel = input[0];
                const inputSampleRate = sampleRate;
                if (inputSampleRate === this.outputSampleRate) {
                    this.buffer = this._concat(this.buffer, channel);
                } else {
                    const resampled = this._resample(channel, inputSampleRate, this.outputSampleRate);
                    this.buffer = this._concat(this.buffer, resampled);
                }
                while (this.buffer.length >= this.chunkSize) {
                    const chunk = this.buffer.slice(0, this.chunkSize);
                    this.buffer = this.buffer.slice(this.chunkSize);
                    this.port.postMessage(chunk);
                }
                return true;
            }

            _resample(input, fromRate, toRate) {
                if (fromRate === toRate) return new Float32Array(input);
                const ratio = fromRate / toRate;
                const length = Math.floor(input.length / ratio);
                const result = new Float32Array(length);
                for (let i = 0; i < length; i++) {
                    const srcIndex = i * ratio;
                    const i0 = Math.floor(srcIndex);
                    const i1 = Math.min(i0 + 1, input.length - 1);
                    const frac = srcIndex - i0;
                    result[i] = input[i0] * (1 - frac) + input[i1] * frac;
                }
                return result;
            }

            _concat(a, b) {
                const c = new Float32Array(a.length + b.length);
                c.set(a, 0);
                c.set(b, a.length);
                return c;
            }
        }
        registerProcessor('resample-processor', ResampleProcessor);
    `;
    const workletBlob = new Blob([resampleWorkletCode], { type: 'application/javascript' });
    const workletUrl = URL.createObjectURL(workletBlob);

    // ==================== AudioWorkletRecorder ====================
    class AudioWorkletRecorder {
        constructor() {
            this.audioContext = null;
            this.mediaStream = null;
            this.workletNode = null;
            this.onData = null;
            this.isRunning = false;
        }

        async start() {
            if (this.isRunning) return;
            try {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                await this.audioContext.audioWorklet.addModule(workletUrl);
                const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                this.workletNode = new AudioWorkletNode(this.audioContext, 'resample-processor');
                this.workletNode.port.onmessage = (e) => {
                    if (this.onData && this.isRunning) {
                        this.onData(e.data);
                    }
                };
                source.connect(this.workletNode);
                // 不需要连接 destination，避免回声
                this.isRunning = true;
                console.log('[AudioWorkletRecorder] 启动');
            } catch (err) {
                throw new Error('音频捕获失败: ' + (err.message || '未知错误'));
            }
        }

        async stop() {
            this.isRunning = false;
            if (this.workletNode) {
                this.workletNode.port.onmessage = null;
                this.workletNode.disconnect();
                this.workletNode = null;
            }
            if (this.mediaStream) {
                this.mediaStream.getTracks().forEach(track => track.stop());
                this.mediaStream = null;
            }
            if (this.audioContext && this.audioContext.state !== 'closed') {
                await this.audioContext.close().catch(() => {});
                this.audioContext = null;
            }
            console.log('[AudioWorkletRecorder] 停止');
        }
    }

    // ==================== VADController (仅使用 AnalyserNode) ====================
    class VADController {
        constructor() {
            this.audioContext = null;
            this.mediaStream = null;
            this.analyserNode = null;
            this.isListening = false;
            this.onSpeechStart = null;
            this.onSpeechEnd = null;
            this.onSilenceTimeout = null;
            this.silenceThreshold = 0.008;
            this.silenceDuration = 1.5;
            this.longSilenceDuration = 10;
            this.minSpeechDuration = 0.4;
            this.maxRecordingDuration = 30;
            this._isSpeaking = false;
            this._silenceTimer = 0;
            this._speechTimer = 0;
            this._longSilenceTimer = 0;
            this._checkInterval = null;
            this._startTime = 0;
        }

        async start() {
            if (this.isListening) return;
            try {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                this.analyserNode = this.audioContext.createAnalyser();
                this.analyserNode.fftSize = 2048;
                this.analyserNode.smoothingTimeConstant = 0.3;
                source.connect(this.analyserNode);

                this._isSpeaking = false;
                this._silenceTimer = 0;
                this._speechTimer = 0;
                this._longSilenceTimer = 0;
                this.isListening = true;
                this._startTime = this.audioContext.currentTime;

                const bufferLength = this.analyserNode.fftSize;
                const dataArray = new Float32Array(bufferLength);
                const check = () => {
                    if (!this.isListening) return;
                    this.analyserNode.getFloatTimeDomainData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) sum += dataArray[i] * dataArray[i];
                    const rms = Math.sqrt(sum / bufferLength);
                    const now = this.audioContext.currentTime;
                    const elapsed = now - this._startTime;
                    if (rms > this.silenceThreshold) {
                        this._longSilenceTimer = 0;
                        if (!this._isSpeaking) {
                            this._silenceTimer = 0;
                            this._speechTimer += 0.05; // approx interval
                            if (this._speechTimer >= this.minSpeechDuration) {
                                this._isSpeaking = true;
                                if (this.onSpeechStart) this.onSpeechStart();
                                console.log("[VAD] 检测到语音开始");
                                toast.info("🎤 语音开始", 1000);
                            }
                        }
                        this._silenceTimer = 0;
                    } else if (this._isSpeaking) {
                        this._silenceTimer += 0.05;
                        if (this._silenceTimer >= this.silenceDuration) {
                            this._finalizeRecording();
                        }
                    } else {
                        this._longSilenceTimer += 0.05;
                        if (this._longSilenceTimer >= this.longSilenceDuration) {
                            this._longSilenceTimer = 0;
                            if (this.onSilenceTimeout) this.onSilenceTimeout();
                            console.log("[VAD] 长时间静音，触发主动搭话");
                            toast.info("🤫 长时间静音", 2000);
                        }
                    }
                    if (this._isSpeaking && elapsed > this.maxRecordingDuration) {
                        this._finalizeRecording();
                    }
                };
                this._checkInterval = setInterval(check, 50);
                console.log("[VAD] 开始监听");
                toast.info("🎤 VAD 开始监听", 1500);
                return true;
            } catch (err) {
                toast.error("麦克风访问失败: " + (err.message || "未知错误"));
                throw err;
            }
        }

        _finalizeRecording() {
            if (!this._isSpeaking) return;
            this._isSpeaking = false;
            this._speechTimer = 0;
            this._silenceTimer = 0;
            if (this.onSpeechEnd) {
                console.log("[VAD] 语音结束");
                toast.info("🔚 语音结束", 1000);
                this.onSpeechEnd();
            }
        }

        pause() {
            if (this._checkInterval) clearInterval(this._checkInterval);
            this._checkInterval = null;
            this._isSpeaking = false;
            this._speechTimer = 0;
            this._silenceTimer = 0;
            this._longSilenceTimer = 0;
            console.log("[VAD] 暂停监听");
        }

        resume() {
            if (!this.isListening) return;
            this._longSilenceTimer = 0;
            this._silenceTimer = 0;
            this._speechTimer = 0;
            this._isSpeaking = false;
            if (!this._checkInterval) {
                const check = () => { /* 重新绑定检查逻辑 */ };
                this._checkInterval = setInterval(() => {
                    if (!this.isListening) return;
                    const dataArray = new Float32Array(this.analyserNode.fftSize);
                    this.analyserNode.getFloatTimeDomainData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
                    const rms = Math.sqrt(sum / dataArray.length);
                    if (rms > this.silenceThreshold) {
                        this._longSilenceTimer = 0;
                        if (!this._isSpeaking) {
                            this._silenceTimer = 0;
                            this._speechTimer += 0.05;
                            if (this._speechTimer >= this.minSpeechDuration) {
                                this._isSpeaking = true;
                                if (this.onSpeechStart) this.onSpeechStart();
                            }
                        }
                        this._silenceTimer = 0;
                    } else if (this._isSpeaking) {
                        this._silenceTimer += 0.05;
                        if (this._silenceTimer >= this.silenceDuration) this._finalizeRecording();
                    } else {
                        this._longSilenceTimer += 0.05;
                        if (this._longSilenceTimer >= this.longSilenceDuration) {
                            this._longSilenceTimer = 0;
                            if (this.onSilenceTimeout) this.onSilenceTimeout();
                        }
                    }
                }, 50);
            }
            console.log("[VAD] 恢复监听");
        }

        async stop() {
            this.isListening = false;
            if (this._checkInterval) { clearInterval(this._checkInterval); this._checkInterval = null; }
            if (this.mediaStream) { this.mediaStream.getTracks().forEach(track => track.stop()); this.mediaStream = null; }
            if (this.audioContext && this.audioContext.state !== "closed") {
                await this.audioContext.close().catch(() => {});
                this.audioContext = null;
            }
            this.analyserNode = null;
            console.log("[VAD] 停止监听");
        }
    }

    // ==================== MoonshineASRController ====================
    class MoonshineASRController {
        constructor() {
            this.moonshine = null;
            this.stream = null;
            this.isReady = false;
            this.isStreaming = false;
            this.transcriptBuffer = new StreamingTranscriptBuffer();
            this.onPartialResult = null;
            this.loadingPromise = null;
        }

        async initialize() {
            if (this.isReady) return;
            if (this.loadingPromise) return this.loadingPromise;
            const statusEl = document.getElementById('moonshineStatus');
            statusEl.textContent = '⏳ 语音识别模型加载中...';
            this.loadingPromise = (async () => {
                try {
                    this.moonshine = await Moonshine.create({
                        modelType: 'small',
                        ortWasmPaths: 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/'
                    });
                    this.isReady = true;
                    statusEl.textContent = '✅ 语音识别已就绪';
                    console.log('[Moonshine] 模型加载完成');
                    toast.success('本地语音识别模型就绪', 2000);
                } catch (e) {
                    statusEl.textContent = '❌ 模型加载失败';
                    toast.error('语音识别模型加载失败: ' + e.message);
                    throw e;
                }
            })();
            return this.loadingPromise;
        }

        async startStreaming() {
            if (!this.isReady) throw new Error('Moonshine not ready');
            if (this.isStreaming) await this.stopStreaming();
            this.stream = await this.moonshine.streaming();
            this.isStreaming = true;
            this.transcriptBuffer.reset();
            console.log('[Moonshine] 流式识别开始');
        }

        async feedChunk(audioChunk) {
            if (!this.isStreaming || !this.stream) return;
            try {
                const partial = await this.stream.feed(audioChunk);
                this.transcriptBuffer.append(partial);
                if (this.onPartialResult) this.onPartialResult(partial);
            } catch (e) {
                console.warn('[Moonshine] feed error:', e);
            }
        }

        async finalize() {
            if (!this.isStreaming || !this.stream) return '';
            try {
                const finalText = await this.stream.finish();
                this.isStreaming = false;
                this.stream = null;
                const complete = finalText || this.transcriptBuffer.get();
                console.log('[Moonshine] 最终结果:', complete);
                return complete;
            } catch (e) {
                console.warn('[Moonshine] finalize error:', e);
                return this.transcriptBuffer.get();
            }
        }

        async stopStreaming() {
            if (this.stream) {
                try { await this.stream.finish(); } catch (e) {}
                this.stream = null;
            }
            this.isStreaming = false;
            this.transcriptBuffer.reset();
        }

        async dispose() {
            await this.stopStreaming();
            if (this.moonshine) {
                // Moonshine 实例没有显式 dispose，但我们可以置空
                this.moonshine = null;
                this.isReady = false;
            }
        }
    }

    // ==================== LLM / TTS / PlaybackQueue 保持兼容 ====================
    class LLMController {
        async *streamChat(messages, apiBaseUrl, apiKey, model, signal) {
            console.log("[LLM] 开始流式请求...");
            toast.info("🧠 发送请求到 LLM", 1500);
            const body = { model, messages, stream: true, max_tokens: 300, temperature: 0.8 };
            const response = await fetch(`${apiBaseUrl}/chat/completions`, {
                method: "POST", headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                body: JSON.stringify(body), signal
            });
            if (!response.ok) throw new Error(`LLM API 错误 (${response.status})`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop() || "";
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || !trimmed.startsWith("data: ")) continue;
                    const jsonStr = trimmed.slice(6);
                    if (jsonStr === "[DONE]") return;
                    try {
                        const parsed = JSON.parse(jsonStr);
                        const delta = parsed.choices?.[0]?.delta?.content;
                        if (delta) yield delta;
                    } catch (e) {}
                }
            }
        }
    }

    class TTSController {
        async generateSpeech(text, apiBaseUrl, apiKey, model, voice) {
            const cleanText = text.replace(/\[.*?\]/g, '').trim();
            console.log(`[TTS] 生成语音: "${cleanText.substring(0, 30)}..."`);
            toast.info(`🔊 TTS: "${cleanText.substring(0, 20)}..."`, 1500);
            const body = { model, input: cleanText, voice, response_format: "mp3", speed: 1.0 };
            const response = await fetch(`${apiBaseUrl}/audio/speech`, {
                method: "POST", headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                body: JSON.stringify(body),
            });
            if (!response.ok) throw new Error(`TTS API 错误 (${response.status})`);
            const clone = response.clone();
            const responseText = await clone.text();
            try {
                const json = JSON.parse(responseText);
                if (json.output?.audio?.url) return json.output.audio.url;
            } catch (e) {}
            return await response.blob();
        }
    }

    class PlaybackQueue {
        constructor() {
            this.queue = [];
            this.isPlaying = false;
            this._stopped = false;
            this.onAllComplete = null;
            this._currentAudio = null;
            this._nextTimer = null;
        }
        enqueue(item) {
            this.queue.push(item);
            if (!this.isPlaying && !this._stopped) this._playNext();
        }
        async _playNext() {
            if (this._stopped || this.queue.length === 0) {
                this.isPlaying = false;
                if (this._stopped && this.queue.length > 0) this.queue = [];
                if (this.queue.length === 0 && this.onAllComplete && !this._stopped) {
                    this.onAllComplete();
                }
                return;
            }
            this.isPlaying = true;
            const item = this.queue.shift();

            expressionController.setExpression(item.expression);

            let audioSource;
            try {
                audioSource = await item.ttsPromise;
            } catch (e) {
                console.warn("TTS生成失败，跳过一句");
                this._playNext();
                return;
            }
            if (this._stopped) { this.isPlaying = false; return; }

            let audio;
            if (typeof audioSource === 'string') {
                audio = new Audio(audioSource);
            } else {
                const audioUrl = URL.createObjectURL(audioSource);
                audio = new Audio(audioUrl);
                audio.addEventListener('ended', () => URL.revokeObjectURL(audioUrl), { once: true });
            }
            this._currentAudio = audio;

            if (item.animFile && animationController.hasAction(item.animFile)) {
                animationController.playAction(item.animFile, 0.3);
            } else {
                animationController.returnToIdle(0.3);
            }

            audio.play().catch(e => console.warn("音频播放失败:", e));

            const handleAudioEnded = () => {
                if (this._stopped) return;
                if (this.queue.length > 0) {
                    this._nextTimer = setTimeout(() => {
                        this._nextTimer = null;
                        this._currentAudio = null;
                        this._playNext();
                    }, 200);
                } else {
                    this._currentAudio = null;
                    this.isPlaying = false;
                    if (this.onAllComplete && !this._stopped) this.onAllComplete();
                }
            };
            audio.onended = handleAudioEnded;
            audio.onerror = handleAudioEnded;
        }
        stop() {
            this._stopped = true;
            if (this._currentAudio) { try { this._currentAudio.pause(); this._currentAudio = null; } catch (e) {} }
            if (this._nextTimer) { clearTimeout(this._nextTimer); this._nextTimer = null; }
            this.queue = [];
            this.isPlaying = false;
            animationController.returnToIdle(0.3);
            expressionController.resetToDefault();
        }
        reset() {
            this._stopped = false;
            this.queue = [];
            this.isPlaying = false;
            this._currentAudio = null;
            if (this._nextTimer) { clearTimeout(this._nextTimer); this._nextTimer = null; }
        }
        getQueueLength() { return this.queue.length + (this.isPlaying ? 1 : 0); }
    }

    function parseLine(line) {
        const trimmed = line.trim();
        if (!trimmed) return null;
        let actionTag = null;
        let exprTag = null;
        let remaining = trimmed;
        const tagRegex = /^\[([^\]]+)\]\s*/;
        while (true) {
            const match = remaining.match(tagRegex);
            if (!match) break;
            const tag = match[1].toLowerCase();
            if (VALID_ACTION_TAGS.has(tag)) { if (!actionTag) actionTag = tag; }
            else if (VALID_EXPR_TAGS.has(tag)) { if (!exprTag) exprTag = tag; }
            else break;
            remaining = remaining.slice(match[0].length);
        }
        const text = remaining.trim();
        if (!text && !actionTag && !exprTag) return null;
        return {
            action: actionTag || null,
            expression: exprTag ? EXPR_TAG_MAP[exprTag] : DEFAULT_EXPR,
            animFile: (actionTag && actionTag !== "waiting") ? (ACTION_TAG_MAP[actionTag] || null) : null,
            text: text || "",
        };
    }

    // ==================== 重构后的 AIController (无 Whisper) ====================
    class AIController {
        constructor() {
            this.state = "idle";
            this.vadController = new VADController();
            this.audioRecorder = new AudioWorkletRecorder();
            this.moonshineASR = new MoonshineASRController();
            this.llmController = new LLMController();
            this.ttsController = new TTSController();
            this.playbackQueue = new PlaybackQueue();
            this.conversationHistory = [];
            this._isProcessing = false;

            this._currentLLMAbort = null;
            this._bindEvents();
            // 实时字幕元素
            this.subtitleEl = document.getElementById('asrSubtitle');
            this.subtitleEl.style.display = 'none';
        }

        _bindEvents() {
            this.vadController.onSpeechStart = () => {
                this._handleInterruption();
                this._startNewRecognition();
            };
            this.vadController.onSpeechEnd = () => {
                this._finishRecognition();
            };
            this.vadController.onSilenceTimeout = async () => {
                if (this._isProcessing || this._vadPausedForPlayback) return;
                this._isProcessing = true;
                await this._handleSilenceTimeout();
            };
            this.playbackQueue.onAllComplete = () => {
                this._onPlaybackComplete();
            };
            this.audioRecorder.onData = (chunk) => {
                if (this.moonshineASR.isStreaming) {
                    this.moonshineASR.feedChunk(chunk);
                }
            };
            this.moonshineASR.onPartialResult = (partial) => {
                this.subtitleEl.style.display = 'block';
                this.subtitleEl.textContent = `正在识别: ${partial}`;
            };
        }

        async _handleInterruption() {
            console.log('[AI] 打断当前回复');
            // 停止播放队列
            this.playbackQueue.stop();
            // 取消 LLM 流
            if (this._currentLLMAbort) {
                this._currentLLMAbort.abort();
                this._currentLLMAbort = null;
            }
            // 停止当前 Moonshine 流式识别
            if (this.moonshineASR.isStreaming) {
                await this.moonshineASR.stopStreaming();
            }
            // 恢复 VAD (已在 speech start 时自动)
        }

        async _startNewRecognition() {
            if (!this.moonshineASR.isReady) {
                toast.warn('语音识别模型尚未就绪');
                return;
            }
            await this.moonshineASR.startStreaming();
            this.subtitleEl.style.display = 'block';
            this.subtitleEl.textContent = '正在识别...';
        }

        async _finishRecognition() {
            if (!this.moonshineASR.isStreaming) return;
            const userText = await this.moonshineASR.finalize();
            this.subtitleEl.style.display = 'none';
            if (!userText || !userText.trim()) {
                this._isProcessing = false;
                return;
            }
            this._isProcessing = true;
            await this._processUserText(userText.trim());
        }

        async _processUserText(userText) {
            const apiKey = apiKeyInput.value.trim();
            const apiBaseUrl = apiBaseUrlInput.value.trim() || "https://run.v3.cm/v1";
            const llmModel = llmModelInput.value.trim() || "gemini-2.5-flash";
            const ttsModel = ttsModelInput.value.trim() || "qwen-tts";
            const ttsVoice = ttsVoiceInput.value.trim() || "Cherry";

            const systemPrompt = `你是用户温柔的猫娘女友。一次回复最多四句话。每句话单独占一行。
动作标签：${[...VALID_ACTION_TAGS].map(t => `[${t}]`).join(' ')}
表情标签：${[...VALID_EXPR_TAGS].map(t => `[${t}]`).join(' ')}
规则：每句首必须包含一个动作标签和一个表情标签，未指定默认[relax]`;

            const messages = [
                { role: "system", content: systemPrompt },
                ...this.conversationHistory.slice(-6),
                { role: "user", content: userText },
            ];

            const abortController = new AbortController();
            this._currentLLMAbort = abortController;

            try {
                const fullAiText = await this._consumeStream(messages, apiBaseUrl, apiKey, llmModel, ttsModel, ttsVoice, abortController.signal);
                if (fullAiText.trim()) {
                    this._addToHistory("user", userText);
                    this._addToHistory("assistant", fullAiText.trim());
                }
            } catch (e) {
                if (e.name !== 'AbortError') {
                    toast.error("处理出错: " + (e.message || "未知错误"));
                    this._onPlaybackComplete();
                }
            } finally {
                this._currentLLMAbort = null;
            }
        }

        async _handleSilenceTimeout() {
            const apiKey = apiKeyInput.value.trim();
            const apiBaseUrl = apiBaseUrlInput.value.trim() || "https://run.v3.cm/v1";
            const llmModel = llmModelInput.value.trim() || "gemini-2.5-flash";
            const ttsModel = ttsModelInput.value.trim() || "qwen-tts";
            const ttsVoice = ttsVoiceInput.value.trim() || "Cherry";

            const systemPrompt = `你是用户温柔的猫娘女友。用户已沉默，请主动关心或撒娇。一次回复最多两句话。每句话单独占一行。包含动作标签和表情标签。`;
            const messages = [
                { role: "system", content: systemPrompt },
                ...this.conversationHistory.slice(-6),
                { role: "user", content: "用户当前处于沉默状态。" },
            ];

            const abortController = new AbortController();
            this._currentLLMAbort = abortController;

            try {
                const fullAiText = await this._consumeStream(messages, apiBaseUrl, apiKey, llmModel, ttsModel, ttsVoice, abortController.signal);
                if (fullAiText.trim()) {
                    this._addToHistory("user", "用户当前处于沉默状态。");
                    this._addToHistory("assistant", fullAiText.trim());
                }
            } catch (e) {
                if (e.name !== 'AbortError') this._onPlaybackComplete();
            } finally {
                this._currentLLMAbort = null;
            }
        }

        async _consumeStream(messages, apiBaseUrl, apiKey, llmModel, ttsModel, ttsVoice, signal) {
            let llmBuffer = "";
            let fullAiText = "";
            const streamGen = this.llmController.streamChat(messages, apiBaseUrl, apiKey, llmModel, signal);

            const flushLine = (line) => {
                const parsed = parseLine(line);
                if (!parsed || !parsed.text) return;
                fullAiText += (fullAiText ? " " : "") + parsed.text;
                if (this.playbackQueue.getQueueLength() === 0 && !this._vadPausedForPlayback) {
                    this.vadController.pause();
                    this._vadPausedForPlayback = true;
                }
                const ttsPromise = this.ttsController
                    .generateSpeech(parsed.text, apiBaseUrl, apiKey, ttsModel, ttsVoice)
                    .catch(e => { throw e; });
                this.playbackQueue.enqueue({ animFile: parsed.animFile, expression: parsed.expression, text: parsed.text, ttsPromise });
            };

            for await (const delta of streamGen) {
                if (signal.aborted) break;
                llmBuffer += delta;
                const lines = llmBuffer.split("\n");
                llmBuffer = lines.pop() || "";
                for (const line of lines) {
                    if (signal.aborted) break;
                    flushLine(line);
                }
            }
            if (!signal.aborted && llmBuffer.trim()) flushLine(llmBuffer);
            return fullAiText;
        }

        _onPlaybackComplete() {
            if (this.state !== "running") return;
            this.vadController.resume();
            this._vadPausedForPlayback = false;
            this._isProcessing = false;
            animationController.returnToIdle(0.4);
            expressionController.resetToDefault();
            console.log("[AI] 播放完成，恢复监听");
            toast.info("✅ 回复完成，继续监听", 2000);
        }

        _addToHistory(role, content) {
            this.conversationHistory.push({ role, content });
            if (this.conversationHistory.length > 6) this.conversationHistory = this.conversationHistory.slice(-6);
        }

        async start() {
            if (this.state === "running") return;
            if (!currentVRM) { toast.warn("请先加载 VRM 模型"); return; }
            if (!this.moonshineASR.isReady) {
                toast.warn("语音识别模型尚未加载完成，请等待");
                return;
            }
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) { toast.warn("请先在 API 设置中填写 API Key"); return; }

            this._isProcessing = false;
            this.playbackQueue.reset();
            this.conversationHistory = [];
            this._vadPausedForPlayback = false;
            try {
                await this.audioRecorder.start();
                await this.vadController.start();
                this.state = "running";
                this._updateUI();
                animationController.returnToIdle(0.3);
                toast.success("AI 模式已启动，开始监听...");
                console.log("[AI] 模式启动");
            } catch (e) {
                this.state = "idle";
                this._updateUI();
            }
        }

        async stop() {
            if (this.state === "idle") return;
            this.state = "stopping";
            this._updateUI();
            if (this._currentLLMAbort) {
                this._currentLLMAbort.abort();
                this._currentLLMAbort = null;
            }
            this.playbackQueue.stop();
            await this.vadController.stop();
            await this.audioRecorder.stop();
            await this.moonshineASR.stopStreaming();
            this._vadPausedForPlayback = false;
            this._isProcessing = false;
            animationController.returnToIdle(0.3);
            expressionController.resetToDefault();
            this.subtitleEl.style.display = 'none';
            this.state = "idle";
            this._updateUI();
            toast.info("AI 模式已停止");
            console.log("[AI] 模式停止");
        }

        _updateUI() {
            const dot = document.getElementById("aiStatusDot");
            const text = document.getElementById("aiStatusText");
            const btnStart = document.getElementById("btnStartAI");
            const btnStop = document.getElementById("btnStopAI");
            const info = document.getElementById("aiInfo");

            dot.classList.remove("idle", "running", "stopped");
            switch (this.state) {
                case "idle":
                    dot.classList.add("idle");
                    text.textContent = "未启动";
                    btnStart.disabled = !this.moonshineASR.isReady;
                    btnStop.disabled = true;
                    info.style.display = "none";
                    break;
                case "running":
                    dot.classList.add("running");
                    text.textContent = "AI模式运行中";
                    btnStart.disabled = true;
                    btnStop.disabled = false;
                    info.style.display = "block";
                    info.textContent = "🎤 正在监听... 请对角色说话";
                    break;
                case "stopping":
                    dot.classList.add("stopped");
                    text.textContent = "正在停止...";
                    btnStart.disabled = true;
                    btnStop.disabled = true;
                    info.style.display = "block";
                    info.textContent = "⏳ 正在清理资源...";
                    break;
            }
        }
    }

    const aiController = new AIController();

    // ==================== Moonshine 模型自动加载 ====================
    (async () => {
        try {
            await aiController.moonshineASR.initialize();
            document.getElementById("btnStartAI").disabled = false;
        } catch (e) {
            document.getElementById("btnStartAI").disabled = true;
        }
    })();

    document.getElementById("btnStartAI").addEventListener("click", async () => {
        if (aiController.state === "running") return;
        try { await aiController.start(); }
        catch (e) { aiController.state = "idle"; aiController._updateUI(); }
    });

    document.getElementById("btnStopAI").addEventListener("click", async () => {
        await aiController.stop();
    });

    window.addEventListener("beforeunload", () => {
        if (aiController.state === "running") aiController.stop();
    });

    console.log("🚀 重构完成 · 本地 Moonshine 流式 ASR 已集成，无 Whisper 残留");
</script>
