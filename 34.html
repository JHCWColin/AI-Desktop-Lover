<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM AI 聊天模式 · 语音交互</title>

    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: rgba(20, 20, 40, 0.9);
            --text: #e0e0e0;
            --accent: #5b9bd5;
            --accent-active: #7ab8f5;
            --border: rgba(255, 255, 255, 0.12);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.18);
            --preset-active: #3a6fc5;
            --preset-hover: #4a80d8;
            --shadow: 0 6px 28px rgba(0, 0, 0, 0.6);
            --radius: 12px;
            --transition: 0.2s ease;
            --danger: #e0556a;
            --danger-hover: #f07080;
            --success: #4caf84;
            --toast-bg: rgba(30, 30, 55, 0.95);
            --toast-error: #e0556a;
            --toast-warn: #f0a040;
            --toast-info: #5b9bd5;
            --toast-success: #4caf84;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d0d14;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #toastContainer {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 90vw;
            width: 420px;
        }

        .toast {
            pointer-events: auto;
            background: var(--toast-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            animation: toastSlideIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        .toast.removing {
            animation: toastSlideOut 0.3s cubic-bezier(0.55, 0.06, 0.68, 0.19) forwards;
        }

        .toast.error {
            border-left: 4px solid var(--toast-error);
        }

        .toast.warn {
            border-left: 4px solid var(--toast-warn);
        }

        .toast.info {
            border-left: 4px solid var(--toast-info);
        }

        .toast.success {
            border-left: 4px solid var(--toast-success);
        }

        .toast-icon {
            flex-shrink: 0;
            font-size: 18px;
        }

        .toast-msg {
            flex: 1;
            line-height: 1.4;
            word-break: break-word;
        }

        .toast-close {
            flex-shrink: 0;
            cursor: pointer;
            opacity: 0.6;
            font-size: 16px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #fff;
        }

        .toast-close:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes toastSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toastSlideOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        #ui {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 16px 18px;
            border-radius: var(--radius);
            color: var(--text);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            min-width: 290px;
            max-width: 390px;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 32px);
            overflow-y: auto;
        }

        .ui-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ui-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #aaa;
            margin-bottom: 1px;
        }

        .ui-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="file"] {
            color: #ccc;
            font-size: 12px;
            max-width: 200px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: background var(--transition);
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--btn-hover);
        }

        input[type="text"],
        input[type="password"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            padding: 6px 10px;
            font-size: 12px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color var(--transition);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
        }

        button {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 8px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        button:hover {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.3);
        }

        button:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.3);
        }

        button.btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        button.btn-primary:hover {
            background: var(--accent-active);
            border-color: var(--accent-active);
        }

        button.btn-danger {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
            font-weight: 600;
        }

        button.btn-danger:hover {
            background: var(--danger-hover);
            border-color: var(--danger-hover);
        }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
        }

        .ai-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .ai-status-dot.idle {
            background: #666;
        }

        .ai-status-dot.running {
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.6);
            animation: pulse 1.2s infinite;
        }

        .ai-status-dot.stopped {
            background: #f0a040;
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 6px rgba(76, 175, 80, 0.5);
            }

            50% {
                box-shadow: 0 0 18px rgba(76, 175, 80, 0.9);
            }
        }

        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #aaa;
            padding: 4px 0;
            user-select: none;
        }

        .collapsible-header:hover {
            color: #ccc;
        }

        .collapsible-arrow {
            transition: transform 0.25s ease;
            font-size: 10px;
        }

        .collapsible-arrow.open {
            transform: rotate(90deg);
        }

        .collapsible-content {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s ease;
        }

        .collapsible-content.open {
            max-height: 300px;
        }

        .anim-grid,
        .expr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 4px;
        }

        .anim-btn,
        .expr-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 7px 3px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anim-btn:hover:not(:disabled),
        .expr-btn:hover:not(:disabled) {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        .anim-btn.active-anim,
        .expr-btn.active-expr {
            background: var(--preset-active);
            border-color: #6a9ee6;
            color: white;
            box-shadow: 0 0 10px rgba(58, 111, 197, 0.45);
            font-weight: 600;
        }

        .preset-group {
            display: flex;
            gap: 3px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 7px;
            padding: 3px;
        }

        .preset-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: #999;
            padding: 6px 7px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all var(--transition);
        }

        .preset-btn:hover {
            color: #ddd;
            background: rgba(255, 255, 255, 0.06);
        }

        .preset-btn.active {
            background: var(--preset-active);
            color: #fff;
            box-shadow: 0 2px 8px rgba(58, 111, 197, 0.4);
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }

        .status-dot.on {
            background: #4caf50;
            box-shadow: 0 0 6px rgba(76, 175, 80, 0.5);
        }

        .status-dot.off {
            background: #666;
        }

        .info-text {
            font-size: 10px;
            color: #888;
            margin-top: 1px;
            line-height: 1.4;
        }

        .loading-text {
            color: #f0c040;
            font-size: 11px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            #ui {
                top: 6px;
                left: 6px;
                padding: 10px 12px;
                gap: 8px;
                min-width: auto;
                max-width: calc(100vw - 24px);
                max-height: calc(100vh - 20px);
                font-size: 11px;
            }

            .anim-btn,
            .expr-btn {
                padding: 5px 2px;
                font-size: 10px;
            }

            .preset-btn {
                padding: 5px 5px;
                font-size: 10px;
            }

            #toastContainer {
                width: calc(100vw - 20px);
                top: 8px;
            }

            .toast {
                font-size: 11px;
                padding: 10px 12px;
            }
        }
    </style>
</head>

<body>

    <div id="toastContainer"></div>

    <div id="ui">
        <div class="ui-section">
            <span class="ui-label">📦 VRM 模型</span>
            <input id="vrmInput" type="file" accept=".vrm">
        </div>

        <div class="ui-section">
            <div class="collapsible-header" id="apiSettingsHeader">
                <span class="collapsible-arrow" id="apiArrow">▶</span> ⚙️ API 设置 (已预填中转站)
            </div>
            <div class="collapsible-content" id="apiSettingsContent">
                <div style="display:flex;flex-direction:column;gap:6px;padding-top:4px;">
                    <input type="text" id="apiBaseUrl" placeholder="https://run.v3.cm/v1">
                    <input type="password" id="apiKey" placeholder="sk-...">
                    <input type="text" id="llmModel" placeholder="gemini-2.5-flash">
                    <input type="text" id="ttsModel" placeholder="qwen-tts">
                    <input type="text" id="ttsVoice" placeholder="Cherry">
                    <span class="info-text">已配置默认中转站，可直接使用</span>
                </div>
            </div>
        </div>

        <div class="ui-section">
            <span class="ui-label">🤖 AI 语音模式</span>
            <div class="ai-status" id="aiStatus">
                <span class="ai-status-dot idle" id="aiStatusDot"></span>
                <span id="aiStatusText">未启动</span>
            </div>
            <div class="ui-row">
                <button class="btn-primary" id="btnStartAI">▶ 开始AI模式</button>
                <button class="btn-danger" id="btnStopAI" disabled>⏹ 结束AI模式</button>
            </div>
            <span class="info-text" id="aiInfo" style="display:none;"></span>
        </div>

        <div class="ui-section">
            <span class="ui-label">😊 表情</span>
            <div id="exprButtonContainer" class="expr-grid">
                <span class="info-text" style="grid-column:1/-1;">请先加载模型</span>
            </div>
        </div>

        <div class="ui-section">
            <span class="ui-label">🎬 动画</span>
            <div id="animButtonContainer" class="anim-grid">
                <span class="info-text" style="grid-column:1/-1;">请先加载 VRM 模型</span>
            </div>
            <span class="info-text" id="animStatus" style="display:none;"></span>
        </div>

        <div class="ui-section">
            <span class="ui-label">🎨 渲染精细度</span>
            <div class="preset-group" id="presetGroup">
                <button class="preset-btn" data-preset="low">低</button>
                <button class="preset-btn" data-preset="medium">标准</button>
                <button class="preset-btn active" data-preset="high">高</button>
                <button class="preset-btn" data-preset="ultra">极致</button>
            </div>
            <span class="info-text" id="presetInfo">
                <span class="status-dot on"></span>像素比 1× &nbsp;|&nbsp;
                <span class="status-dot on"></span>抗锯齿 &nbsp;|&nbsp;
                <span class="status-dot on"></span>阴影
            </span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",
                "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
        import { VRMLoaderPlugin } from "@pixiv/three-vrm";
        import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from "@pixiv/three-vrm-animation";

        // ==================== 常量 ====================
        const ANIMATION_FILES = [
            { file: "appearing.vrma", label: "出现" },
            { file: "greet.vrma", label: "打招呼" },
            { file: "liked.vrma", label: "点赞" },
            { file: "pose.vrma", label: "摆姿势" },
            { file: "shoot.vrma", label: "射击" },
            { file: "showbody.vrma", label: "展示" },
            { file: "spin.vrma", label: "旋转" },
            { file: "squat.vrma", label: "蹲下" },
            { file: "yeah.vrma", label: "耶✌" },
        ];

        const EXPRESSION_PRESETS = [
            { name: "happy", label: "😊 微笑", defaultWeight: 1.0 },
            { name: "angry", label: "😡 生气", defaultWeight: 1.0 },
            { name: "sad", label: "😢 悲伤", defaultWeight: 1.0 },
            { name: "surprised", label: "😲 惊讶", defaultWeight: 1.0 },
            { name: "relaxed", label: "😌 放松", defaultWeight: 1.0 },
            { name: "shy", label: "😳 害羞", defaultWeight: 1.0 },
            { name: "fun", label: "😜 嬉皮", defaultWeight: 1.0 },
            { name: "love", label: "😍 喜爱", defaultWeight: 1.0 },
            { name: "serious", label: "😐 严肃", defaultWeight: 1.0 },
            { name: "neutral", label: "😶 无表情", defaultWeight: 1.0 },
        ];

        const ACTION_TAG_MAP = {
            yeah: "yeah.vrma",
            squat: "squat.vrma",
            spin: "spin.vrma",
            showbody: "showbody.vrma",
            shoot: "shoot.vrma",
            pose: "pose.vrma",
            liked: "liked.vrma",
            greet: "greet.vrma",
        };
        const VALID_ACTION_TAGS = new Set(Object.keys(ACTION_TAG_MAP));

        const EXPR_TAG_MAP = {
            smile: "happy",
            happy: "happy",
            angry: "angry",
            sad: "sad",
            surprise: "surprised",
            relax: "relaxed",
            shy: "shy",
            love: "love",
            none: "neutral",
        };
        const VALID_EXPR_TAGS = new Set(Object.keys(EXPR_TAG_MAP));
        const DEFAULT_EXPR = "relaxed";

        const QUALITY_PRESETS = {
            low: { label: "低", pixelRatio: 0.5, antialias: false, shadows: false, shadowMapSize: 512,
            shadowMapType: THREE.PCFShadowMap },
            medium: { label: "标准", pixelRatio: 1.0, antialias: false, shadows: false, shadowMapSize: 1024,
                shadowMapType: THREE.PCFShadowMap },
            high: { label: "高", pixelRatio: 1.0, antialias: true, shadows: true, shadowMapSize: 2048,
            shadowMapType: THREE.PCFShadowMap },
            ultra: { label: "极致", pixelRatio: 2.0, antialias: true, shadows: true, shadowMapSize: 4096,
                shadowMapType: THREE.PCFSoftShadowMap },
        };
        let currentPreset = "high";
        const preset = () => QUALITY_PRESETS[currentPreset];

        const ANIM_CROSSFADE = 0.3;

        // ==================== ToastController ====================
        class ToastController {
            constructor() {
                this.container = document.getElementById("toastContainer");
            }
            _createToast(type, message, duration = 3500) {
                const icons = { error: "❌", warn: "⚠️", info: "ℹ️", success: "✅" };
                const toast = document.createElement("div");
                toast.className = `toast ${type}`;
                toast.innerHTML = `
                    <span class="toast-icon">${icons[type] || "ℹ️"}</span>
                    <span class="toast-msg">${message}</span>
                    <button class="toast-close" title="关闭">×</button>
                `;
                const closeBtn = toast.querySelector(".toast-close");
                const remove = () => {
                    if (toast.parentNode && !toast.classList.contains("removing")) {
                        toast.classList.add("removing");
                        setTimeout(() => {
                            if (toast.parentNode) toast.remove();
                        }, 300);
                    }
                };
                closeBtn.addEventListener("click", remove);
                const timer = setTimeout(remove, duration);
                toast._timer = timer;
                toast._remove = remove;
                this.container.appendChild(toast);
                const allToasts = this.container.querySelectorAll(".toast");
                if (allToasts.length > 5) {
                    const oldest = allToasts[0];
                    if (oldest._remove) oldest._remove();
                }
                return toast;
            }
            error(msg, duration) { return this._createToast("error", msg, duration); }
            warn(msg, duration) { return this._createToast("warn", msg, duration); }
            info(msg, duration) { return this._createToast("info", msg, duration); }
            success(msg, duration) { return this._createToast("success", msg, duration); }
        }
        const toast = new ToastController();

        // ==================== 场景初始化 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.4, 3);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(1, 1.5, 1);
        scene.add(directionalLight);

        function configureLightShadows(light, presetKey) {
            const cfg = QUALITY_PRESETS[presetKey];
            light.castShadow = cfg.shadows;
            if (cfg.shadows) {
                light.shadow.mapSize.width = cfg.shadowMapSize;
                light.shadow.mapSize.height = cfg.shadowMapSize;
                light.shadow.camera.left = -2;
                light.shadow.camera.right = 2;
                light.shadow.camera.top = 3;
                light.shadow.camera.bottom = -0.5;
                light.shadow.camera.near = 0.1;
                light.shadow.camera.far = 15;
                light.shadow.bias = -0.0003;
                light.shadow.normalBias = 0.02;
            }
        }
        configureLightShadows(directionalLight, currentPreset);

        const groundGeometry = new THREE.CircleGeometry(2.5, 48);
        const groundMaterial = new THREE.ShadowMaterial({ opacity: 0.45 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0.001;
        ground.receiveShadow = true;
        scene.add(ground);

        let renderer = new THREE.WebGLRenderer({
            antialias: preset().antialias,
            powerPreference: "high-performance",
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(preset().pixelRatio, window.devicePixelRatio));
        renderer.shadowMap.enabled = preset().shadows;
        renderer.shadowMap.type = preset().shadowMapType;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        let controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 0.8;
        controls.maxDistance = 8;
        controls.maxPolarAngle = Math.PI * 0.75;
        controls.update();

        const clock = new THREE.Clock();
        let currentVRM = null;
        let mixer = null;
        let animationActions = new Map();
        let activeAnimFile = null;
        let isLoadingAnimations = false;
        let currentExpression = null;
        let idleTime = 0;
        let blinkState = { timer: 0, nextBlink: 2.5, isBlinking: false, blinkDuration: 0.1, blinkProgress: 0 };

        // ==================== ExpressionController ====================
        class ExpressionController {
            setExpression(expressionName) {
                if (!currentVRM || !currentVRM.expressionManager) return;
                const manager = currentVRM.expressionManager;
                Object.keys(manager._expressionMap || {}).forEach(name => {
                    manager.setValue(name, 0);

                manager.setValue(expressionName, 1);
                currentExpression = expressionName;
                this._updateUI();

            resetToDefault() {
                this.setExpression(DEFAULT_EXPR);

        // ==================== AnimationController ====================
        class AnimationController {
            constructor() {
                this._finishCallbacks = new Map();
                this._isInIdle = true;
            }
            clearAllActions() {
                if (mixer) mixer.stopAllAction();
                animationActions.clear();
                activeAnimFile = null;
                this._finishCallbacks.clear();
                this._isInIdle = true;
            }
            stopCurrentAction(fadeOutTime = ANIM_CROSSFADE) {
                if (!mixer) return;
                mixer._actions.forEach(action => {
                    if (action.isRunning()) action.fadeOut(fadeOutTime);
                });
                setTimeout(() => {
                    if (mixer) {
                        mixer._actions.forEach(action => {
                            if (!action.isRunning()) action.stop();
                        });
                    }
                }, fadeOutTime * 1000 + 50);
                this._finishCallbacks.clear();
                this._isInIdle = true;
                activeAnimFile = null;
                this._updateActiveButton(null);
            }
            playAnimation(fileName, loopMode = THREE.LoopOnce, crossfade = ANIM_CROSSFADE, onFinished = null) {
                if (!mixer || !animationActions.has(fileName)) {
                    if (onFinished) setTimeout(onFinished, 0);
                    return null;
                }
                const action = animationActions.get(fileName);
                if (!action) {
                    if (onFinished) setTimeout(onFinished, 0);
                    return null;
                }
                this._isInIdle = false;
                this._fadeOutAllRunning(crossfade);
                action.loop = loopMode;
                action.clampWhenFinished = (loopMode === THREE.LoopOnce);
                action.reset();
                action.fadeIn(crossfade).play();
                activeAnimFile = fileName;
                this._updateActiveButton(fileName);
                if (onFinished) {
                    this._finishCallbacks.set(action, onFinished);
                }
                return action;
            }
            _fadeOutAllRunning(fadeTime) {
                if (!mixer) return;
                mixer._actions.forEach(action => {
                    if (action.isRunning() && action !== animationActions.get('waiting.vrma')) {
                        action.fadeOut(fadeTime);
                    }
                });
            }
            getAnimationDuration(fileName) {
                if (!animationActions.has(fileName)) return 0;
                const action = animationActions.get(fileName);
                return action.getClip().duration || 1.5;
            }
            resetToIdle() {
                this.stopCurrentAction(0.2);
                this._isInIdle = true;
            }
            _updateActiveButton(fileName) {
                document.querySelectorAll(".anim-btn").forEach(btn => {
                    btn.classList.toggle("active-anim", btn.dataset.file === fileName);
                });
            }
            handleMixerFinished(event) {
                const finishedAction = event.action;
                if (this._finishCallbacks.has(finishedAction)) {
                    const cb = this._finishCallbacks.get(finishedAction);
                    this._finishCallbacks.delete(finishedAction);
                    try { cb(); } catch (e) { console.warn("动画完成回调出错:", e); }
                }
                let finishedFile = null;
                for (let [file, action] of animationActions.entries()) {
                    if (action === finishedAction) { finishedFile = file; break; }
                }
                if (finishedFile && activeAnimFile === finishedFile) {
                    activeAnimFile = null;
                    this._isInIdle = true;
                    this._updateActiveButton(null);
                }
            }
            enterIdle() {
                this._fadeOutAllRunning(ANIM_CROSSFADE);
                this._isInIdle = true;
                activeAnimFile = null;
                this._updateActiveButton(null);
            }
            get isIdle() {
                return this._isInIdle;
            }
        }
        const animationController = new AnimationController();

        function setupMixerListener() {
            if (!mixer) return;
            mixer.addEventListener("finished", (e) => {
                animationController.handleMixerFinished(e);
            });

        // ==================== 手臂T-pose检测与修复 ====================
        function fixTposeArms() {
            if (!currentVRM || !currentVRM.humanoid) return;
            const leftUpperArm = currentVRM.humanoid.getRawBoneNode('leftUpperArm');
            const rightUpperArm = currentVRM.humanoid.getRawBoneNode('rightUpperArm');
            // T-pose 判定阈值（弧度）
            const threshold = 0.1;
            // 目标旋转：手臂自然下垂（绕局部x轴旋转-90度，需根据实际模型微调）
            const targetRot = new THREE.Euler(-Math.PI / 2, 0, 0);

            if (leftUpperArm) {
                const rot = leftUpperArm.rotation;
                if (Math.abs(rot.x) < threshold && Math.abs(rot.y) < threshold && Math.abs(rot.z) < threshold) {
                    leftUpperArm.rotation.copy(targetRot);
                }
            }
            if (rightUpperArm) {
                const rot = rightUpperArm.rotation;
                if (Math.abs(rot.x) < threshold && Math.abs(rot.y) < threshold && Math.abs(rot.z) < threshold) {
                    rightUpperArm.rotation.copy(targetRot);
                }
            }
        }

        // ==================== 待机逻辑：轻晃 + 眨眼 + 手臂修正 ====================
        function updateIdle(delta) {
            if (!currentVRM) return;
            // 眨眼
            blinkState.timer += delta;
            if (!blinkState.isBlinking) {
                if (blinkState.timer >= blinkState.nextBlink) {
                    blinkState.isBlinking = true;
                    blinkState.blinkProgress = 0;
                    blinkState.timer = 0;
                    blinkState.nextBlink = 2.0 + Math.random() * 3.0;
                }
            } else {
                blinkState.blinkProgress += delta / blinkState.blinkDuration;
                if (blinkState.blinkProgress >= 1.0) {
                    blinkState.isBlinking = false;
                    blinkState.blinkProgress = 1.0;
                }
            }
            let blinkWeight = 0;
            if (blinkState.isBlinking) {
                const t = blinkState.blinkProgress;
                blinkWeight = t < 0.3 ? t / 0.3 : 1.0 - (t - 0.3) / 0.7;
                blinkWeight = Math.max(0, Math.min(1, blinkWeight));
            }
            if (currentVRM.expressionManager) {
                try { currentVRM.expressionManager.setValue("blink", blinkWeight); } catch (e) {
                    if (currentVRM.blendShapeProxy) {
                        currentVRM.blendShapeProxy.setValue("blinkLeft", blinkWeight);
                        currentVRM.blendShapeProxy.setValue("blinkRight", blinkWeight);
                    }
                }
            } else if (currentVRM.blendShapeProxy) {
                currentVRM.blendShapeProxy.setValue("blinkLeft", blinkWeight);
                currentVRM.blendShapeProxy.setValue("blinkRight", blinkWeight);
            }

            // 身体轻晃
            idleTime += delta;
            const swayAngle = Math.sin(idleTime * 0.8) * 0.05;
            currentVRM.scene.rotation.y = swayAngle;
        }

        // ==================== 渲染循环 ====================
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            if (mixer) mixer.update(delta);
            if (currentVRM) currentVRM.update(delta);

            if (animationController.isIdle) {
                // 检查是否有动画仍在运行（例如淡出中），如果没有则修正手臂
                const anyActionRunning = mixer && mixer._actions.some(a => a.isRunning());
                if (!anyActionRunning) {
                    fixTposeArms();
                }
                updateIdle(delta);
            } else {
                idleTime = 0;
                currentVRM.scene.rotation.y = 0;
                stopBlinkDuringAnim();
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        function stopBlinkDuringAnim() {
            if (!currentVRM) return;
            if (currentVRM.expressionManager) {
                try { currentVRM.expressionManager.setValue("blink", 0); } catch (e) {
                    if (currentVRM.blendShapeProxy) {
                        currentVRM.blendShapeProxy.setValue("blinkLeft", 0);
                        currentVRM.blendShapeProxy.setValue("blinkRight", 0);
                    }
                }
            } else if (currentVRM.blendShapeProxy) {
                currentVRM.blendShapeProxy.setValue("blinkLeft", 0);
                currentVRM.blendShapeProxy.setValue("blinkRight", 0);
            }
            blinkState.isBlinking = false;
            blinkState.timer = 0;
            blinkState.nextBlink = 2.5;
        }

        // ==================== 画质切换 ====================
        function rebuildRenderer(antialias) {
            const oldCanvas = renderer.domElement;
            const oldTarget = controls.target.clone();
            const wasShadowEnabled = renderer.shadowMap.enabled;
            const oldShadowType = renderer.shadowMap.type;
            controls.dispose();
            const newRenderer = new THREE.WebGLRenderer({ antialias, powerPreference: "high-performance" });
            newRenderer.setSize(window.innerWidth, window.innerHeight);
            newRenderer.setPixelRatio(Math.min(preset().pixelRatio, window.devicePixelRatio));
            newRenderer.shadowMap.enabled = wasShadowEnabled;
            newRenderer.shadowMap.type = oldShadowType;
            newRenderer.outputColorSpace = THREE.SRGBColorSpace;
            newRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            newRenderer.toneMappingExposure = 1.0;
            if (oldCanvas.parentNode) {
                oldCanvas.parentNode.replaceChild(newRenderer.domElement, oldCanvas);
            } else {
                document.body.appendChild(newRenderer.domElement);
            }
            renderer = newRenderer;
            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.copy(oldTarget);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 0.8;
            controls.maxDistance = 8;
            controls.maxPolarAngle = Math.PI * 0.75;
            controls.update();
        }

            renderer.setPixelRatio(Math.min(cfg.pixelRatio, window.devicePixelRatio));

        // ==================== VADController ====================
        class VADController {
            constructor() {
                this.audioContext = null;
                this.mediaStream = null;
                this.scriptNode = null;
                this.analyserNode = null;
                this.isListening = false;
                this._paused = false;
                this.onSpeechStart = null;
                this.onSpeechEnd = null;
                this.onSilenceTimeout = null;
                this.silenceThreshold = 0.008;
                this.silenceDuration = 1.5;
                this.longSilenceDuration = 10;
                this.minSpeechDuration = 0.4;
                this.maxRecordingDuration = 30;
                this._audioBuffer = [];
                this._isSpeaking = false;
                this._silenceTimer = 0;
                this._speechTimer = 0;
                this._longSilenceTimer = 0;
                this._sampleRate = 44100;
                this._isRecording = false;
            }

            async start() {
                if (this.isListening) return;
                try {
                    this.audioContext = new(window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
                    this._sampleRate = this.audioContext.sampleRate;
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            sampleRate: { ideal: 44100 },
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true,
                        },
                    });
                    const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                    this.analyserNode = this.audioContext.createAnalyser();
                    this.analyserNode.fftSize = 2048;
                    this.analyserNode.smoothingTimeConstant = 0.3;
                    source.connect(this.analyserNode);

                    this.scriptNode = this.audioContext.createScriptProcessor(4096, 1, 1);
                    source.connect(this.scriptNode);
                    this.scriptNode.connect(this.audioContext.destination);

                    this._audioBuffer = [];
                    this._isSpeaking = false;
                    this._silenceTimer = 0;
                    this._speechTimer = 0;
                    this._longSilenceTimer = 0;
                    this._isRecording = false;
                    this._paused = false;
                    this.isListening = true;

                    this.scriptNode.onaudioprocess = (event) => {
                        if (!this.isListening || this._paused) return;
                        const inputData = event.inputBuffer.getChannelData(0);
                        const rms = this._calculateRMS(inputData);

                        if (rms > this.silenceThreshold) {
                            this._longSilenceTimer = 0;
                            if (!this._isSpeaking) {
                                this._silenceTimer = 0;
                                this._speechTimer += (4096 / this._sampleRate);
                                if (this._speechTimer >= this.minSpeechDuration) {
                                    this._isSpeaking = true;
                                    this._audioBuffer = [];
                                    this._isRecording = true;
                                    if (this.onSpeechStart) this.onSpeechStart();
                                }
                            }
                            if (this._isRecording) {
                                this._audioBuffer.push(new Float32Array(inputData));
                            }
                            this._silenceTimer = 0;
                        } else if (this._isSpeaking && this._isRecording) {
                            this._audioBuffer.push(new Float32Array(inputData));
                            this._silenceTimer += (4096 / this._sampleRate);
                            if (this._silenceTimer >= this.silenceDuration) {
                                this._finalizeRecording();
                            }
                        } else if (!this._isSpeaking) {
                            this._longSilenceTimer += (4096 / this._sampleRate);
                            if (this._longSilenceTimer >= this.longSilenceDuration) {
                                this._longSilenceTimer = 0;
                                if (this.onSilenceTimeout) this.onSilenceTimeout();
                            }
                        }

                        if (this._isRecording && this._audioBuffer.length * (4096 / this._sampleRate) >= this
                            .maxRecordingDuration) {
                            this._finalizeRecording();
                        }
                    };
                    return true;
                } catch (err) {
                    toast.error("麦克风访问失败: " + (err.message || "未知错误"));
                    console.error("VAD启动错误:", err);
                    throw err;
                }
            }

            _calculateRMS(buffer) {
                let sum = 0;
                for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
                return Math.sqrt(sum / buffer.length);
            }

            _finalizeRecording() {
                if (!this._isRecording) return;
                this._isRecording = false;
                this._isSpeaking = false;
                this._speechTimer = 0;
                this._silenceTimer = 0;
                const audioData = this._concatBuffers();
                this._audioBuffer = [];
                if (this.onSpeechEnd) {
                    const wavBlob = this._encodeWAV(audioData, this._sampleRate);
                    this.onSpeechEnd(wavBlob, audioData, this._sampleRate);
                }
            }

            _concatBuffers() {
                if (this._audioBuffer.length === 0) return new Float32Array(0);
                let totalLen = 0;
                for (const buf of this._audioBuffer) totalLen += buf.length;
                const result = new Float32Array(totalLen);
                let offset = 0;
                for (const buf of this._audioBuffer) {
                    result.set(buf, offset);
                    offset += buf.length;
                }
                return result;
            }

            _encodeWAV(samples, sampleRate) {
                const numChannels = 1;
                const bitsPerSample = 16;
                const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
                const blockAlign = numChannels * (bitsPerSample / 8);
                const dataSize = samples.length * (bitsPerSample / 8);
                const buffer = new ArrayBuffer(44 + dataSize);
                const view = new DataView(buffer);
                this._writeString(view, 0, "RIFF");
                view.setUint32(4, 36 + dataSize, true);
                this._writeString(view, 8, "WAVE");
                this._writeString(view, 12, "fmt ");
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, byteRate, true);
                view.setUint16(32, blockAlign, true);
                view.setUint16(34, bitsPerSample, true);
                this._writeString(view, 36, "data");
                view.setUint32(40, dataSize, true);
                let offset = 44;
                for (let i = 0; i < samples.length; i++) {
                    const s = Math.max(-1, Math.min(1, samples[i]));
                    const val = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    view.setInt16(offset, val, true);
                    offset += 2;
                }
                return new Blob([buffer], { type: "audio/wav" });
            }

            _writeString(view, offset, str) {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            }

            pause() {
                this._paused = true;
                this._audioBuffer = [];
                this._isRecording = false;
                this._isSpeaking = false;
                this._silenceTimer = 0;
                this._speechTimer = 0;
                this._longSilenceTimer = 0;
            }

            resume() {
                this._paused = false;
                this._longSilenceTimer = 0;
                this._silenceTimer = 0;
                this._speechTimer = 0;
            }

            async stop() {
                this.isListening = false;
                this._paused = false;
                if (this.scriptNode) {
                    this.scriptNode.disconnect();
                    this.scriptNode = null;
                }
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }
                if (this.audioContext && this.audioContext.state !== "closed") {
                    await this.audioContext.close().catch(() => {});
                    this.audioContext = null;
                }
                this._audioBuffer = [];
                this._isRecording = false;
                this._isSpeaking = false;
            }
        }

        // ==================== WhisperController ====================
        class WhisperController {
            async transcribe(audioBlob, apiBaseUrl, apiKey) {
                const formData = new FormData();
                formData.append("file", audioBlob, "recording.wav");
                formData.append("model", "whisper-1");
                formData.append("language", "zh");

                const url = `${apiBaseUrl}/audio/transcriptions`;
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}` },
                    body: formData,
                });
                if (!response.ok) {
                    const errText = await response.text().catch(() => "未知错误");
                    throw new Error(`Whisper API 错误 (${response.status}): ${errText}`);
                }
                const data = await response.json();
                return data.text || "";
            }
        }

        // ==================== LLMController ====================
        class LLMController {
            async *streamChat(messages, apiBaseUrl, apiKey, model) {
                const url = `${apiBaseUrl}/chat/completions`;
                const body = {
                    model: model,
                    messages: messages,
                    stream: true,
                    max_tokens: 300,
                    temperature: 0.8,
                };
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(body),
                });
                if (!response.ok) {
                    const errText = await response.text().catch(() => "未知错误");
                    throw new Error(`LLM API 错误 (${response.status}): ${errText}`);
                }
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop() || "";
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || !trimmed.startsWith("data: ")) continue;
                        const jsonStr = trimmed.slice(6);
                        if (jsonStr === "[DONE]") return;
                        try {
                            const parsed = JSON.parse(jsonStr);
                            const delta = parsed.choices?.[0]?.delta?.content;
                            if (delta) yield delta;
                        } catch (e) {}
                    }
                }
                if (buffer.trim()) {
                    const trimmed = buffer.trim();
                    if (trimmed.startsWith("data: ") && trimmed.slice(6) !== "[DONE]") {
                        try {
                            const parsed = JSON.parse(trimmed.slice(6));
                            const delta = parsed.choices?.[0]?.delta?.content;
                            if (delta) yield delta;
                        } catch (e) {}
                    }
                }
            }
        }

        // ==================== TTSController ====================
        class TTSController {
            async generateSpeech(text, apiBaseUrl, apiKey, model, voice) {
                const url = `${apiBaseUrl}/audio/speech`;
                const body = {
                    model: model,
                    input: text,
                    voice: voice,
                    response_format: "mp3",
                    speed: 1.0,
                };
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(body),
                });
                if (!response.ok) {
                    const errText = await response.text().catch(() => "未知错误");
                    throw new Error(`TTS API 错误 (${response.status}): ${errText}`);
                }

                const clone = response.clone();
                const responseText = await clone.text();
                try {
                    const json = JSON.parse(responseText);
                    if (json.output?.audio?.url) {
                        return json.output.audio.url;
                    }
                } catch (e) {}
                return await response.blob();
            }
        }

        // ==================== PlaybackQueue (0.3s间隔，动作提前0.3s) ====================
        class PlaybackQueue {
            constructor() {
                this.queue = [];
                this.isPlaying = false;
                this._stopped = false;
                this.onAllComplete = null;
                this._currentAudio = null;
                this._nextTimer = null;
                this._lastAnimFile = null;
                this._preloadedAnim = null;
            }
            enqueue(item) {
                if (item.animFile && item.animFile === this._lastAnimFile) {
                    toast.warn(`⚠️ 重复动作: [${item.animFile.replace('.vrma','')}]，建议使用不同动作`, 4000);
                }
                if (item.animFile) {
                    this._lastAnimFile = item.animFile;
                }
                this.queue.push(item);
                if (!this.isPlaying && !this._stopped) {
                    this._playNext();
                }
            }
            async _playNext() {
                if (this._stopped || this.queue.length === 0) {
                    this.isPlaying = false;
                    if (this._stopped && this.queue.length > 0) this.queue = [];
                    if (this.queue.length === 0 && this.onAllComplete && !this._stopped) {
                        this.onAllComplete();
                    }
                    return;
                }
                this.isPlaying = true;
                const item = this.queue.shift();

                if (this._preloadedAnim) {
                    this._preloadedAnim();
                    this._preloadedAnim = null;
                }

                expressionController.setExpression(item.expression);

                let audioSource;
                try {
                    audioSource = await item.ttsPromise;
                } catch (e) {
                    console.warn("TTS生成失败，跳过该句:", e);
                    toast.warn("TTS生成失败，跳过一句");
                    this._playNext();
                    return;
                }
                if (this._stopped) {
                    this.isPlaying = false;
                    return;
                }

                let audio;
                if (typeof audioSource === 'string') {
                    audio = new Audio(audioSource);
                } else {
                    const audioUrl = URL.createObjectURL(audioSource);
                    audio = new Audio(audioUrl);
                    audio.addEventListener('ended', () => URL.revokeObjectURL(audioUrl), { once: true });
                    audio.addEventListener('error', () => URL.revokeObjectURL(audioUrl), { once: true });
                }
                this._currentAudio = audio;

                const animFile = item.animFile;
                if (animFile && animationActions.has(animFile)) {
                    animationController.playAnimation(animFile, THREE.LoopOnce, ANIM_CROSSFADE);
                } else {
                    animationController.enterIdle();
                }

                audio.play().catch((e) => {
                    console.warn("音频播放失败:", e);
                });

                const handleAudioEnded = () => {
                    if (this._stopped) return;
                    if (this.queue.length > 0) {
                        const nextItem = this.queue[0];
                        const nextAnim = nextItem.animFile;
                        if (nextAnim && animationActions.has(nextAnim)) {
                            this._preloadedAnim = () => {
                                expressionController.setExpression(nextItem.expression);
                                animationController.playAnimation(nextAnim, THREE.LoopOnce, ANIM_CROSSFADE);
                            };
                        } else {
                            this._preloadedAnim = null;
                        }
                        this._nextTimer = setTimeout(() => {
                            this._nextTimer = null;
                            this._currentAudio = null;
                            this._playNext();
                        }, 300);
                    } else {
                        this._currentAudio = null;
                        this.isPlaying = false;
                        animationController.enterIdle();
                        if (this.onAllComplete && !this._stopped) {
                            this.onAllComplete();
                        }
                    }
                };

                audio.onended = handleAudioEnded;
                audio.onerror = () => {
                    console.warn("音频错误，跳过");
                    handleAudioEnded();
                };
            }
            stop() {
                this._stopped = true;
                if (this._currentAudio) {
                    try { this._currentAudio.pause();
                        this._currentAudio = null; } catch (e) {}
                }
                if (this._nextTimer) {
                    clearTimeout(this._nextTimer);
                    this._nextTimer = null;
                }
                this._preloadedAnim = null;
                this.queue = [];
                this.isPlaying = false;
                this._lastAnimFile = null;
                animationController.resetToIdle();
                expressionController.resetToDefault();
            }
            reset() {
                this._stopped = false;
                this.queue = [];
                this.isPlaying = false;
                this._currentAudio = null;
                this._lastAnimFile = null;
                this._preloadedAnim = null;
                if (this._nextTimer) {
                    clearTimeout(this._nextTimer);
                    this._nextTimer = null;
                }
            }
            getQueueLength() {
                return this.queue.length + (this.isPlaying ? 1 : 0);
            }
            resetActionTracking() {
                this._lastAnimFile = null;
            }
        }

        // ==================== 行解析器 (动作缺失自动补waiting) ====================
        function parseLine(line) {
            const trimmed = line.trim();
            if (!trimmed) return null;

            let actionTag = null;
            let exprTag = null;
            let remaining = trimmed;
            const tagRegex = /^\[([^\]]+)\]\s*/;

            while (true) {
                const match = remaining.match(tagRegex);
                if (!match) break;
                const tag = match[1].toLowerCase();
                if (VALID_ACTION_TAGS.has(tag)) {
                    if (!actionTag) actionTag = tag;
                } else if (VALID_EXPR_TAGS.has(tag)) {
                    if (!exprTag) exprTag = tag;
                } else {
                    break;
                }
                remaining = remaining.slice(match[0].length);
            }

            const text = remaining.trim();
            if (!text && !actionTag && !exprTag) return null;

            return {
                action: actionTag || null,
                expression: exprTag ? EXPR_TAG_MAP[exprTag] : DEFAULT_EXPR,
                animFile: actionTag ? (ACTION_TAG_MAP[actionTag] || null) : null,
                text: text || "",
            };
        }

        // ==================== AIController ====================
        class AIController {

                this.vadController.onSpeechStart = () => {

                        return;

            async start() {

                this._vadPausedForPlayback = false;
                this._isProcessing = false;

                expressionController.resetToDefault();

            _addToHistory(role, content) {

            async _handleSpeechEnd(wavBlob) {

                const apiBaseUrl = apiBaseUrlInput.value.trim() || "https://run.v3.cm/v1";
                const llmModel = llmModelInput.value.trim() || "gemini-2.5-flash";

示例：

                    const messages = [

                    this._llmBuffer = "";

                        const lines = this._llmBuffer.split("\n");

                        for (const line of lines) {
                            if (this._abortFlag) break;

                            if (parsed && parsed.text) {

        }

        const aiController = new AIController();

        document.getElementById("btnStartAI").addEventListener("click", async () => {
            if (aiController.state === "running") return;
            try {
                await aiController.start();
            } catch (e) {
                aiController.state = "idle";
                aiController._updateUI();
            }
        });

        document.getElementById("btnStopAI").addEventListener("click", async () => {
            await aiController.stop();
        });

        window.addEventListener("beforeunload", () => {
            if (aiController.state === "running") aiController.stop();
        });

        console.log("🚀 启动完毕 · 句间间隔0.3秒，动作提前播放，完全弃用waiting.vrma");
        console.log("💡 任何时候都保持轻晃+眨眼待机，不会出现T-pose");
        console.log("🛠️ 已加入手臂T-pose自动修复：待机时若检测到双臂水平则强制下垂");
    </script>
</body>

</html>
