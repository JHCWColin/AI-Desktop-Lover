<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>VRM + VRMA Viewer</title>

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, .6);
            padding: 10px;
            border-radius: 8px;
            color: white;
        }

        button {
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div id="ui">

        <div>
            VRM:
            <input id="vrmInput" type="file" accept=".vrm">
        </div>

        <br>

        <div>
            VRMA:
            <input id="vrmaInput" type="file" accept=".vrma">
        </div>

        <br>

        <button id="playBtn">
            播放动画
        </button>

    </div>

    <script type="importmap">
{
  "imports": {
    "three":
      "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",

    "three/addons/":
      "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",

    "@pixiv/three-vrm":
      "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js",

    "@pixiv/three-vrm-animation":
      "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3/lib/three-vrm-animation.module.min.js"
  }
}
</script>

    <script type="module">

        import * as THREE from "three";

        import { OrbitControls }
            from "three/addons/controls/OrbitControls.js";

        import { GLTFLoader }
            from "three/addons/loaders/GLTFLoader.js";

        import {
            VRMLoaderPlugin
        }
            from "@pixiv/three-vrm";

        import {
            VRMAnimationLoaderPlugin,
            createVRMAnimationClip
        }
            from "@pixiv/three-vrm-animation";

        let scene = new THREE.Scene();

        scene.background =
            new THREE.Color(0x222222);

        let camera =
            new THREE.PerspectiveCamera(
                35,
                window.innerWidth / window.innerHeight,
                0.1,
                100
            );

        camera.position.set(0, 1.4, 3);

        let renderer =
            new THREE.WebGLRenderer({
                antialias: true
            });

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

        document.body.appendChild(
            renderer.domElement
        );

        let controls =
            new OrbitControls(
                camera,
                renderer.domElement
            );

        let light =
            new THREE.DirectionalLight(
                0xffffff,
                2
            );

        light.position.set(1, 1, 1);

        scene.add(light);

        scene.add(
            new THREE.AmbientLight(
                0xffffff,
                1
            )
        );

        let clock =
            new THREE.Clock();

        let currentVRM = null;
        let mixer = null;
        let currentVRMA = null;

        function animate() {

            requestAnimationFrame(animate);

            let delta =
                clock.getDelta();

            if (mixer) {
                mixer.update(delta);
            }

            if (currentVRM) {
                currentVRM.update(delta);
            }

            renderer.render(
                scene,
                camera
            );
        }

        animate();

        document
            .getElementById("vrmInput")
            .addEventListener(
                "change",
                async e => {

                    let file =
                        e.target.files[0];

                    if (!file) return;

                    let url =
                        URL.createObjectURL(file);

                    let loader =
                        new GLTFLoader();

                    loader.register(
                        parser =>
                            new VRMLoaderPlugin(parser)
                    );

                    loader.load(
                        url,
                        gltf => {

                            if (currentVRM) {
                                scene.remove(
                                    currentVRM.scene
                                );
                            }

                            currentVRM =
                                gltf.userData.vrm;

                            scene.add(
                                currentVRM.scene
                            );

                            console.log(
                                "VRM loaded"
                            );
                        }
                    );
                });

        document
            .getElementById("vrmaInput")
            .addEventListener(
                "change",
                async e => {

                    let file =
                        e.target.files[0];

                    if (!file) return;

                    let url =
                        URL.createObjectURL(file);

                    let loader =
                        new GLTFLoader();

                    loader.register(
                        parser =>
                            new VRMAnimationLoaderPlugin(parser)
                    );

                    loader.load(
                        url,
                        gltf => {

                            currentVRMA =
                                gltf.userData.vrmAnimations[0];

                            console.log(
                                "VRMA loaded"
                            );
                        }
                    );
                });

        document
            .getElementById("playBtn")
            .onclick = () => {

                if (!currentVRM) return;
                if (!currentVRMA) return;

                mixer =
                    new THREE.AnimationMixer(
                        currentVRM.scene
                    );

                let clip =
                    createVRMAnimationClip(
                        currentVRMA,
                        currentVRM
                    );

                mixer
                    .clipAction(clip)
                    .reset()
                    .play();
            };

        window.addEventListener(
            "resize",
            () => {

                camera.aspect =
                    window.innerWidth /
                    window.innerHeight;

                camera.updateProjectionMatrix();

                renderer.setSize(
                    window.innerWidth,
                    window.innerHeight
                );
            });

    </script>

</body>

</html>
